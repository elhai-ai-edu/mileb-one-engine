<!DOCTYPE html>

<head>

<body class="user-student">

<!-- Sidebar -->

<div class="sidebar">

<h2>MilEd.One</h2>

<a href="/students.html">קורסים</a>
<a href="/skills.html">מיומנויות</a>

<!-- Main -->

<div class="main">

<div class="topbar">
MilEd Classroom
</div>


<div class="container">

<h2>הגשת תוצר</h2>

<textarea id="studentText"
placeholder="כתוב כאן את התוצר שלך">
</textarea>

<br>

<button onclick="submitAssignment()">
הגש למרצה
</button>

</div>

</div>

<script>

async function submitAssignment(){

const text =
document.getElementById("studentText").value;

await fetch("/api/submit",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text,
student:"student1"
})
});

alert("העבודה הוגשה");

}

</script>

</body>
