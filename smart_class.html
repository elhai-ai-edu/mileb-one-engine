<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כיתה חכמה — MilEd.One</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Assistant', 'Segoe UI', system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 8%, rgba(79,70,229,0.1), transparent 30%),
        radial-gradient(circle at 88% 20%, rgba(99,102,241,0.12), transparent 34%),
        linear-gradient(150deg, #f8fbff 0%, #eef4ff 50%, #f1f5f9 100%);
      min-height: 100vh;
      direction: rtl;
      color: #0f172a;
    }

    /* ─── Topbar ─── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { font-size: 18px; font-weight: 800; color: #1e293b; }
    .brand span { color: #6366f1; }
    .topbar-nav { display: flex; align-items: center; gap: 16px; }
    .back-link { font-size: 13px; color: #6366f1; text-decoration: none; display: flex; align-items: center; gap: 5px; }
    .back-link:hover { text-decoration: underline; }
    .logout-btn {
      font-size: 12px; color: #94a3b8; border: 1px solid #e2e8f0;
      border-radius: 6px; padding: 4px 12px; cursor: pointer; background: none;
    }
    .logout-btn:hover { color: #ef4444; border-color: #fca5a5; }

    /* ─── Page ─── */
    .page { max-width: 720px; margin: 0 auto; padding: 44px 24px 80px; display: flex; flex-direction: column; gap: 24px; }

    /* ─── Course header ─── */
    .course-header {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 60%, #818cf8 100%);
      border-radius: 22px;
      padding: 28px 30px;
      color: #fff;
      box-shadow: 0 16px 40px rgba(79,70,229,0.28);
    }
    .course-name { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; line-height: 1.25; }
    .course-header-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .header-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .header-chip {
      font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px;
      background: rgba(255,255,255,.18); color: #fff;
    }
    .lock-status-badge {
      font-size: 13px; font-weight: 700; padding: 6px 16px; border-radius: 20px; flex-shrink: 0;
    }
    .lock-status-badge.locked { background: #fee2e2; color: #dc2626; }
    .lock-status-badge.active { background: #dcfce7; color: #16a34a; }
    .lock-status-badge.loading { background: rgba(255,255,255,.2); color: #fff; }

    /* ─── Work mode bar ─── */
    .work-mode-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 560px) { .work-mode-bar { grid-template-columns: 1fr; } }

    .work-mode-btn {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 24px 26px;
      border-radius: 20px;
      border: 2px solid transparent;
      text-decoration: none;
      color: inherit;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 8px 24px rgba(15,23,42,0.10);
      position: relative;
      overflow: hidden;
    }
    .work-mode-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 110% -10%, rgba(255,255,255,0.18), transparent 50%);
    }
    .work-mode-btn:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(15,23,42,0.18); }

    .work-mode-btn.macro {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border-color: #4338ca;
      color: #fff;
    }
    .work-mode-btn.micro {
      background: linear-gradient(135deg, #0369a1, #0ea5e9);
      border-color: #0284c7;
      color: #fff;
    }
    .work-mode-icon {
      width: 52px; height: 52px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
      background: rgba(255,255,255,0.2);
    }
    .work-mode-text { display: flex; flex-direction: column; gap: 5px; }
    .work-mode-name { font-size: 1.15rem; font-weight: 800; line-height: 1.2; }
    .work-mode-sub { font-size: 12px; opacity: 0.85; line-height: 1.5; }
    .work-mode-arrow { margin-inline-start: auto; font-size: 20px; opacity: 0.7; flex-shrink: 0; }

    /* ─── Spinner / error ─── */
    .miled-spinner { color: #94a3b8; font-size: 13px; padding: 20px 0; text-align: center; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand">MilEd<span>.</span>One</div>
  <div class="topbar-nav">
    <a href="/lecturer_hub.html" class="back-link">→ פורטל הסגל</a>
    <button class="logout-btn" onclick="logout()">יציאה</button>
  </div>
</div>

<div class="page" id="page-content" style="display:none;">

  <!-- Course header -->
  <div class="course-header">
    <div class="course-name" id="course-name">טוען...</div>
    <div class="course-header-meta">
      <div class="header-chips" id="course-meta"></div>
      <span class="lock-status-badge loading" id="lock-badge">בודק...</span>
    </div>
  </div>

  <!-- Work mode bar -->
  <div class="work-mode-bar">
    <a id="macro-link" href="/macro_cockpit.html" class="work-mode-btn macro">
      <div class="work-mode-icon">🧭</div>
      <div class="work-mode-text">
        <div class="work-mode-name">מאקרו — תכנון</div>
        <div class="work-mode-sub">יחידות, בוטים, תאריכים ומבנה הקורס</div>
      </div>
      <div class="work-mode-arrow">←</div>
    </a>
    <a id="micro-link" href="/micro_cockpit.html" class="work-mode-btn micro">
      <div class="work-mode-icon">🖥️</div>
      <div class="work-mode-text">
        <div class="work-mode-name">מיקרו — שיעור</div>
        <div class="work-mode-sub">לפני השיעור, מרחב שיעור חי, אחרי השיעור</div>
      </div>
      <div class="work-mode-arrow">←</div>
    </a>
  </div>

</div>

<div id="error-msg" style="display:none;text-align:center;color:#ef4444;padding:60px 20px;font-size:15px;"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="/firebase-init.js"></script>
<script src="/auth-guard.js"></script>
<script>

const smartClassSessionUser = window.MiledAccess?.getSessionUser?.();
const smartClassCanonicalRole = window.MiledAccess?.normalizeRole?.(smartClassSessionUser?.canonicalRole || smartClassSessionUser?.role);
const smartClassRedirect = window.MiledAccess?.getRoleHome?.(smartClassCanonicalRole) || "/index.html";
const smartClassAccessReady = window.MiledAccess?.enforcePageAccess(["lecturer", "institution_admin", "system_admin"], smartClassRedirect);

const params  = new URLSearchParams(location.search);
const classId = params.get("classId") || "";

if (!classId) {
  document.getElementById("error-msg").style.display = "";
  document.getElementById("error-msg").textContent = "לא צוין מזהה קורס (classId). חזור לפורטל הסגל.";
}

// Wire classId into work-mode links (macro uses courseId param)
if (classId) {
  document.getElementById("macro-link").href = `/macro_cockpit.html?courseId=${encodeURIComponent(classId)}`;
  document.getElementById("micro-link").href  = `/micro_cockpit.html?classId=${encodeURIComponent(classId)}`;
}

const DB_URL = window.MILED_FIREBASE_CONFIG?.databaseURL;
const LANG_LABELS  = { ar: "דוברי ערבית", ru: "דוברי רוסית", am: "דוברי אמהרית", he: "עברית" };
const LEVEL_LABELS = { he_a2_arabic: "עברית A2", he_b1_arabic: "עברית B1", he_a2_russian: "עברית A2", he_b1: "עברית B1", he_b1_haredi: "עברית B1", native: "שפת אם", he_a1_arabic: "עברית A1" };

window.addEventListener("load", () => {
  smartClassAccessReady?.then(access => {
    if (!access?.ok) return;
    if (classId) loadPage();
  });
});

async function loadPage() {
  try {
    const config = await fetch("/config.json?ts=" + Date.now()).then(r => r.json());
    const course = config.my_courses?.[classId];
    if (!course) { showError(`קורס "${escHtml(classId)}" לא נמצא. בדוק את config.json.`); return; }

    document.getElementById("course-name").textContent = course.name || classId;

    const metaEl = document.getElementById("course-meta");
    const langLabel  = LANG_LABELS[course.language]       || course.language       || "";
    const levelLabel = LEVEL_LABELS[course.hebrew_level]  || course.hebrew_level   || "";
    const semLabel   = course.semester || "";
    if (langLabel)  metaEl.insertAdjacentHTML("beforeend", `<span class="header-chip">🌐 ${escHtml(langLabel)}</span>`);
    if (levelLabel) metaEl.insertAdjacentHTML("beforeend", `<span class="header-chip">📊 ${escHtml(levelLabel)}</span>`);
    if (semLabel)   metaEl.insertAdjacentHTML("beforeend", `<span class="header-chip">📅 ${escHtml(semLabel)}</span>`);

    // Load lock status from Firebase
    const badge = document.getElementById("lock-badge");
    if (DB_URL) {
      try {
        const snap = await fetch(`${DB_URL}/classes/${encodeURIComponent(classId)}.json`).then(r => r.json());
        if (snap?.lockDate) {
          const isLocked = new Date(snap.lockDate) < new Date();
          badge.textContent = isLocked ? "🔒 נעול" : "✅ פעיל";
          badge.className = "lock-status-badge " + (isLocked ? "locked" : "active");
        } else {
          badge.textContent = "✅ פעיל";
          badge.className = "lock-status-badge active";
        }
      } catch { badge.textContent = "✅ פעיל"; badge.className = "lock-status-badge active"; }
    }

    document.getElementById("page-content").style.display = "";
  } catch (e) {
    showError("שגיאה בטעינת הקורס: " + e.message);
  }
}

function showError(msg) {
  document.getElementById("error-msg").innerHTML = msg;
  document.getElementById("error-msg").style.display = "";
}
function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function logout() { window.MiledAccess?.signOutAndRedirect?.("/index.html"); }

</script>
</body>
</html>
