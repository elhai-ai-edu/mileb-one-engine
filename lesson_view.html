<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson View - MilEd.One</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f172a;
      --blue: #1d4ed8;
      --cyan: #0f766e;
      --ink: #0f172a;
      --muted: #475569;
      --line: #dbe7ff;
      --panel: rgba(255,255,255,0.92);
      --good: #166534;
      --warn: #92400e;
    }
    * { box-sizing: border-box; }
    html { font-size: 113%; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Assistant", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(29,78,216,0.16), transparent 35%),
        radial-gradient(circle at 86% 16%, rgba(15,118,110,0.14), transparent 30%),
        linear-gradient(165deg, #f7fbff 0%, #eef4ff 44%, #f7fbff 100%);
    }
    .shell {
      width: min(1540px, 97vw);
      margin: 14px auto;
      display: grid;
      gap: 14px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 22px;
      background: linear-gradient(120deg, #0f172a, #1d4ed8 60%, #0f766e 100%);
      color: #fff;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.2);
    }
    .topbar-title { display: grid; gap: 4px; }
    .topbar-title strong { font-size: 1.3rem; }
    .topbar-sub { color: rgba(255,255,255,0.82); font-size: 0.86rem; }
    .topbar-chips {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .chip {
      border-radius: 999px;
      padding: 7px 11px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.12);
      font-size: 0.82rem;
      font-weight: 700;
    }
    .preview-exit-btn {
      border-radius: 999px;
      padding: 7px 11px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.96);
      color: #0f172a;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
    }
    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr) 400px;
      gap: 14px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 16px 40px rgba(15,23,42,0.08);
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f8fbff, #eef4ff);
      font-weight: 800;
      color: #1e3a8a;
    }
    .panel-body {
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .resource-list, .admin-links, .sprint-list { display: grid; gap: 10px; }
    .resource-card, .sprint-card, .state-strip {
      border: 1px solid #dbeafe;
      border-radius: 16px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .resource-row {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
    }
    .resource-title { font-weight: 800; line-height: 1.35; }
    .resource-meta { color: var(--muted); font-size: 0.82rem; }
    .mini-btn, .action-btn {
      border-radius: 12px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 9px 11px;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }
    .mini-btn.ghost {
      background: #fff;
      color: #0f172a;
      border-color: #cbd5e1;
    }
    .mini-btn.push {
      background: #ecfeff;
      color: #155e75;
      border-color: #a5f3fc;
    }
    .action-btn.primary {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      border-color: #1d4ed8;
    }
    .action-btn.support {
      background: #fffbeb;
      color: var(--warn);
      border-color: #fcd34d;
    }
    .action-btn.good {
      background: #ecfdf5;
      color: var(--good);
      border-color: #86efac;
    }
    .stage {
      display: grid;
      gap: 14px;
      min-height: calc(100vh - 160px);
    }
    .stage-hero {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #f8fbff, #edf6ff);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stage-display {
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .presentation-frame {
      width: 100%;
      min-height: 460px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      background: linear-gradient(180deg, #fff, #f8fbff);
    }
    .hero-copy { max-width: 62ch; }
    .hero-copy h1 { margin: 0 0 6px; font-size: 1.45rem; }
    .hero-copy p { margin: 0; color: var(--muted); line-height: 1.65; }
    .active-sprint-box {
      border: 1px solid #dbeafe;
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      display: grid;
      gap: 10px;
    }
    .station-badge {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 800;
      background: #dbeafe;
      color: #1d4ed8;
    }
    .station-badge.physical { background: #fef3c7; color: #92400e; }
    .station-badge.plenary { background: #fee2e2; color: #991b1b; }
    .station-badge.ai { background: #dcfce7; color: #166534; }
    .guidance-box {
      border-radius: 14px;
      padding: 12px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
      line-height: 1.6;
    }
    .guidance-box.fast {
      background: #ecfeff;
      border-color: #67e8f9;
      color: #155e75;
    }
    .evidence-box {
      display: grid;
      gap: 10px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #dbeafe;
      padding: 12px;
    }
    textarea {
      width: 100%;
      min-height: 92px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      padding: 11px 12px;
      resize: vertical;
      font: inherit;
    }
    .chat-shell {
      min-height: calc(100vh - 160px);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .chat-frame {
      width: 100%;
      min-height: calc(100vh - 240px);
      border: 0;
      background: #fff;
    }
    .heat-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      font-size: 0.84rem;
    }
    .heat-pill {
      border-radius: 999px;
      padding: 4px 8px;
      font-weight: 800;
      font-size: 0.74rem;
    }
    .heat-pill.fast { background: #cffafe; color: #155e75; }
    .heat-pill.support { background: #fee2e2; color: #991b1b; }
    .heat-pill.normal { background: #e2e8f0; color: #334155; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.62);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }
    .modal.visible { display: flex; }
    .modal-card {
      width: min(1100px, 94vw);
      max-height: 88vh;
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(15,23,42,0.24);
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .modal-head {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid #dbeafe;
    }
    .modal-body { padding: 16px; }
    .modal-body iframe {
      width: 100%;
      height: 70vh;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      background: #fff;
    }
    @media (max-width: 1240px) {
      .layout { grid-template-columns: 1fr; }
      .chat-shell, .stage { min-height: auto; }
      .chat-frame, .presentation-frame { min-height: 540px; }
    }
  </style>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="/firebase-init.js"></script>
    <script src="/auth-guard.js?v=20260409a"></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-title">
        <strong id="lessonTitle">שיעור חי</strong>
        <div class="topbar-sub" id="lessonSubtitle">טוען נתוני שיעור...</div>
      </div>
      <div class="topbar-chips">
        <div class="chip" id="roleChip">Student View</div>
        <div class="chip" id="previewChip" style="display:none;background:#fff7ed;color:#9a3412;border-color:#fdba74;">Student Preview</div>
        <button id="previewExitBtn" class="preview-exit-btn" type="button">חזרה לתצוגה הרגילה</button>
        <div class="chip" id="doorChip">Door: --</div>
        <div class="chip" id="sessionChip">sessionId: --</div>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <div class="panel-head">Bookshelf</div>
        <div class="panel-body">
          <div class="state-strip">
            <strong id="bookshelfLessonId">lessonId: --</strong>
            <div class="resource-meta" id="selectedUnitsMeta">אין יחידות משויכות</div>
          </div>
          <div id="adminLinks" class="admin-links" style="display:none;"></div>
          <div id="resourceList" class="resource-list"></div>
        </div>
      </aside>

      <section class="panel stage">
        <div class="stage-hero">
          <div class="hero-copy">
            <h1 id="stageTitle">מרחב מצגת וספרינט</h1>
            <p id="stageSubtitle">המשאב הדחוף, הספרינט הפעיל או הוראות המליאה יוצגו כאן.</p>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="mini-btn ghost" id="clearPushBtn" style="display:none;">נקה משאב דחוף</button>
            <button class="mini-btn" id="refreshBtn">רענן</button>
          </div>
        </div>
        <div class="stage-display">
          <div id="activeSprintBox" class="active-sprint-box"></div>
          <iframe id="presentationFrame" class="presentation-frame" title="presentation-stage"></iframe>
          <div id="sprintList" class="sprint-list"></div>
        </div>
      </section>

      <aside class="panel chat-shell">
        <div class="panel-head">Chat</div>
        <iframe id="chatFrame" class="chat-frame" title="lesson-chat"></iframe>
      </aside>
    </main>
  </div>

  <div id="pushedModal" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <strong id="modalTitle">משאב דחוף</strong>
        <button id="closeModalBtn" class="mini-btn ghost" type="button">סגור</button>
      </div>
      <div class="modal-body">
        <iframe id="modalFrame" title="pushed-resource"></iframe>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const sessionId = String(params.get("sessionId") || "").trim();
    const courseIdFromUrl = String(params.get("courseId") || params.get("classId") || "").trim();
    const unitIdFromUrl = String(params.get("unitId") || "unit_01").trim() || "unit_01";
    const gatewayRedirect = `/index.html${params.toString() ? `?${params.toString()}` : ""}`;
    const lessonViewAccessReady = window.MiledAccess?.enforcePageAccess(["student", "lecturer", "institution_admin", "system_admin"], gatewayRedirect);
    let sessionUser = null;
    let canonicalRole = "";
    let isStudentPreview = false;
    let role = "student";
    let previewExitTarget = "/index.html";
    const studentContextKey = courseIdFromUrl || sessionId || "global";
    const studentIdKey = `miled_student_id_${studentContextKey}`;
    const studentNameKey = `miled_student_name_${studentContextKey}`;
    const studentId = localStorage.getItem(studentIdKey) || (`stu_${Math.random().toString(36).slice(2, 10)}`);
    localStorage.setItem(studentIdKey, studentId);
    let studentName = localStorage.getItem(studentNameKey) || studentId.slice(0, 8);

    let lessonData = null;
    let refreshTimer = null;
    let heartbeatTimer = null;
    let lastPushedSignature = null;
    let currentGuidance = null;

    async function bootstrapLessonAccess() {
      const access = await lessonViewAccessReady;
      if (!access?.ok) return false;

      sessionUser = window.MiledAccess?.getSessionUser?.()
        || window.MiledAccess?.buildSessionUser?.(access.authUser, access.canonicalRole, access.institutionId)
        || null;
      canonicalRole = access.canonicalRole || sessionUser?.canonicalRole || window.MiledAccess?.normalizeRole?.(sessionUser?.role) || "";
      isStudentPreview = !!window.MiledAccess?.isStudentPreviewEnabled?.(canonicalRole);
      role = !isStudentPreview && canonicalRole && canonicalRole !== "student" ? "lecturer" : "student";
      previewExitTarget = window.MiledAccess?.getRoleHome?.(canonicalRole) || "/index.html";
      studentName = localStorage.getItem(studentNameKey) || sessionUser?.displayName || sessionUser?.name || studentId.slice(0, 8);
      localStorage.setItem(studentNameKey, studentName);

      if (isStudentPreview) {
        const previewChip = document.getElementById("previewChip");
        if (previewChip) previewChip.style.display = "inline-flex";
        const previewExitBtn = document.getElementById("previewExitBtn");
        if (previewExitBtn) {
          previewExitBtn.style.display = "inline-flex";
          previewExitBtn.addEventListener("click", () => {
            window.MiledAccess?.clearPreviewRole?.();
            location.replace(previewExitTarget);
          });
        }
      }

      return true;
    }

    function resolveFacultyActorId() {
      return sessionUser?.id || sessionUser?.uid || sessionUser?.email || lessonData?.facultyId || "";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function iconForResource(kind) {
      if (kind === "pdf") return "PDF";
      if (kind === "link") return "LINK";
      if (kind === "task") return "TASK";
      if (kind === "file") return "FILE";
      return "ITEM";
    }

    async function callClassroom(method, payload = null, query = "") {
      if (method === "GET") {
        const res = await fetch(`/.netlify/functions/classroom${query}`);
        return res.json();
      }
      const res = await fetch("/.netlify/functions/classroom", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload || {})
      });
      return res.json();
    }

    async function callGatekeeping(method, payload = null, query = "") {
      const url = `/api/gatekeeping${query}`;
      if (method === "GET") {
        const res = await fetch(url);
        return res.json();
      }
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload || {})
      });
      return res.json();
    }

    function renderGateStatusHtml(statusData = null) {
      if (!statusData || statusData.ok === false) {
        return '<div class="resource-meta">אין נתוני gatekeeping זמינים כרגע.</div>';
      }

      const unlockState = statusData.unlockState?.state || null;
      const submissionId = statusData.submission?.submissionId || null;
      const evaluationStatus = statusData.evaluation?.status || null;
      const feedback = statusData.evaluation?.feedback || null;
      const tokenStatus = statusData.token?.status || null;
      const revision = Object.values(statusData.revisionRequests || {}).find(item => item?.status === "open") || null;

      const rows = [];
      if (unlockState) rows.push(`<div class="resource-meta"><strong>unlock:</strong> ${escapeHtml(unlockState)}</div>`);
      if (submissionId) rows.push(`<div class="resource-meta"><strong>submission:</strong> ${escapeHtml(submissionId)}</div>`);
      if (evaluationStatus) rows.push(`<div class="resource-meta"><strong>evaluation:</strong> ${escapeHtml(evaluationStatus)}</div>`);
      if (feedback) rows.push(`<div class="resource-meta"><strong>feedback:</strong> ${escapeHtml(feedback)}</div>`);
      if (tokenStatus) rows.push(`<div class="resource-meta"><strong>token:</strong> ${escapeHtml(tokenStatus)}</div>`);
      if (revision?.reasonSummary) rows.push(`<div class="resource-meta"><strong>revision:</strong> ${escapeHtml(revision.reasonSummary)}</div>`);

      const history = statusData.history || {};
      const historyRows = [];
      (history.submissions || []).slice(0, 3).forEach(item => {
        historyRows.push(`submit ${item?.submissionId || "-"} | ${item?.submittedAt || "-"}`);
      });
      (history.evaluations || []).slice(0, 3).forEach(item => {
        historyRows.push(`eval ${item?.status || "-"} | ${item?.evaluatedAt || "-"}`);
      });
      if (historyRows.length) {
        rows.push(`<div class="resource-meta"><strong>history:</strong><br>${historyRows.map(line => escapeHtml(line)).join("<br>")}</div>`);
      }

      return rows.length ? rows.join("") : '<div class="resource-meta">אין אירועי gatekeeping לשלב הנוכחי.</div>';
    }

    function renderGateQueueHtml(queue = []) {
      if (!Array.isArray(queue) || !queue.length) {
        return '<div class="resource-meta">אין פריטי gatekeeping לשלב הנוכחי.</div>';
      }

      return queue.slice(0, 12).map(item => `
        <div class="heat-row" style="grid-template-columns:1.2fr 1fr 1fr 1fr;">
          <span>${escapeHtml(item.studentName || item.studentId || "student")}</span>
          <span>${escapeHtml(item.stageId || "-")}</span>
          <span>${escapeHtml(item.evaluationStatus || "pending")}</span>
          <span class="heat-pill ${escapeHtml((item.unlockState || "locked") === "unlocked" ? "fast" : "support")}">${escapeHtml(item.unlockState || "locked")}</span>
        </div>
      `).join("");
    }

    async function getCurrentGateStatusForStage(stageId) {
      const courseId = lessonData?.courseId || courseIdFromUrl;
      if (!courseId || !stageId) return null;
      const targetStudentId = role === "student"
        ? studentId
        : String(document.getElementById("gateLecturerStudentId")?.value || "").trim();
      if (!targetStudentId) return null;

      try {
        return await callGatekeeping(
          "GET",
          null,
          `?studentId=${encodeURIComponent(targetStudentId)}&courseId=${encodeURIComponent(courseId)}&stageId=${encodeURIComponent(stageId)}`
        );
      } catch {
        return null;
      }
    }

    function buildWaitingLobbyUrl() {
      const query = new URLSearchParams();
      if (courseIdFromUrl) query.set("courseId", courseIdFromUrl);
      if (unitIdFromUrl) query.set("unitId", unitIdFromUrl);
      if (sessionId) query.set("sessionId", sessionId);
      return `/waiting_lobby.html?${query.toString()}`;
    }

    function syncLessonUrlContext() {
      if (!lessonData) return;
      const nextParams = new URLSearchParams(location.search);
      if (sessionId) nextParams.set("sessionId", sessionId);
      if (lessonData.courseId) nextParams.set("courseId", lessonData.courseId);
      if (lessonData.lessonId) nextParams.set("unitId", lessonData.lessonId);
      const nextUrl = `/lesson_view.html?${nextParams.toString()}`;
      if (`${location.pathname}${location.search}` !== nextUrl) {
        history.replaceState({}, "", nextUrl);
      }
    }

    function setChatFrame(courseId, botType) {
      const chatFrame = document.getElementById("chatFrame");
      const query = new URLSearchParams();
      if (courseId) query.set("classId", courseId);
      if (!courseId && botType) query.set("botType", botType);
      query.set("sessionId", sessionId);
      chatFrame.src = `/chat.html?${query.toString()}`;
    }

    function buildResourceCard(resource) {
      const linkAction = resource.url
        ? `<a class="mini-btn ghost" href="${resource.url}" target="_blank" rel="noopener">פתח</a>`
        : `<span class="mini-btn ghost" style="opacity:.55;cursor:default;">ללא קישור</span>`;
      const pushAction = role === "lecturer"
        ? `<button class="mini-btn push" type="button" data-push-id="${escapeHtml(resource.id)}">Push to Students</button>`
        : "";
      return `
        <div class="resource-card">
          <div class="resource-row">
            <div>
              <div class="resource-title">${escapeHtml(iconForResource(resource.kind))} · ${escapeHtml(resource.title)}</div>
              <div class="resource-meta">${escapeHtml(resource.unitName || resource.unitId || "יחידה לא מזוהה")}${resource.lecturerOnly ? ' · Lecturer Only' : ''}</div>
            </div>
            <div style="display:grid;gap:6px;justify-items:end;">${linkAction}${pushAction}</div>
          </div>
        </div>`;
    }

    function renderResources() {
      const resources = Array.isArray(lessonData?.resources) ? lessonData.resources : [];
      const visible = role === "lecturer" ? resources : resources.filter(resource => !resource.lecturerOnly);
      const list = document.getElementById("resourceList");
      const selectedUnitsMeta = document.getElementById("selectedUnitsMeta");
      const lessonIdLabel = document.getElementById("bookshelfLessonId");
      const selectedUnits = Array.isArray(lessonData?.selectedUnits) ? lessonData.selectedUnits : [];

      lessonIdLabel.textContent = `lessonId: ${lessonData?.lessonId || "--"}`;
      selectedUnitsMeta.textContent = selectedUnits.length
        ? selectedUnits.map(unit => unit.name || unit.unitId).join(" | ")
        : "אין יחידות משויכות";
      list.innerHTML = visible.length ? visible.map(buildResourceCard).join("") : '<div class="resource-meta">אין משאבים זמינים ליחידה הפעילה.</div>';

      list.querySelectorAll("[data-push-id]").forEach(button => {
        button.addEventListener("click", async () => {
          const resource = resources.find(item => String(item.id) === String(button.dataset.pushId));
          if (!resource) return;
          await callClassroom("POST", {
            action: "resource_push",
            sessionId,
            facultyId: resolveFacultyActorId(),
            resource
          });
          await refreshLesson();
        });
      });
    }

    function renderAdminLinks() {
      const admin = document.getElementById("adminLinks");
      if (role !== "lecturer") {
        admin.style.display = "none";
        admin.innerHTML = "";
        return;
      }

      admin.style.display = "grid";
      admin.innerHTML = `
        <div class="state-strip">
          <strong>Lecturer Controls</strong>
          <div class="resource-meta">משאבי ניהול זמינים רק בתצוגת מרצה.</div>
        </div>
        <a class="mini-btn ghost" href="/lecturer_cockpit.html?courseId=${encodeURIComponent(lessonData?.courseId || "")}&unitId=${encodeURIComponent(lessonData?.lessonId || "unit_01")}" target="_blank">פתח קוקפיט</a>
      `;
    }

    function sprintTypeClass(stationType) {
      const normalized = String(stationType || "AI_STATION").toLowerCase();
      if (normalized.includes("physical")) return "physical";
      if (normalized.includes("plenary")) return "plenary";
      return "ai";
    }

    function findActiveSprint() {
      const sprints = Array.isArray(lessonData?.sprintDefinitions) ? lessonData.sprintDefinitions : [];
      const activeSprintId = String(lessonData?.state?.active_sprint || "").trim();
      if (!sprints.length) return null;
      return sprints.find(item => String(item.id) === activeSprintId) || sprints[0];
    }

    function renderActiveSprint() {
      const box = document.getElementById("activeSprintBox");
      const frame = document.getElementById("presentationFrame");
      const pushedResource = lessonData?.state?.pushed_resource || null;
      const activeSprint = findActiveSprint();
      const guidance = currentGuidance || null;

      if (pushedResource?.url) {
        frame.src = pushedResource.url;
        document.getElementById("stageTitle").textContent = pushedResource.title || "משאב דחוף";
        document.getElementById("stageSubtitle").textContent = "המרצה דחף משאב לכל הכיתה. הוא מוצג גם במרכז הבמה.";
        document.getElementById("clearPushBtn").style.display = role === "lecturer" ? "" : "none";
      } else {
        frame.removeAttribute("src");
        frame.srcdoc = '<div style="height:100%;display:flex;align-items:center;justify-content:center;font-family:Assistant,sans-serif;color:#475569;background:linear-gradient(180deg,#ffffff,#f8fbff);padding:24px;text-align:center;">אין כרגע משאב דחוף. התוכן הפעיל יוצג כאן כשהמרצה ידחוף קובץ, קישור או מצגת.</div>';
        document.getElementById("stageTitle").textContent = activeSprint?.title || "מרחב מצגת וספרינט";
        document.getElementById("stageSubtitle").textContent = activeSprint?.instructions || "בחר ספרינט פעיל או דחוף משאב מה-Bookshelf.";
        document.getElementById("clearPushBtn").style.display = "none";
      }

      if (!activeSprint) {
        box.innerHTML = '<div class="resource-meta">לא הוגדרו סבבים ליחידה הפעילה.</div>';
        return;
      }

      const stationClass = sprintTypeClass(activeSprint.stationType);
      const guidanceBox = guidance ? `<div class="guidance-box ${guidance.pathDecision === "fast" ? "fast" : ""}">${escapeHtml(guidance.guidance)}</div>` : "";
      const plenaryNote = String(activeSprint.stationType || "").toUpperCase() === "PLENARY_STATION"
        ? '<div class="guidance-box">Plenary Station: המסך ממוקד בשיח כיתתי. הסטודנטים אמורים להקשיב, להשוות, ולחזור לשיחה בהמשך.</div>'
        : "";
      const evidenceBox = String(activeSprint.stationType || "").toUpperCase() === "PHYSICAL_STATION"
        ? `
          <div class="evidence-box">
            <strong>Proof of Work</strong>
            <div class="resource-meta">העלה תמונה או סיכום קצר כדי לשחרר את הספרינט הבא.</div>
            <textarea id="evidenceText" placeholder="סיכום קצר של העבודה הפיזית"></textarea>
            <input id="evidenceImage" type="file" accept="image/*">
            <button class="action-btn support" id="submitEvidenceBtn" type="button">שלח הוכחת עבודה</button>
          </div>`
        : "";

      const gatekeepingBox = role === "student"
        ? `
          <div class="evidence-box">
            <strong>Gatekeeping Submission</strong>
            <div class="resource-meta">הגשה פורמלית לאישור שלב ${escapeHtml(activeSprint.id || "")}</div>
            <textarea id="gateSubmissionText" placeholder="מה מוגש לבדיקה? צרף סיכום קצר"></textarea>
            <input id="gatePayloadRef" placeholder="מזהה חיצוני (אופציונלי)">
            <button class="action-btn support" id="gateSubmitBtn" type="button">שלח ל-Gatekeeping</button>
            <div id="gateStatusBox"></div>
          </div>`
        : `
          <div class="evidence-box">
            <strong>Gatekeeping Control</strong>
            <div class="resource-meta">בקרת אישור/דחייה לשלב ${escapeHtml(activeSprint.id || "")}</div>
            <input id="gateLecturerStudentId" placeholder="studentId לבדיקה">
            <input id="gateLecturerSubmissionId" placeholder="submissionId (אם ריק תיבחר ההגשה האחרונה בשלב)">
            <select id="gateDecision">
              <option value="approved">approved</option>
              <option value="rejected">rejected</option>
              <option value="review_required">review_required</option>
            </select>
            <textarea id="gateDecisionFeedback" placeholder="משוב למערכת ולסטודנט"></textarea>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="action-btn primary" id="gateLoadStatusBtn" type="button">טען סטטוס</button>
              <button class="action-btn support" id="gateEvaluateBtn" type="button">שלח החלטה</button>
            </div>
            <div id="gateStatusBox"></div>
          </div>`;

      const controls = role === "student"
        ? `
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="action-btn primary" id="startSprintBtn" type="button">התחל ספרינט</button>
            <button class="action-btn good" id="completeSprintBtn" type="button">סיימתי ספרינט</button>
          </div>`
        : "";

      box.innerHTML = `
        <div class="station-badge ${stationClass}">${escapeHtml(activeSprint.stationType || "AI_STATION")}</div>
        <strong>${escapeHtml(activeSprint.title || "Sprint")}</strong>
        <div class="resource-meta">${escapeHtml(activeSprint.instructions || "")}</div>
        ${guidanceBox}
        ${plenaryNote}
        ${controls}
        ${evidenceBox}
        ${gatekeepingBox}
      `;

      bindSprintActions(activeSprint);
    }

    function renderSprintList() {
      const list = document.getElementById("sprintList");
      const sprints = Array.isArray(lessonData?.sprintDefinitions) ? lessonData.sprintDefinitions : [];
      if (!sprints.length) {
        list.innerHTML = "";
        return;
      }
      const activeId = String(lessonData?.state?.active_sprint || "").trim();
      list.innerHTML = sprints.map(sprint => {
        const isActive = String(sprint.id) === activeId || (!activeId && sprint === sprints[0]);
        const lecturerButton = role === "lecturer"
          ? `<button class="mini-btn" type="button" data-activate-sprint="${escapeHtml(sprint.id)}">הפעל</button>`
          : "";
        return `
          <div class="sprint-card">
            <div class="resource-row">
              <div>
                <div class="resource-title">${escapeHtml(sprint.title || sprint.id)}</div>
                <div class="resource-meta">${escapeHtml(sprint.stationType || "AI_STATION")}${isActive ? ' · פעיל כעת' : ''}</div>
              </div>
              ${lecturerButton}
            </div>
            <div class="resource-meta">${escapeHtml(sprint.instructions || "")}</div>
          </div>`;
      }).join("");

      list.querySelectorAll("[data-activate-sprint]").forEach(button => {
        button.addEventListener("click", async () => {
          await callClassroom("POST", {
            action: "session_state_update",
            sessionId,
            facultyId: resolveFacultyActorId(),
            activeSprint: button.dataset.activateSprint
          });
          await refreshLesson();
        });
      });
    }

    function bindSprintActions(activeSprint) {
      const startBtn = document.getElementById("startSprintBtn");
      const completeBtn = document.getElementById("completeSprintBtn");
      const evidenceBtn = document.getElementById("submitEvidenceBtn");
      const gateSubmitBtn = document.getElementById("gateSubmitBtn");
      const gateLoadStatusBtn = document.getElementById("gateLoadStatusBtn");
      const gateEvaluateBtn = document.getElementById("gateEvaluateBtn");
      const gateStatusBox = document.getElementById("gateStatusBox");

      if (startBtn) {
        startBtn.addEventListener("click", async () => {
          const gateStatus = await getCurrentGateStatusForStage(activeSprint.id);
          const unlockState = gateStatus?.unlockState?.state || null;
          if (["locked", "pending_review", "relocked"].includes(String(unlockState || ""))) {
            if (gateStatusBox) gateStatusBox.innerHTML = `<div class="resource-meta">${escapeHtml(`השלב חסום כרגע (${unlockState}).`)}</div>`;
            return;
          }

          const response = await callClassroom("POST", {
            action: "pacing_update",
            sessionId,
            studentId,
            studentName,
            currentSprint: activeSprint.id,
            eventType: "sprint_started"
          });
          currentGuidance = response?.pacing?.guidance ? {
            pathDecision: response.pacing.pathDecision,
            guidance: response.pacing.guidance
          } : null;
          renderActiveSprint();
        });
      }

      if (completeBtn) {
        completeBtn.addEventListener("click", async () => {
          const gateStatus = await getCurrentGateStatusForStage(activeSprint.id);
          const unlockState = gateStatus?.unlockState?.state || null;
          if (["locked", "pending_review", "relocked"].includes(String(unlockState || ""))) {
            if (gateStatusBox) gateStatusBox.innerHTML = `<div class="resource-meta">${escapeHtml(`לא ניתן לסיים ספרינט לפני אישור (${unlockState}).`)}</div>`;
            return;
          }

          const response = await callClassroom("POST", {
            action: "pacing_update",
            sessionId,
            studentId,
            studentName,
            currentSprint: activeSprint.id,
            eventType: "sprint_completed"
          });
          currentGuidance = response?.pacing?.guidance ? {
            pathDecision: response.pacing.pathDecision,
            guidance: response.pacing.guidance
          } : null;
          renderActiveSprint();
        });
      }

      if (evidenceBtn) {
        evidenceBtn.addEventListener("click", async () => {
          const evidenceText = String(document.getElementById("evidenceText")?.value || "").trim();
          const file = document.getElementById("evidenceImage")?.files?.[0] || null;
          let imageDataUrl = "";
          if (file) {
            imageDataUrl = await new Promise(resolve => {
              const reader = new FileReader();
              reader.onloadend = () => resolve(String(reader.result || ""));
              reader.readAsDataURL(file);
            });
          }
          await callClassroom("POST", {
            action: "evidence_submit",
            sessionId,
            studentId,
            studentName,
            sprintId: activeSprint.id,
            text: evidenceText,
            imageDataUrl
          });
          const response = await callClassroom("POST", {
            action: "pacing_update",
            sessionId,
            studentId,
            studentName,
            currentSprint: activeSprint.id,
            eventType: "heartbeat"
          });
          currentGuidance = response?.pacing?.guidance ? {
            pathDecision: response.pacing.pathDecision,
            guidance: response.pacing.guidance
          } : currentGuidance;
          renderActiveSprint();
        });
      }

      if (gateSubmitBtn) {
        gateSubmitBtn.addEventListener("click", async () => {
          const payloadText = String(document.getElementById("gateSubmissionText")?.value || "").trim();
          const payloadRef = String(document.getElementById("gatePayloadRef")?.value || "").trim();
          const courseId = lessonData?.courseId || courseIdFromUrl;
          if (!courseId) {
            if (gateStatusBox) gateStatusBox.innerHTML = '<div class="resource-meta">חסר courseId להגשה.</div>';
            return;
          }

          if (gateStatusBox) gateStatusBox.innerHTML = '<div class="resource-meta">שולח הגשת gatekeeping...</div>';
          const submitResult = await callGatekeeping("POST", {
            action: "submit",
            studentId,
            courseId,
            stageId: activeSprint.id,
            sessionId,
            payloadRef: payloadRef || null,
            payload: { summary: payloadText || null },
            payloadSummary: payloadText || null
          });

          if (submitResult?.ok) {
            const statusResult = await callGatekeeping(
              "GET",
              null,
              `?studentId=${encodeURIComponent(studentId)}&courseId=${encodeURIComponent(courseId)}&stageId=${encodeURIComponent(activeSprint.id)}`
            );
            if (gateStatusBox) gateStatusBox.innerHTML = renderGateStatusHtml(statusResult);
          } else if (gateStatusBox) {
            gateStatusBox.innerHTML = `<div class="resource-meta">${escapeHtml(submitResult?.error || "הגשה נכשלה")}</div>`;
          }
        });
      }

      if (gateLoadStatusBtn) {
        gateLoadStatusBtn.addEventListener("click", async () => {
          const targetStudentId = String(document.getElementById("gateLecturerStudentId")?.value || "").trim();
          const courseId = lessonData?.courseId || courseIdFromUrl;
          if (!targetStudentId || !courseId) {
            if (gateStatusBox) gateStatusBox.innerHTML = '<div class="resource-meta">נדרש studentId ו-courseId לטעינת סטטוס.</div>';
            return;
          }
          if (gateStatusBox) gateStatusBox.innerHTML = '<div class="resource-meta">טוען סטטוס...</div>';
          const statusResult = await callGatekeeping(
            "GET",
            null,
            `?studentId=${encodeURIComponent(targetStudentId)}&courseId=${encodeURIComponent(courseId)}&stageId=${encodeURIComponent(activeSprint.id)}`
          );
          if (gateStatusBox) gateStatusBox.innerHTML = renderGateStatusHtml(statusResult);
          const candidateSubmissionId = statusResult?.submission?.submissionId || "";
          if (candidateSubmissionId) {
            const submissionInput = document.getElementById("gateLecturerSubmissionId");
            if (submissionInput && !String(submissionInput.value || "").trim()) {
              submissionInput.value = candidateSubmissionId;
            }
          }
        });
      }

      if (gateEvaluateBtn) {
        gateEvaluateBtn.addEventListener("click", async () => {
          const targetStudentId = String(document.getElementById("gateLecturerStudentId")?.value || "").trim();
          const explicitSubmissionId = String(document.getElementById("gateLecturerSubmissionId")?.value || "").trim();
          const decision = String(document.getElementById("gateDecision")?.value || "approved").trim();
          const feedback = String(document.getElementById("gateDecisionFeedback")?.value || "").trim();
          const courseId = lessonData?.courseId || courseIdFromUrl;

          if (!targetStudentId || !courseId) {
            if (gateStatusBox) gateStatusBox.innerHTML = '<div class="resource-meta">נדרש studentId ו-courseId להחלטה.</div>';
            return;
          }

          let submissionId = explicitSubmissionId;
          if (!submissionId) {
            const statusResult = await callGatekeeping(
              "GET",
              null,
              `?studentId=${encodeURIComponent(targetStudentId)}&courseId=${encodeURIComponent(courseId)}&stageId=${encodeURIComponent(activeSprint.id)}`
            );
            submissionId = String(statusResult?.submission?.submissionId || "").trim();
          }

          if (!submissionId) {
            if (gateStatusBox) gateStatusBox.innerHTML = '<div class="resource-meta">לא נמצאה הגשה לשלב הנוכחי.</div>';
            return;
          }

          if (gateStatusBox) gateStatusBox.innerHTML = '<div class="resource-meta">שולח החלטה...</div>';
          const evalResult = await callGatekeeping("POST", {
            action: "evaluate",
            studentId: targetStudentId,
            courseId,
            submissionId,
            stageId: activeSprint.id,
            status: decision,
            feedback,
            reviewMode: "hybrid",
            actorId: resolveFacultyActorId(),
            actorRole: canonicalRole || role,
            actorEmail: sessionUser?.email || null
          });

          if (evalResult?.ok) {
            const statusResult = await callGatekeeping(
              "GET",
              null,
              `?studentId=${encodeURIComponent(targetStudentId)}&courseId=${encodeURIComponent(courseId)}&stageId=${encodeURIComponent(activeSprint.id)}`
            );
            if (gateStatusBox) gateStatusBox.innerHTML = renderGateStatusHtml(statusResult);
          } else if (gateStatusBox) {
            gateStatusBox.innerHTML = `<div class="resource-meta">${escapeHtml(evalResult?.error || "שליחת החלטה נכשלה")}</div>`;
          }
        });
      }

      if (gateStatusBox) {
        const courseId = lessonData?.courseId || courseIdFromUrl;
        const targetStudentId = role === "student"
          ? studentId
          : String(document.getElementById("gateLecturerStudentId")?.value || "").trim();
        if (targetStudentId && courseId) {
          callGatekeeping(
            "GET",
            null,
            `?studentId=${encodeURIComponent(targetStudentId)}&courseId=${encodeURIComponent(courseId)}&stageId=${encodeURIComponent(activeSprint.id)}`
          ).then(statusResult => {
            gateStatusBox.innerHTML = renderGateStatusHtml(statusResult);
          }).catch(() => {
            gateStatusBox.innerHTML = '<div class="resource-meta">שגיאה בטעינת סטטוס gatekeeping.</div>';
          });
        }
      }
    }

    function renderPushedModal() {
      const pushed = lessonData?.state?.pushed_resource || null;
      const signature = pushed?.id && pushed?.pushedAt ? `${pushed.id}_${pushed.pushedAt}` : null;
      if (!signature || role === "lecturer") return;
      if (signature === lastPushedSignature) return;
      lastPushedSignature = signature;
      if (!pushed.url) return;
      document.getElementById("modalTitle").textContent = pushed.title || "משאב דחוף";
      document.getElementById("modalFrame").src = pushed.url;
      document.getElementById("pushedModal").classList.add("visible");
    }

    function renderHeatStrip() {
      if (role !== "lecturer") return;
      const admin = document.getElementById("adminLinks");
      const pacing = lessonData?.pacing?.heatmap || [];
      const strip = pacing.length
        ? pacing.slice(0, 8).map(item => `
            <div class="heat-row">
              <span>${escapeHtml(item.studentName || item.studentId || "student")}</span>
              <span>${escapeHtml(item.sprint || "-")}</span>
              <span class="heat-pill ${escapeHtml(item.pathDecision || "normal")}">${escapeHtml(item.pathDecision || "normal")}</span>
            </div>`).join("")
        : '<div class="resource-meta">אין עדיין נתוני pacing פעילים.</div>';
      admin.innerHTML += `<div class="state-strip"><strong>Live Heatmap</strong>${strip}</div>`;

      const currentStage = String(findActiveSprint()?.id || "").trim();
      const courseId = lessonData?.courseId || courseIdFromUrl;
      if (courseId && currentStage) {
        callGatekeeping(
          "GET",
          null,
          `?action=queue_by_course&courseId=${encodeURIComponent(courseId)}&stageId=${encodeURIComponent(currentStage)}`
        ).then(queueResult => {
          admin.innerHTML += `<div class="state-strip"><strong>Gatekeeping Queue</strong>${renderGateQueueHtml(queueResult?.queue || [])}</div>`;
        }).catch(() => {
          admin.innerHTML += '<div class="state-strip"><strong>Gatekeeping Queue</strong><div class="resource-meta">טעינת תור נכשלה.</div></div>';
        });
      }
    }

    async function refreshLesson() {
      if (!sessionId) return;
      lessonData = await callClassroom("GET", null, `?action=lesson_payload&sessionId=${encodeURIComponent(sessionId)}`);
      syncLessonUrlContext();
      const selectedUnits = Array.isArray(lessonData?.selectedUnits) ? lessonData.selectedUnits : [];
      const primaryUnitName = selectedUnits[0]?.name || lessonData?.lessonId || "יחידה פעילה";
      const courseName = lessonData?.courseName || lessonData?.courseId || "שיעור חי";
      const courseLabel = lessonData?.courseId ? `courseId: ${lessonData.courseId}` : "Faculty Tool";
      document.getElementById("lessonTitle").textContent = courseName;
      document.getElementById("lessonSubtitle").textContent = `${primaryUnitName} | ${courseLabel} | ${lessonData?.resources?.length || 0} resources | ${selectedUnits.length || 0} mapped units`;
      document.getElementById("sessionChip").textContent = `sessionId: ${sessionId}`;
      document.getElementById("doorChip").textContent = `Door: ${String(lessonData?.state?.door_status || "auto").toUpperCase()}`;
      document.getElementById("roleChip").textContent = role === "lecturer" ? "Lecturer View" : "Student View";

      const activeSprint = findActiveSprint();
      if (activeSprint) {
        const stageStatus = await getCurrentGateStatusForStage(activeSprint.id);
        const unlockState = stageStatus?.unlockState?.state || null;
        if (unlockState) {
          document.getElementById("lessonSubtitle").textContent += ` | gate: ${String(unlockState).toUpperCase()}`;
        }
      }

      renderAdminLinks();
      renderResources();
      renderHeatStrip();
      renderActiveSprint();
      renderSprintList();
      renderPushedModal();
      setChatFrame(lessonData?.courseId || "", lessonData?.botType || "");
    }

    async function sendHeartbeat() {
      const activeSprint = findActiveSprint();
      if (role !== "student" || !activeSprint) return;
      const response = await callClassroom("POST", {
        action: "pacing_update",
        sessionId,
        studentId,
        studentName,
        currentSprint: activeSprint.id,
        eventType: "heartbeat"
      });
      currentGuidance = response?.pacing?.guidance ? {
        pathDecision: response.pacing.pathDecision,
        guidance: response.pacing.guidance
      } : currentGuidance;
      renderActiveSprint();
    }

    function initControls() {
      document.getElementById("refreshBtn").addEventListener("click", refreshLesson);
      document.getElementById("closeModalBtn").addEventListener("click", () => {
        document.getElementById("pushedModal").classList.remove("visible");
      });
      document.getElementById("pushedModal").addEventListener("click", event => {
        if (event.target?.id === "pushedModal") {
          document.getElementById("pushedModal").classList.remove("visible");
        }
      });
      document.getElementById("clearPushBtn").addEventListener("click", async () => {
        await callClassroom("POST", {
          action: "resource_push",
          sessionId,
          facultyId: resolveFacultyActorId(),
          clear: true
        });
        await refreshLesson();
      });
    }

    async function init() {
      const accessOk = await bootstrapLessonAccess();
      if (!accessOk) return;
      if (!sessionId) {
        if (courseIdFromUrl) {
          location.replace(buildWaitingLobbyUrl());
          return;
        }
        document.getElementById("lessonSubtitle").textContent = "לא התקבל sessionId. פתח את הדף דרך waiting_lobby.html.";
        return;
      }
      initControls();
      await refreshLesson();
      refreshTimer = setInterval(refreshLesson, 6000);
      heartbeatTimer = setInterval(sendHeartbeat, 30000);
    }

    init();
  </script>
</body>
</html>
