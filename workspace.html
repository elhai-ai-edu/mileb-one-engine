<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<title>MilEd Workspace</title>

</head>

<body>

<div class="workspace">

<header>

<h2 id="courseTitle">טוען קורס…</h2>

<p id="broadcastText">טוען הנחיות…</p>

<div class="meta-row">
<span class="pill" id="stepPill">שלב: 1</span>
<span class="pill" id="sessionPill">Session: —</span>
<span class="pill" id="autosavePill">AutoSave: —</span>
</div>

</header>

<div class="main">

<aside class="tasks">
<h3>משימות</h3>
<div id="taskList"></div>
</aside>

<section class="work">

<div id="lockOverlay" class="lock-overlay">
🔒 השלב נעול — המרצה יפתח אותו בקרוב
</div>

<textarea id="studentText" placeholder="כתוב כאן את הטקסט שלך…"></textarea>

<div class="actions">
<button class="submit" id="submitBtn" onclick="submitWork()">📤 שלח למרצה</button>
<span class="save-indicator" id="saveIndicator">—</span>
</div>

</section>

</div>

</div>

<button id="ai-button">AI</button>

<div id="ai-panel">

<div class="ai-header">

<span>AI Assistant</span>

<div class="ai-controls">
<button id="ai-expand">⤢</button>
<button id="ai-close">✕</button>
</div>

</div>

<div id="ai-chat"></div>

<div class="ai-input-row">
<input id="ai-input" placeholder="שאל את ה-AI..." />
<button id="ai-send">שלח</button>
</div>

</div>

<script>

/* PARAMETERS */

const params=new URLSearchParams(location.search);

const classId=params.get("classId")||"";
let botType=params.get("botType")||"";
const sessionId=params.get("sessionId")||"";

/* STUDENT ID */

let studentId=localStorage.getItem("studentId");

if(!studentId){

studentId="s_"+Math.random().toString(36).slice(2,10);

localStorage.setItem("studentId",studentId);

}

/* TASKS */

const TASKS=[
{step:1,label:"בחירת נושא"},
{step:2,label:"שאלת מחקר"},
{step:3,label:"מקורות"},
{step:4,label:"טיוטה"}
];

let taskStatus={};

/* STORAGE */

const STORAGE_VERSION=1;

function storageKey(){
return`miled_ws_${classId}_${studentId}_v${STORAGE_VERSION}`;
}

function loadDraft(){

try{
const raw=localStorage.getItem(storageKey());
if(!raw)return null;
return JSON.parse(raw);
}catch(e){
return null;
}

}

function saveDraft(data){

const prev=loadDraft()||{};

const next={
...prev,
...data,
classId,
studentId,
updatedAt:Date.now()
};

localStorage.setItem(storageKey(),JSON.stringify(next));

return next;

}

/* STATE */

let currentStep=1;
let isLocked=false;

const elTaskList=document.getElementById("taskList");
const elText=document.getElementById("studentText");
const elSubmit=document.getElementById("submitBtn");
const elLockOverlay=document.getElementById("lockOverlay");

const elBroadcastText=document.getElementById("broadcastText");
const elCourseTitle=document.getElementById("courseTitle");

const elStepPill=document.getElementById("stepPill");
const elSessionPill=document.getElementById("sessionPill");
const elAutosavePill=document.getElementById("autosavePill");

const elSaveIndicator=document.getElementById("saveIndicator");

/* TASK RENDER */

function renderTasks(){

elTaskList.innerHTML=TASKS.map(t=>{

const active=t.step===currentStep;
const status=taskStatus[t.step]||"";

let statusLabel="";

if(status==="working")statusLabel="● בעבודה";
if(status==="submitted")statusLabel="✔ הוגש";

return`
<div class="task ${active?"active":""}" onclick="setStep(${t.step})">
<span class="num">${t.step}.</span>
<span class="label">${t.label}</span>
<span class="status">${statusLabel}</span>
</div>
`;

}).join("");

}

function setStep(step){

if(sessionId){
alert("במצב שיעור פעיל המרצה קובע את השלב");
return;
}

currentStep=step;

elStepPill.textContent=`שלב: ${currentStep}`;

renderTasks();

saveDraft({currentStep});

}

/* AUTOSAVE */

let saveTimer=null;

function scheduleAutosave(){

if(isLocked)return;

taskStatus[currentStep]="working";

elSaveIndicator.textContent="כותב...";

clearTimeout(saveTimer);

saveTimer=setTimeout(()=>{

elSaveIndicator.textContent="שומר...";

const draft=saveDraft({
text:elText.value,
currentStep,
taskStatus
});

elSaveIndicator.textContent=
`נשמר (${new Date(draft.updatedAt).toLocaleTimeString("he-IL")})`;

},350);

}

elText.addEventListener("input",scheduleAutosave);

/* RESTORE */

function restoreDraft(){

const draft=loadDraft();

if(!draft)return;

if(draft.text)elText.value=draft.text;

if(draft.currentStep)currentStep=draft.currentStep;

if(draft.taskStatus)taskStatus=draft.taskStatus;

}

/* CLASSROOM */

async function classroomJoin(){

if(!sessionId)return;

await fetch("/.netlify/functions/classroom",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
action:"join",
sessionId,
studentId
})

});

}

async function pollClassroom(){

if(!sessionId)return;

const res=await fetch(
`/.netlify/functions/classroom?action=poll&sessionId=${sessionId}&studentId=${studentId}`
);

const data=await res.json();

if(data.broadcast)elBroadcastText.textContent=data.broadcast;

const newStep=data.currentStep||1;

if(newStep!==currentStep){

currentStep=newStep;

renderTasks();

}

const newLocked=data.stepLocked===true;

if(newLocked!==isLocked){

isLocked=newLocked;

elLockOverlay.style.display=isLocked?"block":"none";

elText.disabled=isLocked;

elSubmit.disabled=isLocked;

}

}

/* SUBMIT */

async function submitWork(){

const text=elText.value.trim();

if(!text){
alert("כתוב משהו לפני שליחה");
return;
}

taskStatus[currentStep]="submitted";

saveDraft({text,currentStep,taskStatus});

if(!sessionId){
alert("אין session פעיל");
return;
}

await fetch("/.netlify/functions/classroom",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

action:"submit",

sessionId,

studentId,

step:currentStep,

content:text,

assignmentId:classId,

version:STORAGE_VERSION

})

});

alert("העבודה נשלחה למרצה");

}

/* AI PANEL */

const aiButton=document.getElementById("ai-button");

const aiPanel=document.getElementById("ai-panel");

const aiChat=document.getElementById("ai-chat");

const aiInput=document.getElementById("ai-input");

const aiSend=document.getElementById("ai-send");

const aiClose=document.getElementById("ai-close");

const aiExpand=document.getElementById("ai-expand");

aiButton.onclick=()=>{

aiPanel.style.display="flex";

aiInput.focus();

};

aiClose.onclick=()=>{

aiPanel.style.display="none";

};

aiExpand.onclick=()=>{

aiPanel.classList.toggle("expanded");

};

aiSend.onclick=sendAI;

aiInput.addEventListener("keydown",e=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
sendAI();
}
});

async function sendAI(){

const message=aiInput.value.trim();

if(!message)return;

addMessage(message,"user");

aiInput.value="";

const task=TASKS.find(t=>t.step===currentStep);

try{

const res=await fetch("/.netlify/functions/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

message,

botType,

classId,

studentId,

step:currentStep,

taskLabel:task?task.label:"",

workspaceText:elText.value

})

});

const data=await res.json();

addMessage(data.reply||"תגובה ריקה","bot");

}catch(err){

addMessage("שגיאה בחיבור ל-AI","bot");

}

}

function addMessage(text,type){

const div=document.createElement("div");

div.className=`ai-message ai-${type}`;

div.textContent=text;

aiChat.appendChild(div);

aiChat.scrollTop=aiChat.scrollHeight;

}

/* INIT */

(async function init(){

elAutosavePill.textContent="AutoSave: פעיל";

restoreDraft();

renderTasks();

if(sessionId){

await classroomJoin();

await pollClassroom();

setInterval(pollClassroom,4000);

}else{

elBroadcastText.textContent=
"בחר משימה משמאל, כתוב טיוטה ולחץ על AI לעזרה";

}

})();

</script>

</body>
</html>
