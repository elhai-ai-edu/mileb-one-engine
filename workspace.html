<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<title>MilEd — מרחב עבודה</title>
</head>

<body class="user-student">

<div class="sidebar">
  <h2>MilEd.One</h2>
  <a href="/students.html">← חזרה לקורסים</a>
  <hr style="margin:12px 0;border:none;border-top:1px solid #eee;">
  <div id="bot-menu"></div>
  <hr style="margin:12px 0;border:none;border-top:1px solid #eee;">
  <p style="font-size:12px;color:#aaa;padding:0 12px;">כלים כלליים</p>
  <div id="universal-menu"></div>
  <a href="/" onclick="sessionStorage.clear()" style="display:block;margin-top:20px;padding:12px;font-size:13px;color:#999;">← יציאה</a>
</div>

<div class="main">

  <div class="topbar">
    <span id="course-title">טוען...</span>
    <span id="hebrew-level-badge" style="font-size:12px;color:#aaa;margin-right:12px;"></span>
    <span style="margin-right:auto;">MilEd.One</span>
    <span id="user-badge" style="font-size:13px;"></span>
  </div>

  <div class="container workspace-layout">

    <!-- משטח עבודה -->
    <div>
      <h3>📝 משטח העבודה</h3>

      <div id="task-tabs" class="stage-tabs-row"></div>

      <div style="position:relative;">
        <div id="lock-overlay" class="workspace-lock-overlay" style="display:none;">
          🔒 השלב נעול — המרצה יפתח אותו בקרוב
        </div>
        <div id="unlock-banner" class="unlock-banner" style="display:none;">
          🎉 השלב נפתח! המרצה שחרר אותך — כעת תוכל להמשיך.
        </div>
        <textarea id="student-text"
          placeholder="כתוב כאן את העבודה שלך..."
          class="workspace-textarea">
        </textarea>
      </div>

      <div class="actions">
        <button onclick="submitWork()" class="btn btn-blue">📤 שלח למרצה</button>
        <span id="save-indicator" class="save-indicator">—</span>
      </div>
    </div>

    <!-- פאנל בוט -->
    <div>
      <div class="chat-panel">

        <div class="chat-panel-header">
          <span id="active-bot-name">בחר בוט</span>
        </div>

        <div id="chat-window" class="chat-panel-messages">
          <div class="message ai">בחר בוט מהתפריט כדי להתחיל.</div>
        </div>

        <div class="chat-panel-input-row">
          <input id="user-input"
            placeholder="כתוב שאלה..."
            onkeypress="handleKey(event)">
          <button id="send-btn" onclick="sendMessage()" class="btn btn-blue">שלח</button>
        </div>

      </div>
    </div>

  </div>
</div>

<script>

const params   = new URLSearchParams(location.search);
const courseId = params.get("courseId") || "";
const skillId  = params.get("skillId")  || "";

// sessionId — מה-URL אם יש שיעור פעיל, אחרת מייצר אחד גנרי לכל קורס בנפרד
const urlSessionId = params.get("sessionId") || "";
let sessionId = urlSessionId;
if (!sessionId) {
  const storageBase = skillId ? "skill_" + skillId : courseId;
  sessionId = sessionStorage.getItem("sessionId_" + storageBase);
  if (!sessionId) {
    sessionId = "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    sessionStorage.setItem("sessionId_" + storageBase, sessionId);
  }
}

// ─── Skill-mode wave detection ───
let skillWaveId = null;
if (skillId) {
  const existing = localStorage.getItem(`miled_skill_ts_${skillId}`);
  if (!existing) {
    localStorage.setItem(`miled_skill_ts_${skillId}`, Date.now().toString());
    skillWaveId = "wave_1_baseline";
  } else {
    localStorage.setItem(`miled_skill_ts2_${skillId}`, Date.now().toString());
    skillWaveId = "wave_2_midterm";
  }
}

let studentId = sessionStorage.getItem("studentId");
if (!studentId) {
  studentId = "s_" + Math.random().toString(36).slice(2, 10);
  sessionStorage.setItem("studentId", studentId);
}

let CONFIG         = null;
let currentCourse  = null;
let currentSkillBot = null;
let currentBotType = null;
let chatHistory    = [];
let saveTimer      = null;
let isLocked       = false;
let currentStep    = 1;

// ─────────────────────────────
// טעינת config
// ─────────────────────────────

async function init() {
  const res = await fetch('/config.json?ts=' + Date.now());
  CONFIG = await res.json();

  if (skillId) {
    initSkillMode();
    return;
  }

  currentCourse = CONFIG.my_courses?.[courseId];
  if (!currentCourse) {
    document.getElementById("course-title").innerText = "קורס לא נמצא";
    return;
  }

  document.getElementById("course-title").innerText = currentCourse.name;
  document.getElementById("hebrew-level-badge").innerText = currentCourse.hebrew_level || "";

  renderBotMenu();
  renderStageTabs();
  restoreDraft();

  // כניסה לכיתה רק אם יש sessionId מה-URL (שיעור פעיל)
  if (urlSessionId) classroomJoin();
}

// ─────────────────────────────
// Skill Mode init
// ─────────────────────────────

function initSkillMode() {
  currentSkillBot =
    CONFIG.branches?.skills?.items?.[skillId] ||
    CONFIG.universal?.items?.[skillId];

  if (!currentSkillBot) {
    document.getElementById("course-title").innerText = "מיומנות לא נמצאה";
    return;
  }

  currentBotType = currentSkillBot.botType;

  document.getElementById("course-title").innerText = currentSkillBot.name;
  document.getElementById("hebrew-level-badge").innerText =
    skillWaveId === "wave_2_midterm" ? "גל 2 — מעקב" : "גל 1 — בסיס";

  // Sidebar: show only the skill bot
  document.getElementById("bot-menu").innerHTML =
    `<a href="#" class="bot-link active" onclick="return false;">${currentSkillBot.name}</a>`;
  document.getElementById("universal-menu").innerHTML = "";

  // Relabel textarea for notes
  const ta = document.getElementById("student-text");
  if (ta) ta.placeholder = "📝 רשמות ותובנות מהאבחון...";

  // No stage tabs for skills
  document.getElementById("task-tabs").style.display = "none";

  // Auto-open the skill bot
  document.getElementById("active-bot-name").innerText = currentSkillBot.name;
  document.getElementById("chat-window").innerHTML = "";
  triggerBotOpening();
}

// ─────────────────────────────
// תפריט בוטים
// ─────────────────────────────

function renderBotMenu() {
  const botMenu = document.getElementById("bot-menu");
  botMenu.innerHTML = "";

  for (let key in currentCourse.bots) {
    const bot     = currentCourse.bots[key];
    const botType = bot.botType || bot;
    const label   = bot.label  || key;
    const a = document.createElement("a");
    a.href = "#";
    a.className = "bot-link";
    a.innerText = label;
    a.onclick = (e) => { e.preventDefault(); selectBot(botType, label, a); };
    botMenu.appendChild(a);
  }

  const universalMenu = document.getElementById("universal-menu");
  universalMenu.innerHTML = "";

  (currentCourse.universal_bots || []).forEach(key => {
    const bot = CONFIG.universal?.items?.[key];
    if (!bot) return;
    const a = document.createElement("a");
    a.href = "#";
    a.className = "bot-link";
    a.innerText = bot.name;
    a.onclick = (e) => { e.preventDefault(); selectBot(bot.botType, bot.name, a); };
    universalMenu.appendChild(a);
  });
}

// ─────────────────────────────
// שלבי משימה
// ─────────────────────────────

function renderStageTabs() {
  const tabContainer = document.getElementById("task-tabs");
  tabContainer.innerHTML = "";

  const project = currentCourse?.course_units?.semester_a?.project;
  if (!project?.stages) return;

  project.stages.forEach((stage, idx) => {
    // Connector between steps
    if (idx > 0) {
      const conn = document.createElement("div");
      conn.className = "stepper-connector";
      tabContainer.appendChild(conn);
    }
    const btn = document.createElement("button");
    btn.className    = "stage-tab" + (stage.id === currentStep ? " active" : "");
    btn.dataset.step = stage.id;
    btn.innerText    = stage.label;   // number shown via CSS ::before attr(data-step)
    btn.onclick = () => selectStage(stage.id, btn);
    tabContainer.appendChild(btn);
  });
}

function selectStage(stepId, btnEl) {
  currentStep = stepId;
  document.querySelectorAll(".stage-tab").forEach(b => {
    const s = parseInt(b.dataset.step);
    b.classList.remove("active", "completed");
    if (s < stepId) b.classList.add("completed");
  });
  document.querySelectorAll(".stepper-connector").forEach((conn, i) => {
    // connector[i] sits between step i+1 and step i+2 — fill when step i+2 is reached
    conn.classList.toggle("completed", stepId >= i + 2);
  });
  btnEl.classList.add("active");
}

// ─────────────────────────────
// בחירת בוט פעיל ← שינוי 1
// ─────────────────────────────

let activeBotLink = null;

function selectBot(botType, label, linkEl) {
  currentBotType = botType;
  chatHistory    = [];

  document.getElementById("active-bot-name").innerText = label;
  document.getElementById("chat-window").innerHTML     = "";  // ← ריק, הבוט יפתח

  if (activeBotLink) activeBotLink.classList.remove("active");
  activeBotLink = linkEl;
  linkEl.classList.add("active");

  document.getElementById("user-input").focus();
  triggerBotOpening();  // ← הבוט פותח את השיחה
}

// ─────────────────────────────
// פתיחת שיחה אוטומטית ← שינוי 2
// ─────────────────────────────

async function triggerBotOpening() {
  const chatWindow = document.getElementById("chat-window");
  const loading    = document.createElement("div");
  loading.className = "message ai";
  loading.innerText = "...";
  chatWindow.appendChild(loading);

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message:         "__INIT__",
        botType:         currentBotType,
        classId:         skillId || courseId,
        hebrewLevel:     currentCourse?.hebrew_level || null,
        currentStep,
        studentId,
        sessionId,
        skillMode:       !!skillId,
        waveId:          skillWaveId,
        history:         [],
        isNewBotSession: true
      })
    });
    const data = await res.json();
    loading.remove();
    if (data.reply) {
      chatWindow.appendChild(renderMessage("assistant", data.reply));
      chatHistory.push({ role: "assistant", content: data.reply });
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }
  } catch(e) {
    loading.remove();
    chatWindow.appendChild(renderMessage("assistant", "שגיאת חיבור לשרת"));
  }
}

// ─────────────────────────────
// שליחת הודעה
// ─────────────────────────────

function renderMessage(role, content) {
  const div = document.createElement("div");
  div.className = "message " + (role === "user" ? "user" : "ai");
  div.innerHTML = role === "user" ? content : marked.parse(content);
  return div;
}

async function sendMessage() {
  if (!currentBotType) {
    alert("בחר בוט תחילה מהתפריט");
    return;
  }

  const text = document.getElementById("user-input").value.trim();
  if (!text) return;

  const chatWindow = document.getElementById("chat-window");
  chatWindow.appendChild(renderMessage("user", text));
  document.getElementById("user-input").value  = "";
  document.getElementById("send-btn").disabled = true;

  const loading = document.createElement("div");
  loading.className = "message ai";
  loading.innerText = "חושב...";
  chatWindow.appendChild(loading);
  chatWindow.scrollTop = chatWindow.scrollHeight;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message:         text,
        botType:         currentBotType,
        classId:         skillId || courseId,
        hebrewLevel:     currentCourse?.hebrew_level || null,
        currentStep,
        studentId,
        sessionId,
        skillMode:       !!skillId,
        waveId:          skillWaveId,
        history:          chatHistory,
        isNewBotSession:  chatHistory.length === 0
      })
    });

    const data = await res.json();
    loading.remove();

    const reply = data.reply || "שגיאה";
    chatWindow.appendChild(renderMessage("assistant", reply));
    chatHistory.push({ role: "user",      content: text  });
    chatHistory.push({ role: "assistant", content: reply });
    chatWindow.scrollTop = chatWindow.scrollHeight;

  } catch(e) {
    loading.remove();
    chatWindow.appendChild(renderMessage("assistant", "שגיאת חיבור לשרת"));
  }

  document.getElementById("send-btn").disabled = false;
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ─────────────────────────────
// autosave
// ─────────────────────────────

const storageKey = `miled_ws_${courseId}_${studentId}`;

document.getElementById("student-text").addEventListener("input", () => {
  document.getElementById("save-indicator").innerText = "כותב...";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem(storageKey, document.getElementById("student-text").value);
    document.getElementById("save-indicator").innerText =
      "נשמר (" + new Date().toLocaleTimeString("he-IL") + ")";
  }, 500);
});

function restoreDraft() {
  const saved = localStorage.getItem(storageKey);
  if (saved) document.getElementById("student-text").value = saved;
}

// ─────────────────────────────
// שליחה למרצה
// ─────────────────────────────

async function submitWork() {
  const text = document.getElementById("student-text").value.trim();
  if (!text) { alert("כתוב משהו לפני שליחה"); return; }

  if (!urlSessionId) { alert("אין שיעור פעיל כרגע"); return; }

  await fetch("/.netlify/functions/classroom", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action:    "submit",
      sessionId,
      studentId,
      step:      currentStep,
      content:   text
    })
  });

  alert("העבודה נשלחה למרצה ✅");
}

// ─────────────────────────────
// classroom join + live polling
// ─────────────────────────────

async function classroomJoin() {
  await fetch("/.netlify/functions/classroom", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "join", sessionId, studentId })
  });
  startClassroomPolling();
}

// ─── Lock/Unlock polling ───
let wasStepLocked = false;
let classroomPollTimer = null;

function startClassroomPolling() {
  classroomPollTimer = setInterval(pollClassroomState, 5000);
  pollClassroomState();
}

async function pollClassroomState() {
  try {
    const res  = await fetch(
      `/.netlify/functions/classroom?action=dashboard&sessionId=${sessionId}&facultyId=student_view`
    );
    const data = await res.json();
    const lockedSteps = data.lockedSteps || [];
    const isLocked    = lockedSteps.includes(studentId);

    document.getElementById("lock-overlay").style.display = isLocked ? "" : "none";

    // Detect transition: was locked → now unlocked
    if (wasStepLocked && !isLocked) triggerUnlockAnimation();
    wasStepLocked = isLocked;
  } catch(e) {
    console.error("Classroom poll error:", e.message);
  }
}

function triggerUnlockAnimation() {
  const banner = document.getElementById("unlock-banner");
  if (!banner) return;
  banner.style.display = "";
  banner.classList.remove("unlock-animate");
  // Force reflow so animation restarts
  void banner.offsetWidth;
  banner.classList.add("unlock-animate");
  setTimeout(() => {
    banner.style.display = "none";
    banner.classList.remove("unlock-animate");
  }, 4000);
}

init();

</script>

<!-- Firebase Auth utility -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="/firebase-init.js"></script>
<script src="/firebase-auth.js"></script>
<script>window.addEventListener("load",()=>{ if(window.MiledAuth) MiledAuth.renderUserBadge("user-badge"); });</script>
</body>
</html>
