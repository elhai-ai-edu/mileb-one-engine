# MilEd.One — v2.0 (Clean Version)

# MilEd.One — v2.0

[build]
  publish = "."

[functions]
  directory = "functions"
  included_files = ["config.json", "kernel.txt"]

[[scheduled-functions]]
  name = "project_curator"
  cron = "0 8 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/chat.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/team_project.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/personal_project.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Credentials = "true"

[[redirects]]
  from = "/api/chat"
  to   = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/insights"
  to   = "/.netlify/functions/insights"
  status = 200

[[redirects]]
  from = "/api/architect/*"
  to   = "/.netlify/functions/architect_api"
  status = 200

[[redirects]]
  from = "/api/journal/*"
  to   = "/.netlify/functions/journal_api"
  status = 200

[[redirects]]
  from = "/api/activity-bank"
  to   = "/.netlify/functions/journal_api"
  status = 200

[[redirects]]
  from = "/api/activity-bank/*"
  to   = "/.netlify/functions/journal_api"
  status = 200

[[redirects]]
  from = "/api/text-puzzle/*"
  to   = "/.netlify/functions/text_puzzle_api"
  status = 200

[[redirects]]
  from = "/api/lexicon/*"
  to   = "/.netlify/functions/lexicon_api"
  status = 200

[[redirects]]
  from = "/api/group"
  to   = "/.netlify/functions/group"
  status = 200

[[redirects]]
  from = "/api/team-project"
  to   = "/.netlify/functions/team_project"
  status = 200

[[redirects]]
  from = "/api/personal-project"
  to   = "/.netlify/functions/personal_project"
  status = 200

# Backward-compat: old project_workspace.html links redirect to the canonical page
[[redirects]]
  from = "/project_workspace.html"
  to   = "/personal_project.html"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
