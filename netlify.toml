# MilEd.One — v2.0 (Clean Version)

# MilEd.One — v2.0

[build]
  publish = "."

[functions]
  directory = "functions"
  included_files = ["config.json", "kernel.txt"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/chat.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Credentials = "true"

[[redirects]]
  from = "/api/chat"
  to   = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/insights"
  to   = "/.netlify/functions/insights"
  status = 200

[[redirects]]
  from = "/api/architect/*"
  to   = "/.netlify/functions/architect_api"
  status = 200

[[redirects]]
  from = "/api/text-puzzle/*"
  to   = "/.netlify/functions/text_puzzle_api"
  status = 200

[[redirects]]
  from = "/api/lexicon/*"
  to   = "/.netlify/functions/lexicon_api"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/cockpit"
  to = "/cockpit.html"
  status = 200

[[redirects]]
  from = "/institution"
  to = "/institution_dashboard.html"
