<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פרויקט גמר — MilEd.One</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="/firebase-init.js"></script>
  <script src="/auth-guard.js"></script>
  <style>
    :root {
      --navy:    #0f172a;
      --indigo:  #4f46e5;
      --blue:    #1d4ed8;
      --ink:     #1e1b4b;
      --muted:   #475569;
      --line:    #e2e8f0;
      --panel:   #ffffff;
      --bg:      #f0f4ff;
      --green:   #16a34a;
      --amber:   #d97706;
      --stage-done:    #dcfce7;
      --stage-active:  #eff6ff;
      --stage-pending: #f8fafc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; font-family: "Assistant", sans-serif; }
    body { background: var(--bg); color: var(--ink); min-height: 100vh; direction: rtl; }

    /* ── Topbar ── */
    .pw-topbar {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(90deg, #0f172a 0%, #312e81 60%, #1e1b4b 100%);
      border-bottom: 2px solid #4f46e5;
      padding: 0 20px; height: 52px;
      display: flex; align-items: center; gap: 14px;
    }
    .pw-logo  { font-size: 14px; font-weight: 800; color: #fff; letter-spacing: .5px; }
    .pw-course-name { font-size: 13px; font-weight: 600; color: #bfdbfe; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pw-student-name { font-size: 12px; color: #94a3b8; white-space: nowrap; }
    .pw-back-btn {
      padding: 6px 14px; border-radius: 8px; border: 1.5px solid #3b82f6;
      background: transparent; color: #93c5fd; font: 600 12px "Assistant", sans-serif;
      cursor: pointer; white-space: nowrap;
    }
    .pw-back-btn:hover { background: rgba(59,130,246,.15); }

    /* ── Layout ── */
    .pw-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      height: calc(100vh - 52px);
    }

    /* ── Sidebar: Stages ── */
    .pw-sidebar {
      background: var(--panel);
      border-left: 1px solid var(--line);
      overflow-y: auto;
      padding: 16px 12px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .pw-sidebar-title {
      font-size: 10px; font-weight: 800; color: #94a3b8;
      text-transform: uppercase; letter-spacing: .8px;
      padding: 0 6px 10px; border-bottom: 1px solid var(--line);
      margin-bottom: 6px;
    }
    .pw-stage-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 9px 10px; border-radius: 10px;
      cursor: pointer; transition: background .12s;
      border: 1.5px solid transparent;
    }
    .pw-stage-item:hover { background: #f1f5f9; }
    .pw-stage-item.done    { background: var(--stage-done);   border-color: #86efac; }
    .pw-stage-item.active  { background: var(--stage-active); border-color: #93c5fd; }
    .pw-stage-num {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
      background: #e2e8f0; color: #64748b;
    }
    .pw-stage-item.done   .pw-stage-num { background: #16a34a; color: #fff; }
    .pw-stage-item.active .pw-stage-num { background: #2563eb; color: #fff; }
    .pw-stage-label {
      font-size: 12px; font-weight: 600; color: var(--muted); line-height: 1.4;
    }
    .pw-stage-item.done   .pw-stage-label { color: #15803d; }
    .pw-stage-item.active .pw-stage-label { color: #1d4ed8; }

    .pw-progress-bar-wrap {
      margin: 12px 6px 0;
      background: #e2e8f0; border-radius: 999px; height: 5px;
    }
    .pw-progress-bar-fill {
      height: 5px; border-radius: 999px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      transition: width .3s ease;
    }
    .pw-progress-label {
      font-size: 11px; color: #94a3b8; text-align: center; margin-top: 5px;
    }

    /* ── Main Chat Area ── */
    .pw-main {
      display: flex; flex-direction: column;
      height: calc(100vh - 52px);
      overflow: hidden;
    }
    .pw-chat-window {
      flex: 1; overflow-y: auto;
      padding: 20px 24px; display: flex; flex-direction: column; gap: 14px;
    }
    .pw-msg {
      max-width: 72%; padding: 12px 16px;
      border-radius: 14px; font-size: 14px; line-height: 1.6;
    }
    .pw-msg.bot {
      background: var(--panel); border: 1.5px solid var(--line);
      align-self: flex-start; border-bottom-right-radius: 4px;
    }
    .pw-msg.user {
      background: #4f46e5; color: #fff;
      align-self: flex-end; border-bottom-left-radius: 4px;
    }
    .pw-msg.bot p { margin: 0 0 8px; }
    .pw-msg.bot p:last-child { margin-bottom: 0; }
    .pw-msg.bot ul, .pw-msg.bot ol { padding-right: 18px; margin: 6px 0; }
    .pw-msg.bot strong { font-weight: 700; }
    .pw-msg.loading { color: #94a3b8; font-style: italic; border-style: dashed; }

    .pw-input-row {
      padding: 14px 20px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      display: flex; gap: 10px; align-items: flex-end;
    }
    .pw-input {
      flex: 1; resize: none; min-height: 44px; max-height: 120px;
      padding: 10px 14px; border: 1.5px solid #c7d2fe;
      border-radius: 10px; font: 14px "Assistant", sans-serif;
      direction: rtl; outline: none; overflow-y: auto;
      line-height: 1.5;
    }
    .pw-input:focus { border-color: #6366f1; }
    .pw-send-btn {
      padding: 10px 18px; border-radius: 10px;
      background: #4f46e5; color: #fff; border: none;
      font: 600 14px "Assistant", sans-serif; cursor: pointer;
      white-space: nowrap;
    }
    .pw-send-btn:hover { background: #4338ca; }
    .pw-send-btn:disabled { background: #c7d2fe; cursor: default; }

    /* ── Stage hint bar ── */
    .pw-stage-hint {
      padding: 8px 20px;
      background: #eff6ff; border-bottom: 1px solid #bfdbfe;
      font-size: 12px; color: #1d4ed8; display: flex; align-items: center; gap: 8px;
    }
    .pw-stage-hint strong { font-weight: 700; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .pw-layout { grid-template-columns: 1fr; }
      .pw-sidebar { display: none; }
    }
  </style>
</head>
<body>

<div class="pw-topbar">
  <span class="pw-logo">MilEd.One</span>
  <span class="pw-course-name" id="pw-course-name">פרויקט גמר אישי</span>
  <span class="pw-student-name" id="pw-student-name"></span>
  <button class="pw-back-btn" onclick="goBack()">← חזרה</button>
</div>

<div class="pw-layout">

  <!-- Sidebar: 7 stages -->
  <aside class="pw-sidebar">
    <div class="pw-sidebar-title">שלבי הפרויקט</div>
    <div id="stages-list"></div>
    <div class="pw-progress-bar-wrap">
      <div class="pw-progress-bar-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="pw-progress-label" id="prog-label">שלב 0 / 7</div>
  </aside>

  <!-- Main chat -->
  <div class="pw-main">
    <div class="pw-stage-hint" id="pw-stage-hint" style="display:none;">
      <span>📍 שלב נוכחי:</span> <strong id="pw-stage-hint-text"></strong>
      <span style="margin-right:auto;font-size:11px;color:#64748b;">לחץ על שלב בצד כדי לסמן התקדמות</span>
    </div>
    <div class="pw-chat-window" id="chat-window"></div>
    <div class="pw-input-row">
      <textarea class="pw-input" id="user-input" placeholder="כתוב כאן..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="pw-send-btn" id="send-btn" onclick="sendMessage()">שלח</button>
    </div>
  </div>

</div>

<script>
// ── URL params ──────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const courseId = params.get('courseId') || params.get('classId') || null;

// ── Auth session ────────────────────────────────────────────────
const _sess     = window.MiledAccess?.getSessionUser?.();
const studentId = _sess?.uid || ('s_' + Math.random().toString(36).slice(2,10));
const studentDisplayName = _sess?.displayName || _sess?.email || null;

// ── Stage definitions ────────────────────────────────────────────
const STAGES = [
  "בחירת בעיה",
  "ניסיונות קודמים",
  "מקורות מידע",
  "שני פתרונות",
  "בחירת פתרון",
  "כתיבת המסמך",
  "הצגה בפני הקהל"
];

const STAGE_KEY = `project_stage_${courseId}_${studentId}`;
let currentStage = parseInt(localStorage.getItem(STAGE_KEY) || "1", 10);

// ── History key ─────────────────────────────────────────────────
const historyKey = `pw_history_${courseId}_${studentId}`;
let chatHistory  = [];
try { chatHistory = JSON.parse(localStorage.getItem(historyKey) || '[]'); } catch {}

// ── Refs ─────────────────────────────────────────────────────────
const chatWindow = document.getElementById('chat-window');
const inputEl    = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');
let   isLoading  = false;

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  // Load course name from config
  if (courseId) {
    try {
      const cfg = await fetch('/config.json').then(r => r.json());
      const c = cfg?.my_courses?.[courseId];
      if (c?.name) document.getElementById('pw-course-name').textContent = '📝 ' + c.name;
    } catch {}
  }

  // Student name
  if (studentDisplayName) {
    document.getElementById('pw-student-name').textContent = studentDisplayName;
  }

  renderStages();
  restoreHistory();

  if (!chatHistory.length) triggerOpening();
}

// ── Stage rendering ───────────────────────────────────────────────
function renderStages() {
  const list = document.getElementById('stages-list');
  list.innerHTML = STAGES.map((label, i) => {
    const n     = i + 1;
    const cls   = n < currentStage ? 'done' : n === currentStage ? 'active' : '';
    const icon  = n < currentStage ? '✓' : n;
    return `<div class="pw-stage-item ${cls}" onclick="setStage(${n})" title="לחץ לסימון שלב ${n}">
      <span class="pw-stage-num">${icon}</span>
      <span class="pw-stage-label">שלב ${n}: ${label}</span>
    </div>`;
  }).join('');

  const pct = Math.round(((currentStage - 1) / 7) * 100);
  document.getElementById('prog-fill').style.width  = pct + '%';
  document.getElementById('prog-label').textContent = `שלב ${currentStage} / 7`;

  const hint = document.getElementById('pw-stage-hint');
  const hintText = document.getElementById('pw-stage-hint-text');
  if (currentStage <= 7) {
    hint.style.display  = 'flex';
    hintText.textContent = `שלב ${currentStage} — ${STAGES[currentStage - 1]}`;
  }
}

function setStage(n) {
  if (n < 1 || n > 7) return;
  currentStage = n;
  localStorage.setItem(STAGE_KEY, String(n));
  renderStages();
}

// ── Message rendering ─────────────────────────────────────────────
function renderMsg(role, content, append = true) {
  const div = document.createElement('div');
  div.className = 'pw-msg ' + (role === 'user' ? 'user' : 'bot');
  div.innerHTML  = role === 'user' ? escHtml(content) : marked.parse(content);
  if (append) {
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }
  return div;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function restoreHistory() {
  chatHistory.forEach(m => renderMsg(m.role, m.content));
}

// ── Bot opening ───────────────────────────────────────────────────
async function triggerOpening() {
  const loadDiv = renderMsg('bot', '...');
  loadDiv.classList.add('loading');
  try {
    const res = await apiChat('__INIT__', [], true);
    loadDiv.remove();
    if (res?.reply) {
      renderMsg('bot', res.reply);
      chatHistory.push({ role: 'assistant', content: res.reply });
      saveHistory();
    }
  } catch(e) {
    loadDiv.remove();
    renderMsg('bot', 'שגיאת חיבור לשרת — אנא רענן את הדף.');
  }
}

// ── Send message ──────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  renderMsg('user', text);
  chatHistory.push({ role: 'user', content: text });

  const loadDiv = renderMsg('bot', 'חושב...');
  loadDiv.classList.add('loading');

  try {
    const res = await apiChat(text, chatHistory.slice(0, -1));
    loadDiv.remove();
    if (res?.reply) {
      renderMsg('bot', res.reply);
      chatHistory.push({ role: 'assistant', content: res.reply });
      saveHistory();
      // Auto-advance stage hint if bot response suggests completion
      if (res.reply.includes('שלב') && currentStage < 7) {
        // Passive — don't auto-advance, just remind user they can manually mark
      }
    }
  } catch(e) {
    loadDiv.remove();
    renderMsg('bot', 'שגיאה: ' + e.message);
  }
  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

async function apiChat(message, history, isInit = false) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message,
      botType:        'task_final_project',
      classId:        courseId,
      studentId,
      stationRoot:    'personal_project',
      currentStep:    String(currentStage),
      history:        history || [],
      isNewBotSession: isInit
    })
  });
  if (!res.ok) throw new Error(`שגיאת שרת ${res.status}`);
  return res.json();
}

function saveHistory() {
  // Keep last 40 turns to avoid localStorage bloat
  if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);
  try { localStorage.setItem(historyKey, JSON.stringify(chatHistory)); } catch {}
}

// ── Input helpers ─────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Navigation ────────────────────────────────────────────────────
function goBack() {
  window.location.href = '/students.html';
}

init();
</script>
</body>
</html>
