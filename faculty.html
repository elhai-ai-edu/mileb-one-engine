<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<title>MilEd.One - סגל</title>

</head>

<body>

<div class="container">

<span style="font-weight:300;color:#000;">
MilEd.One
</span>

<h1 id="title">טוען...</h1>

<p id="subtitle" class="subtitle"></p>

<div id="list" class="grid"></div>

<div id="error" class="error"></div>

<a href="/" class="back-btn">→ חזרה לדף הבית</a>

</div>

<script>

let CONFIG=null;
let USER=null;

let facultyId = localStorage.getItem("facultyId");

if(!facultyId){

facultyId="f_"+Math.random().toString(36).slice(2,8);

localStorage.setItem("facultyId",facultyId);

}

function checkAuth(){

const token=localStorage.getItem("miled_token");
const role=localStorage.getItem("miled_role");
const name=localStorage.getItem("miled_user");

if(!token || role!=="faculty"){

document.getElementById("error").innerText=
"גישה מוגבלת לסגל בלבד";

return false;

}

USER={token,role,name};

return true;

}

async function loadConfig(){

try{

const res=await fetch('/config.json?ts='+Date.now());

if(!res.ok)
throw new Error("config load failed");

CONFIG=await res.json();

initPage();

}

catch(err){

console.error(err);

document.getElementById("error").innerText=
"שגיאה בטעינת המערכת";

}

}

async function openClassroomSession(classId){

let sessionId =
localStorage.getItem("session_"+classId);

if(sessionId){

window.location.href=
`/workspace.html?classId=${classId}&sessionId=${sessionId}&facultyId=${facultyId}`;

return;

}

sessionId="session_"+Math.random().toString(36).slice(2,8);

try{

await fetch('/.netlify/functions/classroom',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

action:"open",
sessionId,
facultyId,
classId

})

});

localStorage.setItem("session_"+classId,sessionId);

window.location.href=
`/workspace.html?classId=${classId}&sessionId=${sessionId}&facultyId=${facultyId}`;

}

catch(err){

console.error(err);

alert("שגיאה בפתיחת הכיתה");

}

}

function initPage(){

const faculty=CONFIG.branches.faculty;

document.getElementById("title").innerText=faculty.title;

document.getElementById("subtitle").innerText=faculty.subtitle;

const container=document.getElementById("list");

for(let id in faculty.items){

const bot=faculty.items[id];

const wrapper=document.createElement("div");

wrapper.style.display="flex";
wrapper.style.flexDirection="column";
wrapper.style.gap="8px";

const a=document.createElement("button");

a.className="btn";

const activeSession =
localStorage.getItem("session_"+id);

if(activeSession){

a.innerText="🟢 "+bot.name;

}else{

a.innerText="⚪ "+bot.name;

}

a.onclick=()=>openClassroomSession(id);

wrapper.appendChild(a);

container.appendChild(wrapper);

}

}

if(checkAuth()){

loadConfig();

}

</script>

</body>
</html>
