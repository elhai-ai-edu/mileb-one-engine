<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>MilEd.One - סגל</title>
</head>

<body>

<div class="sidebar">
  <h2>MilEd.One</h2>
  <a href="/students.html">קורסים</a>
  <a href="/skills.html">מיומנויות</a>
  <a href="/faculty.html" class="active">הוראה</a>
  <a href="/admin.html">ניהול</a>
</div>

<div class="main">

  <div class="topbar">
    MilEd.One - פורטל סגל
  </div>

  <div class="container">

    <span style="font-weight:300;color:#000;">MilEd.One</span>
    <h1 id="title">טוען...</h1>
    <p id="subtitle"></p>
    <div id="list" class="grid"></div>
    <div id="error" style="color:red;margin-top:16px;"></div>
    <br>
    <a href="/" onclick="sessionStorage.clear()" class="btn btn-blue">← חזרה למסך הבית</a>

  </div>
</div>

<script>

function checkAuth() {
  const saved = sessionStorage.getItem("faculty_auth");
  if (saved === "true") return true;

  const input = prompt("הזן סיסמת סגל:");
  if (!input) return false;

  if (input.trim() === "miled2026") {
    sessionStorage.setItem("faculty_auth", "true");
    return true;
  }

  document.getElementById("error").innerText = "סיסמה שגויה";
  return false;
}

async function loadConfig() {
  try {
    const res = await fetch('/config.json?ts=' + Date.now());
    if (!res.ok) throw new Error("config load failed");
    const CONFIG = await res.json();
    initPage(CONFIG);
  } catch (err) {
    console.error(err);
    document.getElementById("error").innerText = "שגיאה בטעינת המערכת";
  }
}

function initPage(CONFIG) {
  const faculty = CONFIG.branches.faculty;

  document.getElementById("title").innerText = faculty.title;
  document.getElementById("subtitle").innerText = faculty.subtitle;

  const container = document.getElementById("list");

  for (let id in faculty.items) {
    const bot = faculty.items[id];
    const a = document.createElement("a");
    a.className = "btn";
    a.innerText = bot.name;
    a.href = `/chat.html?classId=${id}`;
    container.appendChild(a);
  }

  // כפתור קוקפיט — רק לסופר אדמין, אחרי כל הכלים
  if (sessionStorage.getItem("facultyRole") === "superadmin") {
    const divider = document.createElement("div");
    divider.style.cssText = "grid-column:1/-1;border-top:1px solid #eee;margin-top:8px;padding-top:8px;";
    container.appendChild(divider);

    const a = document.createElement("a");
    a.className = "btn";
    a.href = "/cockpit.html";
    a.innerText = "⚙️ קוקפיט מנהל מערכת";
    container.appendChild(a);
  }
}

if (checkAuth()) {
  loadConfig();
}

</script>

</body>
</html>
