<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>MilEd.One - סגל</title>
</head>

<body>

<div class="sidebar">
  <h2>MilEd.One</h2>
  <a href="/students.html">קורסים</a>
  <a href="/skills.html">מיומנויות</a>
  <a href="/faculty.html" class="active">הוראה</a>
  <a href="/admin.html">ניהול</a>
</div>

<div class="main">

  <div class="topbar">
    MilEd.One - פורטל סגל
  </div>

  <div class="container">

    <span style="font-weight:300;color:#000;">MilEd.One</span>
    <h1 id="title">טוען...</h1>
    <p id="subtitle"></p>
    <div id="list" class="grid"></div>
    <div id="error" style="color:red;margin-top:16px;"></div>
    <br>
    <a href="/" onclick="sessionStorage.clear()" class="btn btn-blue">← חזרה למסך הבית</a>

  </div>
</div>

<script>

// ─────────────────────────────
// הסכמת פרטיות — חד-פעמית
// ─────────────────────────────

function checkPrivacyConsent() {
  if (localStorage.getItem("miled_privacy_consent") === "true") return true;

  const modal = document.createElement("div");
  modal.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.5);z-index:9999;
    display:flex;align-items:center;justify-content:center;
  `;

  modal.innerHTML = `
    <div style="background:white;border-radius:16px;padding:32px;max-width:480px;width:90%;text-align:right;direction:rtl;">
      <h2 style="margin-top:0;font-size:20px;">הסכמה לשימוש במערכת</h2>
      <p style="color:#555;line-height:1.7;font-size:14px;">
        מערכת MilEd.One שומרת את תוכן השיחות עם הבוטים למטרות פיתוח ושיפור המערכת.
        המידע מאוחסן בצורה מאובטחת ואינו מועבר לגורמים חיצוניים.
        שיחות נשמרות תחת מזהה אנונימי בלבד.
      </p>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px;">
        <button id="privacy-decline" style="padding:10px 20px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;font-size:14px;">
          לא מסכים/ה
        </button>
        <button id="privacy-accept" style="padding:10px 20px;background:#6C63FF;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;">
          מסכים/ה ומאשר/ת
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById("privacy-accept").onclick = () => {
    localStorage.setItem("miled_privacy_consent", "true");
    modal.remove();
    loadConfig();
  };

  document.getElementById("privacy-decline").onclick = () => {
    window.location.href = "/";
  };

  return false;
}

// ─────────────────────────────
// אימות סגל
// ─────────────────────────────

function checkAuth() {
  const saved = sessionStorage.getItem("faculty_auth");
  if (saved === "true") return true;

  const input = prompt("הזן סיסמת סגל:");
  if (!input) return false;

  if (input.trim() === "miled2026") {
    sessionStorage.setItem("faculty_auth", "true");
    return true;
  }

  document.getElementById("error").innerText = "סיסמה שגויה";
  return false;
}

// ─────────────────────────────
// טעינת config
// ─────────────────────────────

async function loadConfig() {
  try {
    const res = await fetch('/config.json?ts=' + Date.now());
    if (!res.ok) throw new Error("config load failed");
    const CONFIG = await res.json();
    initPage(CONFIG);
  } catch (err) {
    console.error(err);
    document.getElementById("error").innerText = "שגיאה בטעינת המערכת";
  }
}

function initPage(CONFIG) {
  const faculty = CONFIG.branches.faculty;

  document.getElementById("title").innerText = faculty.title;
  document.getElementById("subtitle").innerText = faculty.subtitle;

  const container = document.getElementById("list");

  for (let id in faculty.items) {
    const bot = faculty.items[id];
    const a = document.createElement("a");
    a.className = "btn";
    a.innerText = bot.name;
    a.href = `/chat.html?classId=${id}`;
    container.appendChild(a);
  }

  // Architect Studio — available to all faculty
  const architectDivider = document.createElement("div");
  architectDivider.style.cssText = "grid-column:1/-1;border-top:1px solid #eee;margin-top:16px;padding-top:16px;";
  container.appendChild(architectDivider);

  const architectCard = document.createElement("a");
  architectCard.href  = "/architect_studio.html";
  architectCard.style.cssText = `
    display:block;grid-column:1/-1;
    background:linear-gradient(135deg,#6C63FF,#4f46e5);
    color:white;border-radius:14px;padding:20px 24px;
    text-decoration:none;
    display:flex;align-items:center;gap:16px;
  `;
  architectCard.innerHTML = `
    <div style="font-size:32px;">🏗️</div>
    <div>
      <div style="font-size:15px;font-weight:700;margin-bottom:4px;">בונה הבוטים — Architect Studio</div>
      <div style="font-size:13px;opacity:0.85;">צרו בוט פדגוגי חדש דרך שיחה מונחית עם הארכיטקט</div>
    </div>
    <div style="margin-right:auto;font-size:20px;">→</div>
  `;
  container.appendChild(architectCard);

  if (sessionStorage.getItem("facultyRole") === "superadmin") {
    const divider = document.createElement("div");
    divider.style.cssText = "grid-column:1/-1;border-top:1px solid #eee;margin-top:8px;padding-top:8px;";
    container.appendChild(divider);

    const a = document.createElement("a");
    a.className = "btn";
    a.href = "/cockpit.html";
    a.innerText = "⚙️ קוקפיט מנהל מערכת";
    container.appendChild(a);
  }
}

if (checkAuth()) {
  if (checkPrivacyConsent()) loadConfig();
}

</script>

</body>
</html>
