<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>לקסיקון אקדמי — MilEd.One</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="/firebase-init.js"></script>
<script src="/auth-guard.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Assistant', sans-serif; background: #f0f4ff; min-height: 100vh; color: #1e1b4b; }

/* ─── Topbar ─── */
.lex-topbar {
  background: #1e1b4b; color: #fff;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 12px 20px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
.lex-logo { font-size: 15px; font-weight: 700; flex: 1; }
.lex-count-badge {
  font-size: 11px; font-weight: 700; padding: 4px 11px;
  border-radius: 20px; background: rgba(255,255,255,.15); color: #c7d2fe;
}

/* ─── Body ─── */
.lex-body { max-width: 860px; margin: 0 auto; padding: 20px 16px; }

/* ─── Phase header ─── */
.phase-header {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 18px;
}
.phase-title { font-size: 20px; font-weight: 700; color: #1e1b4b; flex: 1; }
.phase-sub   { font-size: 13px; color: #64748b; }

/* ─── Filter bar ─── */
.filter-bar {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px;
  padding: 12px 14px; margin-bottom: 16px;
}
.filter-label { font-size: 12px; font-weight: 700; color: #64748b; margin-left: 4px; }
.filter-pill {
  font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 20px;
  border: 1.5px solid #e2e8f0; background: #f8fafc; color: #64748b;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.filter-pill.active { border-color: #818cf8; background: #eef2ff; color: #4338ca; }
.filter-sep { width: 1px; height: 20px; background: #e2e8f0; }

/* ─── Action strip ─── */
.action-strip {
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px;
}
.lex-btn {
  padding: 10px 20px; border-radius: 9px; border: none; cursor: pointer;
  font-family: 'Assistant', sans-serif; font-size: 14px; font-weight: 600;
  transition: opacity .15s, box-shadow .15s;
}
.lex-btn:disabled { opacity: .45; cursor: default; }
.lex-btn.primary  { background: #4338ca; color: #fff; box-shadow: 0 2px 8px rgba(67,56,202,.3); }
.lex-btn.primary:hover:not(:disabled) { box-shadow: 0 4px 14px rgba(67,56,202,.4); }
.lex-btn.outline  { background: #fff; color: #4338ca; border: 1.5px solid #c7d2fe; }
.lex-btn.outline:hover:not(:disabled) { background: #eef2ff; }
.lex-btn.soft     { background: #f8fafc; color: #64748b; border: 1.5px solid #e2e8f0; }
.lex-btn.green    { background: #16a34a; color: #fff; }
.rated-badge      { font-size: 12px; color: #16a34a; font-weight: 600; }

/* ─── Word grid ─── */
.word-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px; margin-bottom: 20px;
}

/* ─── Word card ─── */
.word-card {
  background: #fff; border: 1.5px solid #e2e8f0; border-radius: 14px;
  padding: 14px 16px; transition: box-shadow .15s, border-color .15s;
  display: flex; flex-direction: column; gap: 8px;
}
.word-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); border-color: #c7d2fe; }
.word-card.is-mastered { border-color: #86efac; background: #f0fdf4; }
.word-card.priority-high { border-color: #fca5a5; background: #fef9f9; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-word { font-size: 17px; font-weight: 700; color: #1e1b4b; line-height: 1.2; }
.card-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.field-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  white-space: nowrap;
}
.field-badge.management { background: #eef2ff; color: #4338ca; }
.field-badge.optics     { background: #fef3c7; color: #92400e; }
.field-badge.social     { background: #d1fae5; color: #065f46; }
.diff-stars { font-size: 12px; color: #f59e0b; letter-spacing: 1px; }

.card-meaning { font-size: 13px; color: #374151; line-height: 1.55; }
.card-meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
.card-meta-chip { font-size: 10px; color: #6366f1; background: #eef2ff; border-radius: 5px; padding: 1px 7px; }
.card-translation-row { display: flex; align-items: baseline; gap: 6px; font-size: 12px; margin-top: 3px; }
.card-tt-flag { font-size: 13px; }
.card-tt-lang-word { font-weight: 700; color: #374151; }
.card-tt-lang-def  { color: #94a3b8; font-size: 11px; }
.card-example {
  font-size: 12px; color: #64748b; font-style: italic; line-height: 1.5;
  border-right: 2px solid #e2e8f0; padding-right: 8px;
}
.study-tip {
  font-size: 12px; color: #4338ca; background: #eef2ff; border-radius: 7px;
  padding: 6px 9px; line-height: 1.5;
}

/* ─── Familiarity rating ─── */
.familiarity-row {
  display: flex; align-items: center; gap: 6px; margin-top: 4px;
}
.fam-label { font-size: 10px; color: #94a3b8; font-weight: 600; }
.fam-dots  { display: flex; gap: 4px; }
.fam-dot {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid #e2e8f0;
  cursor: pointer; transition: all .15s; background: #f8fafc;
  display: flex; align-items: center; justify-content: center; font-size: 9px;
}
.fam-dot.filled-1 { border-color: #ef4444; background: #fee2e2; }
.fam-dot.filled-2 { border-color: #f97316; background: #fff7ed; }
.fam-dot.filled-3 { border-color: #eab308; background: #fefce8; }
.fam-dot.filled-4 { border-color: #22c55e; background: #f0fdf4; }
.fam-dot.filled-5 { border-color: #16a34a; background: #dcfce7; }

/* ─── Curated study set ─── */
.curated-banner {
  background: linear-gradient(135deg, #eef2ff, #f5f3ff);
  border: 1.5px solid #c7d2fe; border-radius: 14px;
  padding: 16px 20px; margin-bottom: 18px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.curated-icon { font-size: 28px; }
.curated-text { flex: 1; }
.curated-title { font-size: 15px; font-weight: 700; color: #4338ca; margin-bottom: 2px; }
.curated-msg   { font-size: 13px; color: #6d28d9; line-height: 1.5; }

/* ─── Handwriting phase ─── */
.hw-card {
  background: #fff; border: 1.5px solid #e2e8f0; border-radius: 14px;
  padding: 18px; margin-bottom: 12px;
}
.hw-word     { font-size: 20px; font-weight: 700; color: #1e1b4b; margin-bottom: 4px; }
.hw-meaning  { font-size: 13px; color: #64748b; margin-bottom: 14px; }
.hw-sentence { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-family: 'Assistant', sans-serif; font-size: 13px; resize: none; direction: rtl;
  margin-bottom: 10px;
}
.hw-sentence:focus { outline: none; border-color: #818cf8; }
.hw-upload {
  border: 1.5px dashed #c7d2fe; border-radius: 10px; padding: 14px;
  text-align: center; cursor: pointer; font-size: 13px; color: #64748b;
  transition: border-color .2s; margin-bottom: 10px;
}
.hw-upload:hover { border-color: #818cf8; color: #4338ca; }
.hw-upload input { display: none; }
.hw-preview { display: none; max-width: 200px; border-radius: 8px; margin: 8px auto; }
.hw-status  { font-size: 12px; margin-top: 4px; min-height: 16px; }

/* ─── Empty / loading states ─── */
.lex-loading {
  text-align: center; padding: 40px; color: #64748b; font-size: 14px;
}
.lex-loading::before {
  content: ""; display: block; width: 28px; height: 28px;
  border: 3px solid #e2e8f0; border-top-color: #6366f1;
  border-radius: 50%; animation: spin .7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.lex-empty { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }

/* ─── XP flash ─── */
@keyframes xpPop {
  0%   { opacity: 0; transform: translateX(-50%) translateY(20px) scale(.8); }
  50%  { opacity: 1; transform: translateX(-50%) translateY(-8px) scale(1.1); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-24px) scale(1); }
}
.xp-flash {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  background: #16a34a; color: #fff; font-size: 16px; font-weight: 700;
  padding: 12px 28px; border-radius: 30px; z-index: 500;
  box-shadow: 0 6px 20px rgba(22,163,74,.4);
  animation: xpPop 2.2s ease forwards; pointer-events: none;
}

@media (max-width: 500px) {
  .word-grid { grid-template-columns: 1fr; }
  .lex-body  { padding: 14px 10px; }
}
</style>
</head>

<body>

<!-- ─── Topbar ─── -->
<div class="lex-topbar">
  <span class="lex-logo">📚 לקסיקון אקדמי — MilEd.One</span>
  <span class="lex-count-badge" id="word-count-badge">טוען...</span>
  <a href="/students.html" style="font-size:12px;color:#a5b4fc;text-decoration:none;">← חזרה</a>
</div>

<!-- ─── Main body ─── -->
<div class="lex-body">

  <!-- ─── Phase 1: Browse & Rate ─── -->
  <div id="phase-browse">
    <div class="phase-header">
      <div>
        <div class="phase-title">📖 מאגר המילים</div>
        <div class="phase-sub">דרג את רמת ההכרות שלך עם כל מילה, ואז לחץ "צור רשימת לימוד"</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <span class="filter-label">תחום:</span>
      <button class="filter-pill active" data-filter-field="all" onclick="setFieldFilter('all')">הכל</button>
      <button class="filter-pill" data-filter-field="management" onclick="setFieldFilter('management')">ניהול</button>
      <button class="filter-pill" data-filter-field="optics" onclick="setFieldFilter('optics')">אופטיקה</button>
      <button class="filter-pill" data-filter-field="social" onclick="setFieldFilter('social')">רווחה</button>
      <div class="filter-sep"></div>
      <span class="filter-label">רמה:</span>
      <button class="filter-pill active" data-filter-diff="all" onclick="setDiffFilter('all')">הכל</button>
      <button class="filter-pill" data-filter-diff="1" onclick="setDiffFilter('1')">⭐</button>
      <button class="filter-pill" data-filter-diff="2" onclick="setDiffFilter('2')">⭐⭐</button>
      <button class="filter-pill" data-filter-diff="3" onclick="setDiffFilter('3')">⭐⭐⭐</button>
    </div>

    <!-- Actions -->
    <div class="action-strip">
      <button class="lex-btn primary" id="personalize-btn" onclick="startPersonalize()">
        ✨ צור רשימת לימוד מותאמת
      </button>
      <span class="rated-badge" id="rated-count-label"></span>
    </div>

    <!-- Word grid -->
    <div class="word-grid" id="word-grid">
      <div class="lex-loading">טוען מאגר מילים...</div>
    </div>
  </div>

  <!-- ─── Phase 2: Curated Study Set ─── -->
  <div id="phase-curated" style="display:none;">
    <div class="phase-header">
      <div>
        <div class="phase-title">✨ רשימת הלימוד שלך</div>
        <div class="phase-sub">מותאמת לרמת ההכרות שלך — עם טיפי לימוד מ-AI</div>
      </div>
      <button class="lex-btn soft" onclick="showPhase('browse')">← חזרה למאגר</button>
    </div>

    <div class="curated-banner" id="curated-banner">
      <span class="curated-icon">🤖</span>
      <div class="curated-text">
        <div class="curated-title">הרשימה המותאמת מוכנה</div>
        <div class="curated-msg" id="curated-msg">...</div>
      </div>
    </div>

    <div class="action-strip">
      <button class="lex-btn green" onclick="showPhase('handwriting')">✍️ תרגול כתב יד ← 5 מילים</button>
      <button class="lex-btn outline" onclick="startPersonalize()">🔄 ייצר רשימה חדשה</button>
    </div>

    <div class="word-grid" id="curated-grid"></div>
  </div>

  <!-- ─── Phase 3: Handwriting Practice ─── -->
  <div id="phase-handwriting" style="display:none;">
    <div class="phase-header">
      <div>
        <div class="phase-title">✍️ תרגול כתב יד</div>
        <div class="phase-sub">כתוב משפט עם כל מילה בכתב יד ←  צלם ← העלה</div>
      </div>
      <button class="lex-btn soft" onclick="showPhase('curated')">← חזרה לרשימה</button>
    </div>

    <div id="hw-cards-container"></div>
  </div>

</div>

<script>

// ─────────────────────────────
// State
// ─────────────────────────────
const DB_URL = "https://miled-one-classroom-default-rtdb.europe-west1.firebasedatabase.app";

// Student identity
const sessionAuth = window.MiledAccess?.getSessionUser?.() || null;
let studentId = sessionAuth?.uid
  || sessionAuth?.email?.replace(/[@.]/g, "_")
  || localStorage.getItem("miled_anon_lex_id")
  || "anon_" + Math.random().toString(36).slice(2, 10);
if (!localStorage.getItem("miled_anon_lex_id"))
  localStorage.setItem("miled_anon_lex_id", studentId);

let allWords   = [];   // all words from Firebase
let ratings    = {};   // wordId → familiarity (1-5)
let studySet   = [];   // curated study set from AI

let fieldFilter = "all";
let diffFilter  = "all";

// Load ratings from localStorage
try { ratings = JSON.parse(localStorage.getItem("lex_ratings_" + studentId) || "{}"); } catch {}

// ─────────────────────────────
// Init
// ─────────────────────────────
async function init() {
  try {
    allWords = await loadLexiconCatalog();
    if (!allWords.length) { renderEmpty(); return; }
    document.getElementById("word-count-badge").innerText = `${allWords.length} מילים`;
    renderWordGrid();
    updateRatedLabel();
  } catch (e) {
    document.getElementById("word-grid").innerHTML =
      `<div class="lex-empty">⚠️ שגיאה בטעינת הלקסיקון: ${escHtml(e.message)}</div>`;
    document.getElementById("word-count-badge").innerText = "שגיאה";
  }
}

async function loadLexiconCatalog() {
  try {
    const res = await fetch("/api/lexicon/list");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data?.ok) throw new Error(data?.error || "Lexicon load failed");
    return Array.isArray(data.words) ? data.words : [];
  } catch {
    return loadLexiconCatalogFromFirebase();
  }
}

async function loadLexiconCatalogFromFirebase() {
  if (!window.firebase || !window.MILED_FIREBASE_CONFIG) {
    throw new Error("Firebase not ready");
  }

  if (!firebase.apps.length) {
    firebase.initializeApp(window.MILED_FIREBASE_CONFIG);
  }

  const authUser = await waitForFirebaseUser();
  if (!authUser) {
    throw new Error("No authenticated user");
  }

  const idToken = await authUser.getIdToken();
  const res = await fetch(`${DB_URL}/lexicon.json?auth=${encodeURIComponent(idToken)}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return Object.entries(data || {}).map(([id, word]) => ({ id, ...word }));
}

async function waitForFirebaseUser(timeoutMs = 5000) {
  const currentUser = window.firebase?.apps?.length ? firebase.auth().currentUser : null;
  if (currentUser) return currentUser;

  if (!window.firebase?.apps?.length || !firebase.auth) return null;

  return new Promise((resolve) => {
    let finished = false;
    const timer = setTimeout(() => {
      if (finished) return;
      finished = true;
      try { unsubscribe(); } catch {}
      resolve(firebase.auth().currentUser || null);
    }, timeoutMs);

    const unsubscribe = firebase.auth().onAuthStateChanged((user) => {
      if (finished) return;
      finished = true;
      clearTimeout(timer);
      try { unsubscribe(); } catch {}
      resolve(user || null);
    });
  });
}

// ─────────────────────────────
// Render word grid
// ─────────────────────────────
function renderWordGrid() {
  const grid = document.getElementById("word-grid");
  let filtered = allWords
    .filter(w => fieldFilter === "all" || w.field === fieldFilter)
    .filter(w => diffFilter === "all" || String(w.difficulty_level) === diffFilter)
    .sort((a, b) => (b.difficulty_level || 1) - (a.difficulty_level || 1));

  if (!filtered.length) {
    grid.innerHTML = '<div class="lex-empty">אין מילים בסינון זה.</div>';
    return;
  }
  grid.innerHTML = filtered.map(w => wordCardHTML(w, false)).join("");
}

function wordCardHTML(w, withTip) {
  const fam  = ratings[w.id] || 0;
  const diff = w.difficulty_level || 1;
  const stars = "⭐".repeat(diff);
  const isMastered = fam === 5;
  const isPriority = fam <= 1 && diff >= 2;
  const fieldClass = w.field || "";
  const fieldLabel = { management:"ניהול", optics:"אופטיקה", social:"רווחה חברתית" }[w.field] || w.field || "";

  return `
  <div class="word-card ${isMastered ? "is-mastered" : ""} ${isPriority ? "priority-high" : ""}"
       id="wcard-${w.id}">
    <div class="card-top">
      <span class="card-word">${escHtml(w.word)}</span>
      <div class="card-badges">
        <span class="field-badge ${fieldClass}">${fieldLabel}</span>
        <span class="diff-stars">${stars}</span>
      </div>
    </div>
    <div class="card-meaning">${escHtml(w.meaning)}</div>
    ${w.preposition || w.root ? `<div class="card-meta-row">${w.preposition ? `<span class="card-meta-chip">מ"י: ${escHtml(w.preposition)}</span>` : ""}${w.root ? `<span class="card-meta-chip">שורש: ${escHtml(w.root)}</span>` : ""}</div>` : ""}
    ${w.example ? `<div class="card-example">${escHtml(w.example)}</div>` : ""}
    ${withTip && w.studyTip ? `<div class="study-tip">💡 ${escHtml(w.studyTip)}</div>` : ""}
    ${(w.arabic_word || w.arabic_meaning) ? `<div class="card-translation-row"><span class="card-tt-flag">🇸🇦</span><span class="card-tt-lang-word">${escHtml(w.arabic_word || "")}</span>${w.arabic_meaning ? `<span class="card-tt-lang-def">${escHtml(w.arabic_meaning)}</span>` : ""}</div>` : ""}
    ${(w.english_word || w.english_meaning) ? `<div class="card-translation-row"><span class="card-tt-flag">🇬🇧</span><span class="card-tt-lang-word">${escHtml(w.english_word || "")}</span>${w.english_meaning ? `<span class="card-tt-lang-def">${escHtml(w.english_meaning)}</span>` : ""}</div>` : ""}
    <div class="familiarity-row">
      <span class="fam-label">הכרות:</span>
      <div class="fam-dots">
        ${[1,2,3,4,5].map(level => {
          const filled = fam >= level;
          const colorClass = filled ? `filled-${level}` : "";
          const labels = ["","לא מכיר","קצת","מכיר","טוב","שולט"];
          return `<div class="fam-dot ${colorClass}" title="${labels[level]}"
            onclick="setRating('${w.id}', ${level})"></div>`;
        }).join("")}
      </div>
      ${fam > 0 ? `<span style="font-size:10px;color:#94a3b8;">${["","לא מכיר","קצת","מכיר","טוב","שולט"][fam]}</span>` : ""}
    </div>
  </div>`;
}

// ─────────────────────────────
// Familiarity rating
// ─────────────────────────────
function setRating(wordId, level) {
  ratings[wordId] = level;
  localStorage.setItem("lex_ratings_" + studentId, JSON.stringify(ratings));
  // Re-render just this card
  const card = document.getElementById("wcard-" + wordId);
  const word = allWords.find(w => w.id === wordId);
  if (card && word) card.outerHTML = wordCardHTML(word, false);
  updateRatedLabel();
}

function updateRatedLabel() {
  const count = Object.keys(ratings).length;
  const el = document.getElementById("rated-count-label");
  if (el) el.innerText = count > 0 ? `${count} מילים דורגו` : "";
}

// ─────────────────────────────
// Filters
// ─────────────────────────────
function setFieldFilter(val) {
  fieldFilter = val;
  document.querySelectorAll("[data-filter-field]").forEach(el =>
    el.classList.toggle("active", el.dataset.filterField === val));
  renderWordGrid();
}

function setDiffFilter(val) {
  diffFilter = val;
  document.querySelectorAll("[data-filter-diff]").forEach(el =>
    el.classList.toggle("active", el.dataset.filterDiff === val));
  renderWordGrid();
}

// ─────────────────────────────
// Personalize
// ─────────────────────────────
async function startPersonalize() {
  const ratedCount = Object.keys(ratings).length;
  if (ratedCount < 3) {
    alert("דרג לפחות 3 מילים לפני יצירת רשימת לימוד מותאמת.");
    return;
  }

  const btn = document.getElementById("personalize-btn");
  if (btn) { btn.disabled = true; btn.textContent = "🤖 AI מייצר רשימה..."; }

  try {
    const res = await fetch("/api/lexicon/personalize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ studentId, ratings })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "שגיאה");

    studySet = data.studySet;
    document.getElementById("curated-msg").textContent = data.message || "";

    // Render curated grid
    const grid = document.getElementById("curated-grid");
    grid.innerHTML = studySet.map(w => wordCardHTML({ ...w, studyTip: w.studyTip }, true)).join("");

    showPhase("curated");
  } catch (e) {
    alert("שגיאה ביצירת הרשימה: " + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "✨ צור רשימת לימוד מותאמת"; }
  }
}

// ─────────────────────────────
// Phase navigation
// ─────────────────────────────
function showPhase(phase) {
  ["browse","curated","handwriting"].forEach(p =>
    document.getElementById("phase-" + p).style.display = phase === p ? "" : "none");
  if (phase === "handwriting") renderHandwritingCards();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ─────────────────────────────
// Handwriting cards
// ─────────────────────────────
function renderHandwritingCards() {
  // Top 5 from study set by priorityScore (already sorted)
  const top5 = studySet.slice(0, 5);
  const container = document.getElementById("hw-cards-container");

  if (!top5.length) {
    container.innerHTML = '<div class="lex-empty">אין מילים ברשימה. חזור ליצירת רשימת לימוד.</div>';
    return;
  }

  container.innerHTML = top5.map((w, i) => `
    <div class="hw-card" id="hw-card-${w.id}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="font-size:22px;font-weight:300;color:#94a3b8;">${i+1}</span>
        <div>
          <div class="hw-word">${escHtml(w.word)}</div>
          <div class="hw-meaning">${escHtml(w.meaning)}</div>
        </div>
        <span class="field-badge ${w.field}" style="margin-right:auto;">${w.fieldHe || ""}</span>
      </div>
      ${w.handwriting_task
        ? `<div style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:#854d0e;line-height:1.5;">✏️ <strong>משימה:</strong> ${escHtml(w.handwriting_task)}</div>`
        : w.preposition
          ? `<div style="background:#ede9fe;border:1px solid #c4b5fd;border-radius:8px;padding:7px 12px;margin-bottom:8px;font-size:12px;color:#6d28d9;">✏️ כתוב משפט בו משתמשים ב<strong>${escHtml(w.word)} ${escHtml(w.preposition)}</strong></div>`
          : ""}
      <textarea class="hw-sentence" id="hw-sent-${w.id}" rows="2"
        placeholder="${w.handwriting_task ? "כתוב את משפטך כאן..." : `כתוב משפט בו משתמשים במילה '${escHtml(w.word)}'...`}"></textarea>
      <label class="hw-upload" id="hw-upload-${w.id}">
        📸 העלה תמונת כתב יד (אופציונלי)
        <input type="file" accept="image/*" capture="environment"
          onchange="handleHWUpload('${w.id}', this)">
      </label>
      <img class="hw-preview" id="hw-prev-${w.id}" src="" alt="תצוגה מקדימה">
      <button class="lex-btn green" style="width:100%;margin-top:4px;"
        onclick="submitHandwriting('${w.id}')">
        📤 שלח ← +XP
      </button>
      <div class="hw-status" id="hw-status-${w.id}"></div>
    </div>`).join("");
}

function handleHWUpload(wordId, input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById("hw-prev-" + wordId);
  const reader  = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.style.display = "block";
    // Store compressed base64 in dataset
    preview.dataset.base64 = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function submitHandwriting(wordId) {
  const sentence  = document.getElementById("hw-sent-" + wordId)?.value.trim() || "";
  const preview   = document.getElementById("hw-prev-" + wordId);
  const imageData = preview?.dataset.base64 || null;
  const statusEl  = document.getElementById("hw-status-" + wordId);

  if (!sentence && !imageData) {
    statusEl.style.color = "#ef4444";
    statusEl.textContent = "כתוב משפט או העלה תמונה.";
    return;
  }

  statusEl.style.color = "#6366f1";
  statusEl.textContent = "שולח...";

  try {
    const res = await fetch("/api/lexicon/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ studentId, wordId, sentence, imageData })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "שגיאה");

    statusEl.style.color = "#16a34a";
    statusEl.textContent = `✅ הוגש! +${data.xpEarned || 8} XP`;

    // Update localStorage XP
    const xp = parseInt(localStorage.getItem("miled_xp") || "0");
    localStorage.setItem("miled_xp", String(xp + (data.xpEarned || 8)));
    flashXP(data.xpEarned || 8);

    // Disable the card
    const card = document.getElementById("hw-card-" + wordId);
    if (card) {
      card.style.opacity = ".6";
      card.querySelectorAll("button,textarea,input").forEach(el => el.disabled = true);
    }
  } catch (e) {
    statusEl.style.color = "#ef4444";
    statusEl.textContent = e.message;
  }
}

// ─────────────────────────────
// XP flash
// ─────────────────────────────
function flashXP(amount) {
  const el = document.createElement("div");
  el.className   = "xp-flash";
  el.textContent = `+${amount} XP 🏆`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2300);
}

// ─────────────────────────────
// Utility
// ─────────────────────────────
function escHtml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function renderEmpty() {
  document.getElementById("word-grid").innerHTML =
    '<div class="lex-empty">הלקסיקון ריק — בקש ממנהל המערכת להוסיף מילים.</div>';
  document.getElementById("word-count-badge").innerText = "0 מילים";
}

init();

</script>
</body>
</html>
