<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>MilEd.One — הסטטוס שלי</title>
<style>
/* ── 5-Pillar Tiles ── */
.pillar-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.pillar-tile {
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
  border: 1.5px solid #e2e8f0;
  background: #f8fafc;
  transition: border-color 0.2s;
}
.pillar-tile.pillar-unstarted { border-color: #fecaca; background: #fff5f5; }
.pillar-tile.pillar-active    { border-color: #fed7aa; background: #fffbf0; }
.pillar-tile.pillar-done      { border-color: #bbf7d0; background: #f0fdf4; }
.pillar-tile-icon  { font-size: 22px; line-height: 1; }
.pillar-tile-label { font-size: 11px; font-weight: 600; color: #475569; margin: 5px 0 3px; }
.pillar-tile-status{ font-size: 14px; }

/* ── Next Step Card ── */
.next-step-card {
  display: block;
  border-radius: 14px;
  padding: 18px 20px;
  text-decoration: none;
  color: inherit;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  transition: box-shadow 0.2s, border-color 0.2s;
  margin-top: 4px;
}
.next-step-card:hover { box-shadow: 0 6px 20px rgba(30,27,75,0.10); }
.next-step-card.step-diagnosis    { border-color: #c7d2fe; background: #eef2ff; }
.next-step-card.step-reinforcement{ border-color: #bbf7d0; background: #f0fdf4; }
.next-step-card.step-done         { border-color: #bbf7d0; background: #f0fdf4; cursor: default; }
.next-step-phase {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.step-badge {
  font-size: 10px; font-weight: 700; padding: 2px 9px;
  border-radius: 20px; letter-spacing: 0.4px;
}
.step-badge.step-1     { background: #6366f1; color: #fff; }
.step-badge.step-2     { background: #10b981; color: #fff; }
.step-badge.step-done-b{ background: #10b981; color: #fff; }
.next-step-type  { font-size: 13px; font-weight: 600; color: #1e1b4b; }
.next-step-title { font-size: 15px; font-weight: 700; color: #1e1b4b; margin-bottom: 4px; }
.next-step-cta   { font-size: 13px; color: #6366f1; font-weight: 500; }
.next-step-card.step-reinforcement .next-step-cta { color: #059669; }

/* ── Active Learning Skill Cards ── */
.skill-action-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px;
  border-radius: 12px;
  border: 1.5px solid #e2e8f0;
  margin-bottom: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #fff;
  position: relative;
  overflow: hidden;
}
.skill-action-card::before {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 0 12px 12px 0;
  background: #e2e8f0;
  transition: background 0.3s;
}
.skill-action-card.state-unstarted { border-color: #fecaca; }
.skill-action-card.state-unstarted::before { background: #ef4444; }
.skill-action-card.state-active    { border-color: #fed7aa; }
.skill-action-card.state-active::before    { background: #f97316; }
.skill-action-card.state-completed { border-color: #bbf7d0; }
.skill-action-card.state-completed::before { background: #10b981; }

.skill-action-badge {
  font-size: 26px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 2px;
  transition: transform 0.3s;
}
.skill-action-card.state-completed .skill-action-badge {
  transform: scale(1.15);
}
.skill-action-body { flex: 1; min-width: 0; }
.skill-action-name {
  font-size: 14px;
  font-weight: 600;
  color: #1e1b4b;
  margin-bottom: 5px;
}
.skill-action-cta {
  display: inline-block;
  font-size: 13px;
  color: #6366f1;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.15s;
  line-height: 1.5;
}
.skill-action-card.state-unstarted .skill-action-cta { color: #dc2626; }
.skill-action-card.state-active    .skill-action-cta { color: #ea580c; }
.skill-action-card.state-completed .skill-action-cta { color: #059669; }
.skill-action-cta:hover { text-decoration: underline; }

.skill-action-meta {
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.skill-wave-pill {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: #f1f5f9;
  color: #64748b;
  letter-spacing: 0.3px;
}
.skill-wave-pill.wave1 { background: rgba(99,102,241,0.1); color: #4338ca; }
.skill-wave-pill.wave2 { background: rgba(16,185,129,0.1); color: #059669; }

/* slide-in animation when card state changes */
@keyframes cardFlip {
  0%   { opacity: 0.4; transform: translateY(-4px); }
  100% { opacity: 1;   transform: translateY(0); }
}
.skill-action-card.animating { animation: cardFlip 0.3s ease-out; }

/* ─── v8.7 Synergy Dashboard ─── */
.synergy-container { padding: 6px 8px 12px !important; max-width: 100% !important; }

.synergy-grid {
  display: grid;
  grid-template-columns: 30% 40% 30%;
  min-height: calc(100vh - 110px);
  border: 1px solid #e2e8f0;
  border-radius: 14px;
  overflow: hidden;
  background: #fff;
  margin-bottom: 12px;
}
.syn-panel {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow-y: auto;
}
.syn-panel + .syn-panel { border-right: 1px solid #e2e8f0; }
.syn-middle { background: #f8fafc; align-items: center; }
.syn-panel-header {
  font-size: 11px; font-weight: 700; color: #475569; letter-spacing: .5px;
  text-transform: uppercase; padding-bottom: 8px;
  border-bottom: 1px solid #f1f5f9; margin-bottom: 10px; flex-shrink: 0;
}

/* Course cards */
.syn-course-card {
  padding: 9px 11px; border-radius: 9px;
  border: 1.5px solid #e2e8f0; margin-bottom: 7px;
  cursor: default; transition: border-color .2s, background .2s; background: #fff;
}
.syn-course-card:hover { border-color: #6366f1; background: #eef2ff; }
.syn-course-name { font-size: 13px; font-weight: 600; color: #1e293b; }
.syn-course-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
.syn-course-bar { height: 4px; background: #f1f5f9; border-radius: 4px; margin-top: 6px; overflow: hidden; }
.syn-course-bar-fill { height: 100%; border-radius: 4px; background: #6366f1; transition: width .6s; }

/* Radar axis hover effects */
.radar-axis { transition: stroke .15s, stroke-width .15s; }
.radar-axis.axis-highlight { stroke: #6366f1 !important; stroke-width: 2.5 !important; }
.radar-label-group { transition: opacity .15s; }
.radar-label-group.axis-dim { opacity: 0.25; }

/* Right column skill items */
.syn-skills-section { margin-bottom: 10px; }
.syn-skills-label {
  font-size: 10px; font-weight: 700; letter-spacing: .4px;
  padding: 3px 9px; border-radius: 20px; display: inline-block; margin-bottom: 7px;
}
.syn-skills-label.needs       { background: #fee2e2; color: #dc2626; }
.syn-skills-label.recommended { background: #fffbeb; color: #b45309; }
.syn-skill-item {
  display: flex; align-items: center; gap: 7px; padding: 7px 9px;
  border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 5px;
  text-decoration: none; color: inherit; background: #fff; transition: background .15s;
}
.syn-skill-item:hover { background: #f8fafc; }
.syn-skill-item.needs-item { border-color: #fecaca; background: #fff5f5; }
.syn-skill-item.needs-item:hover { background: #fee2e2; }
.syn-skill-icon { font-size: 15px; flex-shrink: 0; }
.syn-skill-name { font-size: 12px; font-weight: 600; color: #1e293b; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.syn-skill-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 700; flex-shrink: 0; }
.syn-skill-badge.needs-badge { background: #fecaca; color: #b91c1c; }
.syn-skill-badge.rec-badge   { background: #dbeafe; color: #2563eb; }

@media (max-width: 768px) {
  .synergy-grid { grid-template-columns: 1fr; min-height: auto; }
  .syn-panel + .syn-panel { border-right: none; border-top: 1px solid #e2e8f0; }
}
</style>
</head>

<body class="user-student">

<div class="sidebar">
  <h2>MilEd.One</h2>
  <a href="/students.html">קורסים</a>
  <a href="/skills.html">מיומנויות</a>
  <a href="/student_dashboard.html" class="active">הסטטוס שלי</a>
</div>

<div class="main">

  <div class="topbar">
    <span>🕸️ לוח הסינרגיה</span>
    <span style="font-size:11px;color:var(--color-text-muted);margin-right:auto;">קורסים ↔ מיומנויות</span>
    <button onclick="sessionStorage.clear();location.replace('/')" class="logout-btn">← יציאה</button>
  </div>

  <div class="container synergy-container">

    <div id="status-error" style="color:#dc2626;margin-bottom:8px;display:none;"></div>

    <!-- ─── Synergy Grid (v8.7) ─── -->
    <div class="synergy-grid">

      <!-- LEFT 30%: Academic Dimension -->
      <div class="syn-panel syn-left">
        <div class="syn-panel-header">📚 המימד האקדמי</div>
        <div id="syn-courses">
          <div style="color:var(--color-text-muted);font-size:12px;text-align:center;padding:20px 0;">⏳ טוען...</div>
        </div>
      </div>

      <!-- MIDDLE 40%: Integration Bridge -->
      <div class="syn-panel syn-middle">
        <div class="syn-panel-header" style="text-align:center;width:100%;">🕸️ גשר האינטגרציה</div>
        <div style="flex:1;display:flex;align-items:center;justify-content:center;width:100%;">
          <div style="text-align:center;">
            <svg id="synergy-radar-svg" viewBox="0 0 260 260"
              style="width:min(100%,230px);height:auto;display:block;margin:0 auto;"></svg>
            <p id="synergy-radar-hint" style="font-size:11px;color:var(--color-text-muted);margin-top:6px;">
              השלם מיומנויות כדי לראות את הגשר
            </p>
          </div>
        </div>
      </div>

      <!-- RIGHT 30%: Skills Profile -->
      <div class="syn-panel syn-right">
        <div class="syn-panel-header">⭐ פרופיל המיומנויות</div>

        <div class="syn-skills-section">
          <div class="syn-skills-label needs">🔴 מה צריך? — חובה</div>
          <div id="syn-needs"></div>
        </div>

        <div class="syn-skills-section">
          <div class="syn-skills-label recommended">📘 מה כדאי? — מומלץ</div>
          <div id="syn-recommended"></div>
        </div>

      </div>

    </div>

    <a href="/" onclick="sessionStorage.clear()" class="btn btn-outline" style="font-size:12px;padding:6px 16px;">← חזרה למסך הבית</a>

  </div>
</div>

<script>

// ─── Student ID ───
let studentId = sessionStorage.getItem("studentId");
if (!studentId) {
  studentId = "s_" + Math.random().toString(36).slice(2, 10);
  sessionStorage.setItem("studentId", studentId);
}

let _config = null;

// ─── 5-Pillar map (mirrors skills.html) ───
const PILLAR_MAP = {
  diag_1:                    "resilience",
  learning_skills_full:      "academic",
  employability_skills_full: "career",
  support:                   "resilience",
  presentation:              "social",
  academic_writing:          "academic",
  research_skills:           "academic",
};

const PILLARS = [
  { id: "academic",   icon: "🎓", label: "למידה וחשיבה"   },
  { id: "resilience", icon: "🧘", label: "ניהול וחוסן"     },
  { id: "social",     icon: "🤝", label: "תקשורת וחברה"    },
  { id: "tools",      icon: "💻", label: "כלים וטכנ׳"      },
  { id: "career",     icon: "💼", label: "מוכנות לקריירה"  },
];

// ─── Status helpers ───
function getDraftStatus(courseId) {
  const key = `miled_ws_${courseId}_${studentId}`;
  const val = localStorage.getItem(key);
  if (!val || val.trim() === "") return { label: "לא התחיל", pct: 0, cls: "" };
  const w = val.trim().split(/\s+/).length;
  if (w < 20)  return { label: "בתחילת הדרך", pct: 15, cls: "" };
  if (w < 100) return { label: "בתהליך",       pct: 45, cls: "indigo" };
  return             { label: "עבודה מפותחת",   pct: 80, cls: "indigo" };
}

function getSkillStatus(botId) {
  const wave1 = !!localStorage.getItem(`miled_skill_ts_${botId}`);
  const wave2 = !!localStorage.getItem(`miled_skill_ts2_${botId}`);
  const legacy = !!(sessionStorage.getItem(`miled_skill_${botId}_${studentId}`)
               || localStorage.getItem(`miled_skill_${botId}_${studentId}`));
  if (wave2)            return { label: "הושלם — גל 2",   pct: 100, wave1: true,  wave2: true  };
  if (wave1 || legacy)  return { label: "אבחון ומיפוי — גל 1", pct: 55, wave1: true,  wave2: false };
  return                       { label: "טרם התחיל",       pct: 0,   wave1: false, wave2: false };
}

function resolveSkillUrl(id) {
  return `/workspace.html?skillId=${id}`;
}

// ─── renderProgressRow — kept for backward compat ───
function renderProgressRow(label, status) { return ""; }

// ─── Build allSkills array from config ───
function buildAllSkills(config) {
  const skills    = config.branches?.skills?.items || {};
  const uSkillIds = ["presentation", "academic_writing", "research_skills", "support"];
  const all = [];
  for (const id in skills) all.push({ id, bot: skills[id], status: getSkillStatus(id) });
  uSkillIds.forEach(id => {
    const bot = config.universal?.items?.[id];
    if (bot) all.push({ id, bot: { ...bot, _layer: "skills_process" }, status: getSkillStatus(id) });
  });
  return all;
}

// ─── Reactivity: tab return ───
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") refreshSkillsPanel();
});

// ─── Load config ───
fetch('/config.json?ts=' + Date.now())
  .then(r => r.json())
  .then(config => {
    _config = config;
    refreshSkillsPanel();
  })
  .catch(err => {
    console.error("Config load error:", err);
    const e = document.getElementById("status-error");
    if (e) { e.style.display = "block"; e.innerText = "שגיאה בטעינת הנתונים. נסה לרענן."; }
  });

// ════════════════════════════════════════════════════════════════
// SYNERGY DASHBOARD (v8.7)
// ════════════════════════════════════════════════════════════════

function getPillarScore(pillarId, allSkills) {
  const relevant = allSkills.filter(s => (PILLAR_MAP[s.id] || "academic") === pillarId);
  if (!relevant.length) return 0;
  return relevant.reduce((sum, s) => sum + s.status.pct, 0) / relevant.length / 100;
}

// ─── Pentagon Spider Chart ───
function buildPentagonRadar(allSkills) {
  const svg = document.getElementById("synergy-radar-svg");
  if (!svg) return;

  const cx = 130, cy = 130, R = 90;
  const angles = PILLARS.map((_, i) => (-90 + i * 72) * Math.PI / 180);
  const vals   = PILLARS.map(p => getPillarScore(p.id, allSkills));
  const hasData = vals.some(v => v > 0.01);
  let html = "";

  // Rings
  [0.25, 0.5, 0.75, 1.0].forEach(pct => {
    const pts = angles.map(a => `${cx+Math.cos(a)*R*pct},${cy+Math.sin(a)*R*pct}`).join(" ");
    html += `<polygon points="${pts}" fill="${pct < 1 ? 'rgba(241,245,249,0.5)' : 'none'}" stroke="#e2e8f0" stroke-width="${pct === 1 ? 1.5 : 1}"/>`;
  });

  // Axes — IDs for hover highlighting
  angles.forEach((a, i) => {
    html += `<line id="axis-${PILLARS[i].id}" class="radar-axis"
      x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*R}" y2="${cy+Math.sin(a)*R}"
      stroke="#cbd5e1" stroke-width="1.5"/>`;
  });

  // Data polygon
  if (hasData) {
    const dataPts = angles.map((a, i) => {
      const v = Math.max(0.05, vals[i]);
      return `${cx+Math.cos(a)*R*v},${cy+Math.sin(a)*R*v}`;
    }).join(" ");
    html += `<polygon points="${dataPts}" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="2"/>`;
    angles.forEach((a, i) => {
      const v = Math.max(0.05, vals[i]);
      const px = cx+Math.cos(a)*R*v, py = cy+Math.sin(a)*R*v;
      const col = vals[i] === 0 ? "#fca5a5" : vals[i] >= 0.8 ? "#10b981" : "#6366f1";
      html += `<circle cx="${px}" cy="${py}" r="5" fill="${col}" stroke="#fff" stroke-width="2"/>`;
    });
  }

  // Labels — grouped for hover dimming
  PILLARS.forEach((p, i) => {
    const a = angles[i];
    const lx = cx+Math.cos(a)*(R+28), ly = cy+Math.sin(a)*(R+28);
    const anchor = lx < cx-8 ? "end" : lx > cx+8 ? "start" : "middle";
    const pct = Math.round(vals[i]*100);
    html += `<g id="label-${p.id}" class="radar-label-group">
      <text x="${lx}" y="${ly-5}" text-anchor="${anchor}" font-size="11" fill="#475569" font-family="Assistant,sans-serif">${p.icon} ${p.label}</text>
      <text x="${lx}" y="${ly+8}" text-anchor="${anchor}" font-size="11" fill="${pct > 0 ? '#6366f1' : '#94a3b8'}" font-family="Assistant,sans-serif" font-weight="700">${pct}%</text>
    </g>`;
  });

  svg.innerHTML = html;
  const hint = document.getElementById("synergy-radar-hint");
  if (hint) hint.style.display = hasData ? "none" : "";
}

// ─── Left: Course list with hover connectors ───
function renderSynergyLeft(courses) {
  const el = document.getElementById("syn-courses");
  if (!el) return;

  const syllabus      = JSON.parse(localStorage.getItem("miled_syllabus") || "[]");
  const mappedPillars = [...new Set(syllabus.map(r => r.pillar))];
  const defaultConn   = ["academic"];

  const courseIds = Object.keys(courses);
  if (!courseIds.length) {
    el.innerHTML = `<div style="color:var(--color-text-muted);font-size:12px;text-align:center;padding:20px 0;">אין קורסים רשומים</div>`;
    return;
  }

  el.innerHTML = courseIds.map(id => {
    const course       = courses[id];
    const status       = getDraftStatus(id);
    const pillarsAttr  = (mappedPillars.length ? mappedPillars : defaultConn).join(",");
    return `
      <div class="syn-course-card" data-pillars="${pillarsAttr}"
           onmouseenter="highlightCourseAxes('${pillarsAttr}',true)"
           onmouseleave="highlightCourseAxes('',false)">
        <div class="syn-course-name">📚 ${course.name}</div>
        <div class="syn-course-meta">${status.label}</div>
        <div class="syn-course-bar">
          <div class="syn-course-bar-fill" style="width:${status.pct}%"></div>
        </div>
      </div>`;
  }).join('') +
  `<a href="/skills.html" style="display:block;text-align:center;font-size:12px;color:#6366f1;margin-top:8px;font-weight:600;text-decoration:none;">
    → כל המיומנויות
  </a>`;
}

// ─── Hover: highlight axes corresponding to hovered course ───
function highlightCourseAxes(pillarsStr, active) {
  const activeSet = active && pillarsStr ? new Set(pillarsStr.split(",")) : new Set();
  PILLARS.forEach(p => {
    const axis  = document.getElementById("axis-"  + p.id);
    const label = document.getElementById("label-" + p.id);
    if (!active) {
      axis?.classList.remove("axis-highlight");
      label?.classList.remove("axis-dim");
    } else if (activeSet.has(p.id)) {
      axis?.classList.add("axis-highlight");
      label?.classList.remove("axis-dim");
    } else {
      axis?.classList.remove("axis-highlight");
      label?.classList.add("axis-dim");
    }
  });
}

// ─── Right: Needs (🔴) / Recommended (📘) split ───
function renderSynergyRight(allSkills) {
  // Needs: wave1 not done → must do first
  const needs = allSkills.filter(s => !s.status.wave1);
  // Recommended: wave1 done, wave2 not done → enhancement
  const recommended = allSkills.filter(s => s.status.wave1 && !s.status.wave2);

  // Sort recommended: lowest pillar score first (most urgent pillar rises to top)
  const pillarScores = {};
  PILLARS.forEach(p => pillarScores[p.id] = getPillarScore(p.id, allSkills));
  recommended.sort((a, b) =>
    (pillarScores[PILLAR_MAP[a.id] || "academic"] || 0) -
    (pillarScores[PILLAR_MAP[b.id] || "academic"] || 0)
  );

  const needsEl = document.getElementById("syn-needs");
  const recEl   = document.getElementById("syn-recommended");

  if (needsEl) {
    needsEl.innerHTML = needs.length === 0
      ? `<div style="font-size:12px;color:#059669;text-align:center;padding:6px;">✓ כל אבחוני החובה הושלמו</div>`
      : needs.slice(0, 5).map(s => {
          const p = PILLARS.find(p => p.id === (PILLAR_MAP[s.id] || "academic")) || PILLARS[0];
          return `<a href="${resolveSkillUrl(s.id)}" class="syn-skill-item needs-item">
            <span class="syn-skill-icon">${p.icon}</span>
            <span class="syn-skill-name">${s.bot.name}</span>
            <span class="syn-skill-badge needs-badge">🔴 חובה</span>
          </a>`;
        }).join('');
  }

  if (recEl) {
    recEl.innerHTML = recommended.length === 0
      ? `<div style="font-size:12px;color:#64748b;text-align:center;padding:6px;">${needs.length === 0 ? '🎉 הכל הושלם!' : 'השלם אבחון תחילה'}</div>`
      : recommended.slice(0, 5).map(s => {
          const p = PILLARS.find(p => p.id === (PILLAR_MAP[s.id] || "academic")) || PILLARS[0];
          return `<a href="${resolveSkillUrl(s.id)}" class="syn-skill-item">
            <span class="syn-skill-icon">📘</span>
            <span class="syn-skill-name">${s.bot.name}</span>
            <span class="syn-skill-badge rec-badge">גל 2 →</span>
          </a>`;
        }).join('');
  }
}

// ─── Master refresh (called on load + visibilitychange) ───
function refreshSkillsPanel() {
  if (!_config) return;
  const allSkills = buildAllSkills(_config);
  renderSynergyLeft(_config.my_courses || {});
  buildPentagonRadar(allSkills);
  renderSynergyRight(allSkills);
}

// ─── Skill Progress Widget — kept for backward compat, not rendered in v8.7 ───
function renderSkillProgressWidget() {
  const PILLAR_META = [
    { id: "academic",   icon: "🎓", label: "למידה וחשיבה",    color: "#6366f1",
      skills: ["learning_skills_full", "academic_writing", "research_skills"] },
    { id: "resilience", icon: "🧘", label: "ניהול וחוסן",     color: "#f59e0b",
      skills: ["diag_1", "support"] },
    { id: "social",     icon: "🤝", label: "תקשורת וחברה",    color: "#a21caf",
      skills: ["presentation"] },
    { id: "tools",      icon: "💻", label: "כלים וטכנולוגיה", color: "#06b6d4",
      skills: [] },
    { id: "career",     icon: "💼", label: "מוכנות לקריירה",  color: "#10b981",
      skills: ["employability_skills_full"] },
  ];

  // Course impact: which pillars are mapped in the lecturer's syllabus
  const syllabusRows      = JSON.parse(localStorage.getItem("miled_syllabus") || "[]");
  const syllabusedPillars = new Set(syllabusRows.map(r => r.pillar));

  const wrap = document.getElementById("pillar-progress-bars");
  if (!wrap) return;

  wrap.innerHTML = PILLAR_META.map(p => {
    let pct = 0;
    if (p.skills.length > 0) {
      const total = p.skills.reduce((sum, id) => sum + getSkillStatus(id).pct, 0);
      pct = Math.round(total / p.skills.length);
    }
    const stateLabel = pct === 0 ? "טרם החל" : pct < 60 ? "בתהליך" : pct < 100 ? "מתקדם" : "הושלם ✓";

    // Course impact line — shown when the lecturer mapped topics to this pillar
    const hasImpact = syllabusedPillars.has(p.id);
    const impactHtml = hasImpact
      ? `<div style="font-size:11px;color:#059669;margin-top:5px;display:flex;align-items:center;gap:5px;">
           <span style="background:#dcfce7;color:#15803d;padding:1px 7px;border-radius:20px;font-weight:700;font-size:10px;">📌 השפעת קורס</span>
           <span>ביצועיך בקורס משפיעים ישירות על מיומנות זו</span>
         </div>`
      : "";

    return `
      <div style="margin-bottom:18px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <span style="font-size:13px;font-weight:600;color:#1e293b;">${p.icon} ${p.label}</span>
          <span style="font-size:12px;color:#64748b;">${pct}% — ${stateLabel}</span>
        </div>
        <div style="height:9px;background:#f1f5f9;border-radius:6px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${p.color};border-radius:6px;transition:width .7s ease;"></div>
        </div>
        ${impactHtml}
      </div>`;
  }).join('');
}

function renderRecommendations() {}
