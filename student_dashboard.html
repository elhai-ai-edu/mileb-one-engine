<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>MilEd.One — הסטטוס שלי</title>
<style>
/* ── 5-Pillar Tiles ── */
.pillar-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.pillar-tile {
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
  border: 1.5px solid #e2e8f0;
  background: #f8fafc;
  transition: border-color 0.2s;
}
.pillar-tile.pillar-unstarted { border-color: #fecaca; background: #fff5f5; }
.pillar-tile.pillar-active    { border-color: #fed7aa; background: #fffbf0; }
.pillar-tile.pillar-done      { border-color: #bbf7d0; background: #f0fdf4; }
.pillar-tile-icon  { font-size: 22px; line-height: 1; }
.pillar-tile-label { font-size: 11px; font-weight: 600; color: #475569; margin: 5px 0 3px; }
.pillar-tile-status{ font-size: 14px; }

/* ── Next Step Card ── */
.next-step-card {
  display: block;
  border-radius: 14px;
  padding: 18px 20px;
  text-decoration: none;
  color: inherit;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  transition: box-shadow 0.2s, border-color 0.2s;
  margin-top: 4px;
}
.next-step-card:hover { box-shadow: 0 6px 20px rgba(30,27,75,0.10); }
.next-step-card.step-diagnosis    { border-color: #c7d2fe; background: #eef2ff; }
.next-step-card.step-reinforcement{ border-color: #bbf7d0; background: #f0fdf4; }
.next-step-card.step-done         { border-color: #bbf7d0; background: #f0fdf4; cursor: default; }
.next-step-phase {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.step-badge {
  font-size: 10px; font-weight: 700; padding: 2px 9px;
  border-radius: 20px; letter-spacing: 0.4px;
}
.step-badge.step-1     { background: #6366f1; color: #fff; }
.step-badge.step-2     { background: #10b981; color: #fff; }
.step-badge.step-done-b{ background: #10b981; color: #fff; }
.next-step-type  { font-size: 13px; font-weight: 600; color: #1e1b4b; }
.next-step-title { font-size: 15px; font-weight: 700; color: #1e1b4b; margin-bottom: 4px; }
.next-step-cta   { font-size: 13px; color: #6366f1; font-weight: 500; }
.next-step-card.step-reinforcement .next-step-cta { color: #059669; }

/* ── Active Learning Skill Cards ── */
.skill-action-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px;
  border-radius: 12px;
  border: 1.5px solid #e2e8f0;
  margin-bottom: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #fff;
  position: relative;
  overflow: hidden;
}
.skill-action-card::before {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 0 12px 12px 0;
  background: #e2e8f0;
  transition: background 0.3s;
}
.skill-action-card.state-unstarted { border-color: #fecaca; }
.skill-action-card.state-unstarted::before { background: #ef4444; }
.skill-action-card.state-active    { border-color: #fed7aa; }
.skill-action-card.state-active::before    { background: #f97316; }
.skill-action-card.state-completed { border-color: #bbf7d0; }
.skill-action-card.state-completed::before { background: #10b981; }

.skill-action-badge {
  font-size: 26px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 2px;
  transition: transform 0.3s;
}
.skill-action-card.state-completed .skill-action-badge {
  transform: scale(1.15);
}
.skill-action-body { flex: 1; min-width: 0; }
.skill-action-name {
  font-size: 14px;
  font-weight: 600;
  color: #1e1b4b;
  margin-bottom: 5px;
}
.skill-action-cta {
  display: inline-block;
  font-size: 13px;
  color: #6366f1;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.15s;
  line-height: 1.5;
}
.skill-action-card.state-unstarted .skill-action-cta { color: #dc2626; }
.skill-action-card.state-active    .skill-action-cta { color: #ea580c; }
.skill-action-card.state-completed .skill-action-cta { color: #059669; }
.skill-action-cta:hover { text-decoration: underline; }

.skill-action-meta {
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.skill-wave-pill {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: #f1f5f9;
  color: #64748b;
  letter-spacing: 0.3px;
}
.skill-wave-pill.wave1 { background: rgba(99,102,241,0.1); color: #4338ca; }
.skill-wave-pill.wave2 { background: rgba(16,185,129,0.1); color: #059669; }

/* slide-in animation when card state changes */
@keyframes cardFlip {
  0%   { opacity: 0.4; transform: translateY(-4px); }
  100% { opacity: 1;   transform: translateY(0); }
}
.skill-action-card.animating { animation: cardFlip 0.3s ease-out; }

/* ─── v8.9.1 Skill Pioneer — Funnel Layout ─── */
.pioneer-container { padding: 6px 8px 12px !important; max-width: 100% !important; }

/* ── Outer shell ── */
.pioneer-funnel {
  display: flex; flex-direction: column;
  min-height: calc(100vh - 110px);
  border: 1px solid #1e1b4b;
  border-radius: 14px; overflow: hidden;
  background: #fff; margin-bottom: 12px;
}

/* ── TOP: Synergy / Integration strip (full width) ── */
.pioneer-top {
  padding: 12px 20px 10px;
  border-bottom: 1px solid #e2e8f0;
  background: #f8fafc;
  display: flex; align-items: center; gap: 0;
}

/* ── MIDDLE: Hero (left) + Courses (right) ── */
.pioneer-middle {
  display: grid;
  grid-template-columns: 44% 56%;
  flex: 1; min-height: 0;
}
.pioneer-hero-col {
  background: linear-gradient(165deg, #0f172a 0%, #1e1b4b 60%, #1a1534 100%);
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 14px 12px; position: relative; overflow: hidden;
  border-left: 1px solid #312e81;
}
.pioneer-hero-col::before {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.11) 1px, transparent 1px);
  background-size: 22px 22px; pointer-events: none;
}
.pioneer-courses-col {
  padding: 14px 16px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 10px;
}

/* ── BOTTOM: Action blocks strip (full width) ── */
.pioneer-bottom {
  border-top: 1px solid #e2e8f0;
  padding: 12px 18px 14px;
  background: #f8fafc;
}

/* Section headers */
.pioneer-section-header {
  font-size: 10px; font-weight: 700; color: #64748b;
  letter-spacing: 0.5px; text-transform: uppercase;
  padding-bottom: 6px; border-bottom: 1px solid #f1f5f9; margin-bottom: 8px;
}

/* Mini radar (top strip) */
.mini-radar-wrap { display: flex; align-items: center; gap: 14px; flex: 1; }
.mini-radar-stats { display: flex; flex-direction: row; flex-wrap: wrap; gap: 10px 24px; flex: 1; }
.mini-stat { font-size: 11px; color: #475569; display: flex; align-items: center; gap: 6px; }
.mini-stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Courses */
.pioneer-course-item { padding: 8px 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; }
.pioneer-course-name { font-size: 12px; font-weight: 600; color: #1e293b; }
.pioneer-course-bar  { height: 3px; background: #e2e8f0; border-radius: 3px; margin-top: 5px; overflow: hidden; }
.pioneer-course-bar-fill { height: 100%; background: #6366f1; border-radius: 3px; transition: width .6s; }

/* XP Bar */
.xp-bar-container { width: 100%; z-index: 1; margin-bottom: 10px; }
.xp-bar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.xp-level-badge { font-size: 12px; font-weight: 700; color: #fbbf24; letter-spacing: 0.4px; }
.xp-label { font-size: 11px; color: rgba(255,255,255,0.55); }
.xp-track { height: 8px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; }
.xp-fill  { height: 100%; border-radius: 20px; background: linear-gradient(90deg,#6366f1,#a78bfa,#fbbf24); transition: width 1s cubic-bezier(0.34,1.56,0.64,1); }

/* Hero area */
.hero-area { position: relative; width: 200px; height: 200px; flex-shrink: 0; z-index: 1; }
.hero-svg  { width: 110px; height: 170px; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); }

/* Equipment slots */
.equip-slot {
  position: absolute; width: 42px; height: 42px; border-radius: 50%;
  background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.18);
  display: flex; align-items: center; justify-content: center; font-size: 20px;
  cursor: pointer; transition: box-shadow 0.3s, border-color 0.3s; z-index: 2;
}
.equip-slot.level-0 { border-color: rgba(255,255,255,0.15); opacity: 0.5; }
.equip-slot.level-1 { border-color: #818cf8; box-shadow: 0 0 10px rgba(99,102,241,0.55); }
.equip-slot.level-2 { border-color: #fbbf24; box-shadow: 0 0 14px rgba(251,191,36,0.65); animation: equipGlow 2s ease-in-out infinite; }
.equip-slot[data-pillar="academic"]   { top:4px; left:50%; transform:translateX(-50%); }
.equip-slot[data-pillar="resilience"] { top:50%; right:0;   transform:translateY(-50%); }
.equip-slot[data-pillar="social"]     { top:50%; left:0;    transform:translateY(-50%); }
.equip-slot[data-pillar="tools"]      { bottom:12px; right:14px; }
.equip-slot[data-pillar="career"]     { bottom:12px; left:14px; }
.equip-slot[data-pillar="academic"]:hover   { transform:translateX(-50%) scale(1.2); }
.equip-slot[data-pillar="resilience"]:hover { transform:translateY(-50%) scale(1.2); }
.equip-slot[data-pillar="social"]:hover     { transform:translateY(-50%) scale(1.2); }
.equip-slot[data-pillar="tools"]:hover,
.equip-slot[data-pillar="career"]:hover     { transform:scale(1.2); }

/* Action blocks (bottom strip) */
.action-blocks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.action-block { border-radius: 10px; border: 1.5px solid #e2e8f0; padding: 12px; background: #fff; }
.action-block.needs-block { border-color: #fecaca; background: #fff5f5; }
.action-block.rec-block   { border-color: #dbeafe; background: #eff6ff; }
.action-block-title { font-size: 10px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.3px; }
.action-block.needs-block .action-block-title { color: #dc2626; }
.action-block.rec-block   .action-block-title { color: #2563eb; }
.action-skill-link {
  display: block; font-size: 11px; color: #1e293b; text-decoration: none;
  padding: 4px 0; border-bottom: 1px solid #f1f5f9; transition: color .15s;
}
.action-skill-link:last-child { border-bottom: none; }
.action-skill-link:hover { color: #6366f1; }

/* XP float animation */
@keyframes equipGlow {
  0%,100% { box-shadow: 0 0 8px rgba(251,191,36,0.4); }
  50%      { box-shadow: 0 0 22px rgba(251,191,36,0.9); }
}
@keyframes xpFloat {
  0%   { opacity:1; transform:translateX(-50%) translateY(0); }
  100% { opacity:0; transform:translateX(-50%) translateY(-60px); }
}
.xp-float {
  position:absolute; font-size:17px; font-weight:700; color:#fbbf24;
  pointer-events:none; z-index:10; left:50%; top:40%;
  animation:xpFloat 1.1s ease-out forwards;
}

/* Pillar modal */
.pillar-modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:900;
  display:none; align-items:center; justify-content:center;
}
.pillar-modal-overlay.open { display:flex; }
.pillar-modal {
  background:#fff; border-radius:18px; padding:28px;
  max-width:420px; width:90%; max-height:80vh; overflow-y:auto;
  direction:rtl; box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.pillar-modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.pillar-modal-title  { font-size:17px; font-weight:700; color:#1e293b; }
.pillar-modal-close  { background:none; border:none; font-size:22px; cursor:pointer; color:#94a3b8; line-height:1; }
.pillar-modal-skill-row {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  border-radius:10px; border:1px solid #e2e8f0; margin-bottom:8px;
  text-decoration:none; color:inherit; background:#f8fafc; transition:background .15s;
}
.pillar-modal-skill-row:hover { background:#eef2ff; border-color:#c7d2fe; }
.pillar-modal-skill-status { font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; flex-shrink:0; }
.status-not-started { background:#fee2e2; color:#dc2626; }
.status-wave1 { background:rgba(99,102,241,0.1); color:#4338ca; }
.status-wave2 { background:#d1fae5; color:#065f46; }

@media (max-width: 768px) {
  .pioneer-middle { grid-template-columns: 1fr; }
  .pioneer-hero-col { min-height: 320px; }
  .action-blocks-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body class="user-student">

<div class="sidebar">
  <h2>MilEd.One</h2>
  <a href="/students.html">קורסים</a>
  <a href="/skills.html">מיומנויות</a>

<div class="main">

  <div class="topbar">
    <span>🧭 לוח החלוץ</span>
    <span style="font-size:11px;color:var(--color-text-muted);margin-right:auto;">מסלול הצמיחה האישי שלך</span>
    <button onclick="sessionStorage.clear();location.replace('/')" class="logout-btn">← יציאה</button>
  </div>

  <div class="container pioneer-container">

    <div id="status-error" style="color:#dc2626;margin-bottom:8px;display:none;"></div>

    <div class="pioneer-funnel">

      <!-- ═══ TOP ROW: Synergy / Integration (full width) ═══ -->
      <div class="pioneer-top">
        <div class="pioneer-section-header" style="margin-bottom:0;border:none;padding-bottom:0;margin-left:16px;white-space:nowrap;">🕸️ גשר הסינרגיה</div>
        <div class="mini-radar-wrap">
          <svg id="mini-radar-svg" viewBox="0 0 160 160" style="width:110px;height:110px;flex-shrink:0;"></svg>

<script>

// ─── Student ID ───
let studentId = sessionStorage.getItem("studentId");
if (!studentId) {
  studentId = "s_" + Math.random().toString(36).slice(2, 10);
  sessionStorage.setItem("studentId", studentId);
}

let _config = null;

// ─── 5-Pillar map (mirrors skills.html) ───
const PILLAR_MAP = {
  diag_1:                    "resilience",
  learning_skills_full:      "academic",
  employability_skills_full: "career",
  support:                   "resilience",
  presentation:              "social",
  academic_writing:          "academic",
  research_skills:           "academic",
};

const PILLARS = [
  { id: "academic",   icon: "🎓", label: "למידה וחשיבה"   },
  { id: "resilience", icon: "🧘", label: "ניהול וחוסן"     },
  { id: "social",     icon: "🤝", label: "תקשורת וחברה"    },
  { id: "tools",      icon: "💻", label: "כלים וטכנ׳"      },
  { id: "career",     icon: "💼", label: "מוכנות לקריירה"  },
];

// ─── Status helpers ───
function getDraftStatus(courseId) {
  const key = `miled_ws_${courseId}_${studentId}`;
  const val = localStorage.getItem(key);
  if (!val || val.trim() === "") return { label: "לא התחיל", pct: 0, cls: "" };
  const w = val.trim().split(/\s+/).length;
  if (w < 20)  return { label: "בתחילת הדרך", pct: 15, cls: "" };
  if (w < 100) return { label: "בתהליך",       pct: 45, cls: "indigo" };
  return             { label: "עבודה מפותחת",   pct: 80, cls: "indigo" };
}

function getSkillStatus(botId) {
  const wave1 = !!localStorage.getItem(`miled_skill_ts_${botId}`);
  const wave2 = !!localStorage.getItem(`miled_skill_ts2_${botId}`);
  const legacy = !!(sessionStorage.getItem(`miled_skill_${botId}_${studentId}`)
               || localStorage.getItem(`miled_skill_${botId}_${studentId}`));
  if (wave2)            return { label: "הושלם — גל 2",   pct: 100, wave1: true,  wave2: true  };
  if (wave1 || legacy)  return { label: "אבחון ומיפוי — גל 1", pct: 55, wave1: true,  wave2: false };
  return                       { label: "טרם התחיל",       pct: 0,   wave1: false, wave2: false };
}

function resolveSkillUrl(id) {
  return `/workspace.html?skillId=${id}`;
}

// ─── renderProgressRow — kept for backward compat ───
function renderProgressRow(label, status) { return ""; }

// ─── Build allSkills array from config ───
function buildAllSkills(config) {
  const skills    = config.branches?.skills?.items || {};
  const uSkillIds = ["presentation", "academic_writing", "research_skills", "support"];
  const all = [];
  for (const id in skills) all.push({ id, bot: skills[id], status: getSkillStatus(id) });
  uSkillIds.forEach(id => {
    const bot = config.universal?.items?.[id];
    if (bot) all.push({ id, bot: { ...bot, _layer: "skills_process" }, status: getSkillStatus(id) });
  });
  return all;
}

// ─── Reactivity: tab return ───
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") refreshSkillsPanel();
});

// ─── Load config ───
fetch('/config.json?ts=' + Date.now())
  .then(r => r.json())
  .then(config => {
    _config = config;
    refreshSkillsPanel();
    // After initial localStorage render, sync Firebase completions (non-blocking)
    syncFromFirebase();
  })
  .catch(err => {
    console.error("Config load error:", err);
    const e = document.getElementById("status-error");
    if (e) { e.style.display = "block"; e.innerText = "שגיאה בטעינת הנתונים. נסה לרענן."; }
  });

// ════════════════════════════════════════════════════════════════
// PIONEER DASHBOARD (v8.9)
// ════════════════════════════════════════════════════════════════

const BOT_ICONS = {
  diag_1:"🔍", learning_skills_full:"📘", employability_skills_full:"💼",
  support:"🤝", presentation:"🎤", academic_writing:"✍️", research_skills:"🔬",
};

// ─── Pillar score helper ───
function getPillarScore(pillarId, allSkills) {
  const relevant = allSkills.filter(s => (PILLAR_MAP[s.id] || "academic") === pillarId);
  if (!relevant.length) return 0;
  return relevant.reduce((sum, s) => sum + s.status.pct, 0) / relevant.length / 100;
}

// ─── XP system ───
const XP_LEVELS = [
  { level:1, xpNeeded:0,   title:"מתחיל",   icon:"🌱" },
  { level:2, xpNeeded:100, title:"חוקר",     icon:"🔍" },
  { level:3, xpNeeded:250, title:"בנאי",     icon:"⚒️"  },
  { level:4, xpNeeded:450, title:"מיומן",    icon:"🎯" },
  { level:5, xpNeeded:700, title:"מומחה",    icon:"🌟" },
  { level:6, xpNeeded:999, title:"צ׳מפיון",  icon:"🏆" },
];

function calcXP(allSkills) {
  return allSkills.reduce((sum, s) => {
    if (s.status.wave2) return sum + 150;
    if (s.status.wave1) return sum + 50;
    return sum;
  }, 0);
}

function calcLevel(xp) {
  let current = XP_LEVELS[0];
  for (const lvl of XP_LEVELS) { if (xp >= lvl.xpNeeded) current = lvl; }
  const idx  = XP_LEVELS.indexOf(current);
  const next = XP_LEVELS[idx + 1];
  const pct  = next ? Math.round(((xp - current.xpNeeded) / (next.xpNeeded - current.xpNeeded)) * 100) : 100;
  return { ...current, xp, pct };
}

// ─── Equipment config ───
const EQUIPMENT = [
  { pillar:"academic",   icon:"🔦", name:"פנס הראש",  desc:"למידה וחשיבה"       },
  { pillar:"resilience", icon:"🧭", name:"מצפן",       desc:"ניהול עצמי וחוסן"   },
  { pillar:"social",     icon:"🎒", name:"תרמיל",      desc:"תקשורת ועבודת צוות" },
  { pillar:"tools",      icon:"📱", name:"טאבלט",      desc:"כלים וטכנולוגיה"    },
  { pillar:"career",     icon:"🛡️", name:"מגן",        desc:"מוכנות לקריירה"     },
];

function getEquipLevel(pillarId, allSkills) {
  const score = getPillarScore(pillarId, allSkills);
  if (score >= 0.8) return 2;
  if (score >= 0.4) return 1;
  return 0;
}

// ─── XP Bar ───
function renderXPBar(allSkills) {
  const xp   = calcXP(allSkills);
  const info = calcLevel(xp);
  const badge = document.getElementById("xp-level-badge");
  const label = document.getElementById("xp-label");
  const fill  = document.getElementById("xp-fill");
  if (badge) badge.textContent = `${info.icon} רמה ${info.level} — ${info.title}`;
  if (label) label.textContent = `${xp} XP`;
  if (fill)  fill.style.width  = info.pct + "%";
}

// ─── Equipment slots ───
function renderEquipmentSlots(allSkills) {
  const area = document.getElementById("hero-area");
  if (!area) return;
  area.querySelectorAll(".equip-slot").forEach(el => el.remove());
  EQUIPMENT.forEach(eq => {
    const level = getEquipLevel(eq.pillar, allSkills);
    const slot  = document.createElement("div");
    slot.className      = `equip-slot level-${level}`;
    slot.dataset.pillar = eq.pillar;
    slot.title          = `${eq.name} — ${eq.desc}`;
    slot.textContent    = eq.icon;
    slot.onclick        = () => openPillarModal(eq.pillar, allSkills);
    area.appendChild(slot);
  });
}

// ─── Mini Pentagon Radar (left panel) ───
function buildMiniRadar(allSkills) {
  const svg   = document.getElementById("mini-radar-svg");
  const stats = document.getElementById("mini-radar-stats");
  if (!svg) return;
  const cx = 80, cy = 80, R = 58;
  const angles = PILLARS.map((_, i) => (-90 + i * 72) * Math.PI / 180);
  const vals   = PILLARS.map(p => getPillarScore(p.id, allSkills));
  let html = "";

  // Rings
  [0.33, 0.66, 1.0].forEach(pct => {
    const pts = angles.map(a => `${cx+Math.cos(a)*R*pct},${cy+Math.sin(a)*R*pct}`).join(" ");
    html += `<polygon points="${pts}" fill="none" stroke="${pct===1?'#cbd5e1':'#e2e8f0'}" stroke-width="${pct===1?1.5:1}"/>`;
  });
  // Axes
  angles.forEach((a, i) => {
    html += `<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*R}" y2="${cy+Math.sin(a)*R}" stroke="#e2e8f0" stroke-width="1"/>`;
  });
  // Data polygon
  if (vals.some(v => v > 0.01)) {
    const pts = angles.map((a, i) => {
      const v = Math.max(0.05, vals[i]);
      return `${cx+Math.cos(a)*R*v},${cy+Math.sin(a)*R*v}`;
    }).join(" ");
    html += `<polygon points="${pts}" fill="rgba(99,102,241,0.18)" stroke="#6366f1" stroke-width="1.5"/>`;
  }
  // Icons
  PILLARS.forEach((p, i) => {
    const lx = cx + Math.cos(angles[i]) * (R + 12);
    const ly = cy + Math.sin(angles[i]) * (R + 12);
    html += `<text x="${lx}" y="${ly+4}" text-anchor="middle" font-size="13" font-family="Arial">${p.icon}</text>`;
  });
  svg.innerHTML = html;

  // Stats sidebar
  if (stats) {
    const sorted = [...PILLARS].map(p => ({ ...p, score: getPillarScore(p.id, allSkills) }))
                               .sort((a, b) => a.score - b.score);
    const weakest   = sorted[0];
    const strongest = sorted[sorted.length - 1];
    stats.innerHTML = `
      <div class="mini-stat">
        <span class="mini-stat-dot" style="background:#ef4444;"></span>
        <span>חלש: ${weakest.icon} ${weakest.label}<br>(${Math.round(weakest.score*100)}%)</span>
      </div>
      <div class="mini-stat">
        <span class="mini-stat-dot" style="background:#10b981;"></span>
        <span>חזק: ${strongest.icon} ${strongest.label}<br>(${Math.round(strongest.score*100)}%)</span>
      </div>
      <div class="mini-stat" style="margin-top:4px;font-weight:600;color:#6366f1;">
        <span class="mini-stat-dot" style="background:#6366f1;"></span>
        <span>${calcXP(allSkills)} XP נצברו</span>
      </div>`;
  }
}

// ─── Command Center: courses + action blocks ───
function renderCommandCenter(allSkills, courses) {
  // Courses
  const coursesEl = document.getElementById("pioneer-courses");
  if (coursesEl) {
    const courseIds = Object.keys(courses);
    if (!courseIds.length) {
      coursesEl.innerHTML = `<div style="font-size:12px;color:var(--color-text-muted);">אין קורסים</div>`;
    } else {
      coursesEl.innerHTML = courseIds.map(id => {
        const status = getDraftStatus(id);
        return `<div class="pioneer-course-item">
          <div class="pioneer-course-name">📚 ${courses[id].name}</div>
          <div class="pioneer-course-bar">
            <div class="pioneer-course-bar-fill" style="width:${status.pct}%"></div>
          </div>
        </div>`;
      }).join('');
    }
  }

  // Action blocks
  const needs = allSkills.filter(s => !s.status.wave1);
  const recommended = allSkills.filter(s => s.status.wave1 && !s.status.wave2);
  const pillarScores = {};
  PILLARS.forEach(p => pillarScores[p.id] = getPillarScore(p.id, allSkills));
  recommended.sort((a, b) =>
    (pillarScores[PILLAR_MAP[a.id] || "academic"] || 0) -
    (pillarScores[PILLAR_MAP[b.id] || "academic"] || 0)
  );

  const needsEl = document.getElementById("pioneer-needs");
  const recEl   = document.getElementById("pioneer-recommended");

  if (needsEl) {
    needsEl.innerHTML = needs.length === 0
      ? `<div style="font-size:11px;color:#059669;">✓ הכל הושלם!</div>`
      : needs.slice(0, 4).map(s => {
          const p = PILLARS.find(p => p.id === (PILLAR_MAP[s.id] || "academic")) || PILLARS[0];
          return `<a href="${resolveSkillUrl(s.id)}" class="action-skill-link">${p.icon} ${s.bot.name}</a>`;
        }).join('');
  }

  if (recEl) {
    recEl.innerHTML = recommended.length === 0
      ? `<div style="font-size:11px;color:#64748b;">${needs.length===0?'🎉 הושלם!':'השלם חובה תחילה'}</div>`
      : recommended.slice(0, 4).map(s => {
          const p = PILLARS.find(p => p.id === (PILLAR_MAP[s.id] || "academic")) || PILLARS[0];
          return `<a href="${resolveSkillUrl(s.id)}" class="action-skill-link"
                     onclick="showXPAnimation(event)">${p.icon} ${s.bot.name}</a>`;
        }).join('');
  }
}

// ─── XP float animation on "מה כדאי" click ───
function showXPAnimation(event) {
  event.preventDefault();
  const href = event.currentTarget.href;
  const heroArea = document.getElementById("hero-area");
  if (!heroArea) { window.location.href = href; return; }
  const float = document.createElement("div");
  float.className = "xp-float";
  float.textContent = "+50 XP ⚡";
  heroArea.appendChild(float);
  setTimeout(() => { float.remove(); window.location.href = href; }, 900);
}

// ─── Pillar detail modal ───
function openPillarModal(pillarId, allSkills) {
  const overlay = document.getElementById("pillar-modal-overlay");
  const title   = document.getElementById("pillar-modal-title");
  const body    = document.getElementById("pillar-modal-body");
  if (!overlay) return;
  const pillar = PILLARS.find(p => p.id === pillarId);
  const eq     = EQUIPMENT.find(e => e.pillar === pillarId);
  const skills = allSkills.filter(s => (PILLAR_MAP[s.id] || "academic") === pillarId);
  title.textContent = `${pillar?.icon || ""} ${pillar?.label || pillarId} — ${eq?.name || ""}`;
  body.innerHTML = !skills.length
    ? `<p style="color:var(--color-text-muted);font-size:14px;">אין מיומנויות לעמוד זה עדיין.</p>`
    : skills.map(s => {
        const sc   = s.status.wave2 ? "status-wave2" : s.status.wave1 ? "status-wave1" : "status-not-started";
        const st   = s.status.wave2 ? "הושלם ✓" : s.status.wave1 ? "גל 1 ✓" : "טרם התחיל";
        const icon = BOT_ICONS[s.id] || "⭐";
        return `<a href="${resolveSkillUrl(s.id)}" class="pillar-modal-skill-row">
          <span style="font-size:20px;">${icon}</span>
          <span style="flex:1;font-size:13px;font-weight:600;">${s.bot.name}</span>
          <span class="pillar-modal-skill-status ${sc}">${st}</span>
        </a>`;
      }).join('');
  body.innerHTML += `<div style="margin-top:14px;text-align:center;">
    <a href="/skills.html" class="btn btn-blue" style="font-size:13px;padding:8px 20px;">→ כל המיומנויות</a>
  </div>`;
  overlay.classList.add("open");
}

function closePillarModal() {
  document.getElementById("pillar-modal-overlay")?.classList.remove("open");
}

// ─── Firebase skill sync (reactive — uses MILED_FIREBASE_CONFIG REST endpoint) ───
// Reads skills_sessions/{studentId} from RTDB, merges wave timestamps into localStorage,
// then re-renders XP bar + equipment glow if new completions are found.
function syncFromFirebase() {
  const cfg = window.MILED_FIREBASE_CONFIG;
  if (!cfg?.databaseURL || !studentId) return;
  fetch(`${cfg.databaseURL}/skills_sessions/${encodeURIComponent(studentId)}.json`)
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data || typeof data !== "object") return;
      let changed = false;
      for (const botId in data) {
        const rec = data[botId];
        // wave_1_baseline → miled_skill_ts_{botId}
        const ts1 = rec?.waves?.wave_1_baseline?.lastActive;
        if (ts1 && !localStorage.getItem(`miled_skill_ts_${botId}`)) {
          localStorage.setItem(`miled_skill_ts_${botId}`, String(ts1));
          changed = true;
        }
        // wave_2_midterm → miled_skill_ts2_{botId}
        const ts2 = rec?.waves?.wave_2_midterm?.lastActive;
        if (ts2 && !localStorage.getItem(`miled_skill_ts2_${botId}`)) {
          localStorage.setItem(`miled_skill_ts2_${botId}`, String(ts2));
          changed = true;
        }
      }
      if (changed) refreshSkillsPanel();
    })
    .catch(() => {}); // silent fallback — localStorage remains authoritative
}

// ─── Master refresh ───
function refreshSkillsPanel() {
  if (!_config) return;
  const allSkills = buildAllSkills(_config);
  renderXPBar(allSkills);
  buildExplorerSVG();
  renderEquipmentSlots(allSkills);
  buildMiniRadar(allSkills);
  renderCommandCenter(allSkills, _config.my_courses || {});
}

// ─── Skill Progress Widget — kept for backward compat, not rendered in v8.7 ───
function renderSkillProgressWidget() {
  const PILLAR_META = [
    { id: "academic",   icon: "🎓", label: "למידה וחשיבה",    color: "#6366f1",
      skills: ["learning_skills_full", "academic_writing", "research_skills"] },
    { id: "resilience", icon: "🧘", label: "ניהול וחוסן",     color: "#f59e0b",
      skills: ["diag_1", "support"] },
    { id: "social",     icon: "🤝", label: "תקשורת וחברה",    color: "#a21caf",
      skills: ["presentation"] },
    { id: "tools",      icon: "💻", label: "כלים וטכנולוגיה", color: "#06b6d4",
      skills: [] },
    { id: "career",     icon: "💼", label: "מוכנות לקריירה",  color: "#10b981",
      skills: ["employability_skills_full"] },
  ];

  // Course impact: which pillars are mapped in the lecturer's syllabus
  const syllabusRows      = JSON.parse(localStorage.getItem("miled_syllabus") || "[]");
  const syllabusedPillars = new Set(syllabusRows.map(r => r.pillar));

  const wrap = document.getElementById("pillar-progress-bars");
  if (!wrap) return;

  wrap.innerHTML = PILLAR_META.map(p => {
    let pct = 0;
    if (p.skills.length > 0) {
      const total = p.skills.reduce((sum, id) => sum + getSkillStatus(id).pct, 0);
      pct = Math.round(total / p.skills.length);
    }
    const stateLabel = pct === 0 ? "טרם החל" : pct < 60 ? "בתהליך" : pct < 100 ? "מתקדם" : "הושלם ✓";

    // Course impact line — shown when the lecturer mapped topics to this pillar
    const hasImpact = syllabusedPillars.has(p.id);
    const impactHtml = hasImpact
      ? `<div style="font-size:11px;color:#059669;margin-top:5px;display:flex;align-items:center;gap:5px;">
           <span style="background:#dcfce7;color:#15803d;padding:1px 7px;border-radius:20px;font-weight:700;font-size:10px;">📌 השפעת קורס</span>
           <span>ביצועיך בקורס משפיעים ישירות על מיומנות זו</span>
         </div>`
      : "";

    return `
      <div style="margin-bottom:18px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <span style="font-size:13px;font-weight:600;color:#1e293b;">${p.icon} ${p.label}</span>
          <span style="font-size:12px;color:#64748b;">${pct}% — ${stateLabel}</span>
        </div>
        <div style="height:9px;background:#f1f5f9;border-radius:6px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${p.color};border-radius:6px;transition:width .7s ease;"></div>
        </div>
        ${impactHtml}
      </div>`;
  }).join('');
}
