<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<title>MilEd.One - הנהלה</title>

</head>

<body>

<div class="sidebar">

<h2>MilEd.One</h2>

<a href="/students.html">קורסים</a>
<a href="/skills.html">מיומנויות</a>
<a href="/faculty.html">הוראה</a>
<a href="/admin.html" class="active">ניהול</a>

</div>

<div class="main">

<div class="topbar">
MilEd.One - הנהלה
</div>

<div class="container">

<span style="font-weight:300;color:#000;">MilEd.One</span>

<h1 id="title">טוען...</h1>

<p id="subtitle" class="subtitle">טוען...</p>

<div id="list" class="grid"></div>

<div id="no-access" style="display:none">
אין לך הרשאה לצפות בכלי הנהלה
</div>

<a href="/" onclick="sessionStorage.clear()" class="btn btn-blue">← חזרה למסך הבית</a>
</div>

</div>

<script>

// ─────────────────────────────
// הסכמת פרטיות — חד-פעמית
// ─────────────────────────────

function checkPrivacyConsent() {
  if (localStorage.getItem("miled_privacy_consent") === "true") return true;

  const modal = document.createElement("div");
  modal.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.5);z-index:9999;
    display:flex;align-items:center;justify-content:center;
  `;

  modal.innerHTML = `
    <div style="background:white;border-radius:16px;padding:32px;max-width:480px;width:90%;text-align:right;direction:rtl;">
      <h2 style="margin-top:0;font-size:20px;">הסכמה לשימוש במערכת</h2>
      <p style="color:#555;line-height:1.7;font-size:14px;">
        מערכת MilEd.One שומרת את תוכן השיחות עם הבוטים למטרות פיתוח ושיפור המערכת.
        המידע מאוחסן בצורה מאובטחת ואינו מועבר לגורמים חיצוניים.
        שיחות נשמרות תחת מזהה אנונימי בלבד.
      </p>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px;">
        <button id="privacy-decline" style="padding:10px 20px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;font-size:14px;">
          לא מסכים/ה
        </button>
        <button id="privacy-accept" style="padding:10px 20px;background:#6C63FF;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;">
          מסכים/ה ומאשר/ת
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById("privacy-accept").onclick = () => {
    localStorage.setItem("miled_privacy_consent", "true");
    modal.remove();
    initAdmin();
  };

  document.getElementById("privacy-decline").onclick = () => {
    window.location.href = "/";
  };

  return false;
}

// ─────────────────────────────
// institution identity
// ─────────────────────────────

const ADMIN_PASSWORD = "miled2026";

let institutionRole = sessionStorage.getItem("institutionRole");

if (!institutionRole || institutionRole !== "admin") {
  const input = prompt("הזן סיסמת הנהלה:");
  if (input && input.trim() === ADMIN_PASSWORD) {
    institutionRole = "admin";
    sessionStorage.setItem("institutionRole", "admin");
  } else {
    institutionRole = "guest";
    document.getElementById("no-access").style.display = "block";
    document.getElementById("title").innerText = "גישה נדחתה";
    document.getElementById("subtitle").innerText = "";
    throw new Error("access denied");
  }
}

// ─────────────────────────────
// access control
// ─────────────────────────────

function hasInstitutionAccess(tool) {
  const scope = tool.scope || "global";
  if (scope === "global")      return true;
  if (scope === "institution") return institutionRole === "admin";
  return false;
}

// ─────────────────────────────
// טעינת config
// ─────────────────────────────

function loadConfig() {
  fetch('/config.json')
    .then(r => r.json())
    .then(data => {
      const admin = data.branches.admin;
      document.getElementById('title').innerText    = admin.title;
      document.getElementById('subtitle').innerText = admin.subtitle;

      const list = document.getElementById('list');
      let visibleCount = 0;

      for (let id in admin.items) {
        const tool = admin.items[id];
        if (!hasInstitutionAccess(tool)) continue;
        visibleCount++;
        const a = document.createElement('a');
        a.className = 'btn';
        a.href = `/chat.html?classId=${id}`;
        a.innerText = tool.name;
        list.appendChild(a);
      }

      if (visibleCount === 0) {
        document.getElementById("no-access").style.display = "block";
      }
    })
    .catch(err => {
      console.error("config load error:", err);
      document.getElementById('title').innerText    = "שגיאה";
      document.getElementById('subtitle').innerText = "לא ניתן לטעון";
    });
}

// ─────────────────────────────
// כניסה ראשית
// ─────────────────────────────

function initAdmin() {
  loadConfig();
}

if (checkPrivacyConsent()) initAdmin();

</script>

</body>
</html>
