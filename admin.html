<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
  
<title>MilEd.One - הנהלה</title>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>MilEd.One</h2>

<a href="/students.html">קורסים</a>
<a href="/skills.html">מיומנויות</a>
<a href="/faculty.html">הוראה</a>
<a href="/admin.html" class="active">ניהול</a>

</div>


<!-- Main -->

<div class="main">

<div class="topbar">
MilEd.One - הנהלה
</div>


<div class="container">

<span style="font-weight:300;color:#000;">MilEd.One</span>

<h1 id="title">טוען...</h1>

<p id="subtitle" class="subtitle">טוען...</p>

<div id="list" class="grid"></div>

<div id="no-access" class="hidden" style="display:none">
אין לך הרשאה לצפות בכלי הנהלה
</div>

<a href="/" onclick="sessionStorage.clear()" class="btn btn-blue">← חזרה למסך הבית</a>
</div>

</div>

<script>


// ─────────────────────────────
// institution identity (temporary mock)
// ─────────────────────────────

const ADMIN_PASSWORD = "miled2026";

let institutionRole = sessionStorage.getItem("institutionRole");

if (!institutionRole) {
  const input = prompt("הזן סיסמת הנהלה:");
  if (input && input.trim() === ADMIN_PASSWORD) {
    institutionRole = "admin";
    sessionStorage.setItem("institutionRole", "admin");
  } else {
    institutionRole = "guest";
    document.getElementById("no-access").style.display = "block";
    document.getElementById("title").innerText = "גישה נדחתה";
    document.getElementById("subtitle").innerText = "";
    // עצור כאן — אל תטען config
    throw new Error("access denied");
  }
}
// ─────────────────────────────
// access control
// ─────────────────────────────

function hasInstitutionAccess(tool){

const scope=tool.scope||"global";


if(scope==="global")
return true;


if(scope==="institution")
return institutionRole==="admin";


return false;

}


// ─────────────────────────────
// load config
// ─────────────────────────────

fetch('/config.json')

.then(r=>r.json())

.then(data=>{

const admin=data.branches.admin;

document.getElementById('title').innerText=admin.title;

document.getElementById('subtitle').innerText=admin.subtitle;


const list=document.getElementById('list');

let visibleCount=0;


for(let id in admin.items){

const tool=admin.items[id];


if(!hasInstitutionAccess(tool))
continue;


visibleCount++;


const a=document.createElement('a');

a.className='btn';

a.href=`/chat.html?classId=${id}`;

a.innerText=tool.name;

list.appendChild(a);

}


// no access fallback

if(visibleCount===0){

document.getElementById("no-access").style.display="block";

}


})

.catch(err=>{

console.error("config load error:",err);

document.getElementById('title').innerText="שגיאה";

document.getElementById('subtitle').innerText="לא ניתן לטעון";

});


</script>

</body>

</html>
