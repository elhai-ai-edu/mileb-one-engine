<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MilEd.One - Access Denied</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Assistant", sans-serif;
    background: linear-gradient(145deg, #f8fafc 0%, #eef2ff 48%, #fef2f2 100%);
    display: grid;
    place-items: center;
    color: #0f172a;
    padding: 16px;
  }
  .card {
    width: min(560px, 96vw);
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    padding: 24px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 1.55rem;
  }
  p {
    margin: 0;
    color: #475569;
    line-height: 1.7;
  }
  .actions {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    background: #fff;
    color: #1e293b;
    padding: 8px 14px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
  }
  .btn.primary {
    border-color: #1d4ed8;
    background: #1d4ed8;
    color: #fff;
  }
</style>
</head>
<body>
  <main class="card">
    <h1>גישה נדחתה</h1>
    <p>
      החשבון אינו מורשה לגישה למערכת זו. יש לפנות למרצה או למנהל המערכת כדי להוסיף את המייל לרשימת ההרשאות.
    </p>
    <div class="actions">
      <button class="btn primary" type="button" onclick="location.replace('/index.html')">חזרה למסך הכניסה</button>
      <button class="btn" type="button" id="signOutBtn">התנתקות מגוגל</button>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="/firebase-init.js"></script>
  <script src="/auth-guard.js"></script>
  <script>
    (function setupSignOut() {
      const button = document.getElementById("signOutBtn");
      if (!button) return;
      button.addEventListener("click", async () => {
        window.MiledAccess?.signOutAndRedirect?.("/index.html");
      });
    }());
  </script>
</body>
</html>
