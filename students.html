<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>MilEd.One - סטודנטים</title>
</head>

<body>

<div class="sidebar">
  <h2>MilEd.One</h2>
  <a href="/students.html" class="active">קורסים</a>
  <a href="/skills.html">מיומנויות</a>
  <a href="/faculty.html">הוראה</a>
  <a href="/admin.html">ניהול</a>
</div>

<div class="main">

  <div class="topbar">
    MilEd.One - הקורסים שלי
  </div>

  <div class="container">

    <span style="font-weight:300;color:#000;">MilEd.One</span>
    <h1 id="title">טוען...</h1>
    <p id="subtitle"></p>
    <div id="list" class="grid"></div>
    <div id="error"></div>
    <br>
 <a href="/" onclick="sessionStorage.clear()" class="btn btn-blue">← חזרה למסך הבית</a>
  </div>
</div>

<script>

let CONFIG = null;

let studentId = localStorage.getItem("studentId");
if (!studentId) {
  studentId = "s_" + Math.random().toString(36).slice(2, 8);
  localStorage.setItem("studentId", studentId);
}

async function loadConfig() {
  try {
    const res = await fetch('/config.json?ts=' + Date.now());
    if (!res.ok) throw new Error("config load failed");
    CONFIG = await res.json();
    initPage();
  } catch (err) {
    console.error(err);
    document.getElementById("error").innerText = "שגיאה בטעינת המערכת";
  }
}

function initPage() {
  // ✅ תיקון: courses (לא students)
  const courses = CONFIG.branches.courses;

  document.getElementById("title").innerText = courses.title;
  document.getElementById("subtitle").innerText = courses.subtitle;

  const container = document.getElementById("list");

  for (let id in courses.items) {
    const bot = courses.items[id];
    const a = document.createElement("a");
    a.className = "btn";
    a.innerText = bot.name;
    // ✅ תיקון: chat.html (לא workspace.html)
    a.href = `/chat.html?classId=${id}`;
    container.appendChild(a);
  }
}

loadConfig();

</script>

</body>
</html>
