<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<title>MilEd.One - סטודנטים</title>

</head>

<body>

<div class="panel">

<span style="font-weight:300;color:#000;">
MilEd.One
</span>

<h1 id="title">טוען...</h1>

<p id="subtitle"></p>

<div id="list" class="grid"></div>

<div id="error"></div>

<br>

<a href="/" class="btn btn-blue">← חזרה לדף הבית</a>

</div>

<script>

let CONFIG=null;

/* student id */

let studentId = localStorage.getItem("studentId");

if(!studentId){

studentId="s_"+Math.random().toString(36).slice(2,8);

localStorage.setItem("studentId",studentId);

}

/* load config */

async function loadConfig(){

try{

const res=await fetch('/config.json?ts='+Date.now());

if(!res.ok)
throw new Error("config load failed");

CONFIG=await res.json();

initPage();

}

catch(err){

console.error(err);

document.getElementById("error").innerText=
"שגיאה בטעינת המערכת";

}

}

/* init page */

function initPage(){

const students=CONFIG.branches.students;

document.getElementById("title").innerText=students.title;

document.getElementById("subtitle").innerText=students.subtitle;

const container=document.getElementById("list");

for(let id in students.items){

const bot=students.items[id];

const a=document.createElement("a");

a.className="btn";

a.innerText=bot.name;

a.href=`/workspace.html?classId=${id}&studentId=${studentId}`;

container.appendChild(a);

}

}

/* start */

loadConfig();

</script>

</body>
</html>
