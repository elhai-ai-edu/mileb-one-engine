<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>MilEd.One - סטודנטים</title>
</head>

<body>

<div class="sidebar">
  <h2>MilEd.One</h2>
  <a href="/students.html" class="active">קורסים</a>
  <a href="/skills.html">מיומנויות</a>
</div>

<div class="main">

  <div class="topbar">
    <span>MilEd.One - הקורסים שלי</span>
  </div>

  <div class="container">
    <span style="font-weight:300;color:#000;">MilEd.One</span>
    <h1>הקורסים שלי</h1>
    <p>בחר קורס להיכנס למרחב הלמידה</p>
    <div id="course-list" class="grid"></div>
    <br>
    <a href="/" onclick="sessionStorage.clear()" class="btn btn-blue">← חזרה למסך הבית</a>
  </div>
</div>

<script>

let CONFIG = null;

async function loadConfig() {
  const res = await fetch('/config.json?ts=' + Date.now());
  CONFIG = await res.json();
  renderCourses();
}

function renderCourses() {
  const courses = CONFIG.my_courses || {};
  const container = document.getElementById("course-list");
  container.innerHTML = "";

  for (let id in courses) {
    const course = courses[id];
    const a = document.createElement("a");
    a.className = "btn";
    a.href = `/workspace.html?courseId=${id}`;
    a.innerHTML = `<h3 style="margin:0 0 4px 0;">${course.name}</h3>
                   <p style="margin:0;opacity:.7;font-size:13px;">לחץ להיכנס למרחב הקורס</p>`;
    container.appendChild(a);
  }
}

loadConfig();

</script>

</body>
</html>
