<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>MilEd.One — קורסים</title>
<style>
/* ── Course Cards ── */
.course-card {
  background: #fff;
  border: 1.5px solid #e2e8f0;
  border-radius: 16px;
  padding: 20px;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.course-card:hover { box-shadow: 0 6px 20px rgba(30,27,75,0.09); border-color: #c7d2fe; }
.course-card-name {
  font-size: 16px; font-weight: 700; color: #1e1b4b; margin-bottom: 4px;
}
.course-card-meta {
  font-size: 12px; color: #94a3b8; margin-bottom: 16px;
}
.course-card-actions { display: flex; flex-direction: column; gap: 8px; }
.cc-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; text-decoration: none;
  transition: opacity 0.15s, box-shadow 0.15s;
}
.cc-btn:hover { opacity: 0.88; box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
.cc-btn-live    { background: #6366f1; color: #fff; }
.cc-btn-team    { background: #f0fdf4; color: #15803d; border: 1.5px solid #86efac; }
.cc-btn-personal{ background: #eff6ff; color: #1d4ed8; border: 1.5px solid #bfdbfe; }
.cc-divider {
  font-size: 11px; font-weight: 700; color: #94a3b8;
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 4px 0 2px;
}
</style>
</head>

<body class="user-student">

<div class="sidebar">
  <h2>MilEd.One</h2>
  <a href="/students.html" class="active">קורסים</a>
  <a href="/skills.html">מיומנויות</a>
  <a href="/student_dashboard.html" id="status-link">הסטטוס שלי</a>
</div>

<div class="main">

  <div class="topbar">
    <span>MilEd.One - הקורסים שלי</span>
    <span id="student-preview-pill" style="display:none;font-size:11px;padding:4px 10px;border-radius:999px;background:#fff7ed;color:#9a3412;border:1px solid #fdba74;margin-right:auto;">תצוגת סטודנט למרצה</span>
    <button id="student-preview-exit" onclick="exitStudentPreview()" class="logout-btn" style="display:none;">חזרה לתצוגה הרגילה</button>
  </div>

  <div class="container">
    <span style="font-weight:300;color:#000;">MilEd.One</span>
    <h1>הקורסים שלי</h1>
    <p>בחר קורס להיכנס למרחב הלמידה</p>
    <div id="course-list" class="grid"></div>
    <br>
    <a href="#" onclick="navigateHome()" class="btn btn-blue">← חזרה למסך הבית</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="/firebase-init.js"></script>
<script src="/auth-guard.js?v=20260409a"></script>
<script>
const studentsAccessReady = window.MiledAccess?.enforcePageAccess(["student"], "/index.html");

let sessionUser = null;
let canonicalRole = "";
let previewExitTarget = "/index.html";

async function bootstrapStudentsAccess() {
  const access = await studentsAccessReady;
  if (!access?.ok) return;

  sessionUser = window.MiledAccess?.getSessionUser?.()
    || window.MiledAccess?.buildSessionUser?.(access.authUser, access.canonicalRole, access.institutionId)
    || null;
  canonicalRole = access.canonicalRole || sessionUser?.canonicalRole || window.MiledAccess?.normalizeRole?.(sessionUser?.role) || "";
  previewExitTarget = window.MiledAccess?.getRoleHome?.(canonicalRole) || "/index.html";

  if (window.MiledAccess?.isStudentPreviewEnabled?.(canonicalRole)) {
    const previewPill = document.getElementById("student-preview-pill");
    if (previewPill) previewPill.style.display = "inline-flex";
    const previewExit = document.getElementById("student-preview-exit");
    if (previewExit) previewExit.style.display = "inline-flex";
  }
}

bootstrapStudentsAccess();

function exitStudentPreview() {
  window.MiledAccess?.clearPreviewRole?.();
  location.replace(previewExitTarget);
}

window.navigateHome = function() {
  window.location.href = "/student_dashboard.html";
};

let CONFIG = null;

// ─────────────────────────────
// הסכמת פרטיות — חד-פעמית
// ─────────────────────────────

function checkPrivacyConsent() {
  if (localStorage.getItem("miled_privacy_consent") === "true") return true;

  const modal = document.createElement("div");
  modal.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.5);z-index:9999;
    display:flex;align-items:center;justify-content:center;
  `;

  modal.innerHTML = `
    <div style="background:white;border-radius:16px;padding:32px;max-width:480px;width:90%;text-align:right;direction:rtl;">
      <h2 style="margin-top:0;font-size:20px;">הסכמה לשימוש במערכת</h2>
      <p style="color:#555;line-height:1.7;font-size:14px;">
        מערכת MilEd.One שומרת את תוכן השיחות עם הבוטים למטרות פיתוח ושיפור המערכת.
        המידע מאוחסן בצורה מאובטחת ואינו מועבר לגורמים חיצוניים.
        שיחות נשמרות תחת מזהה אנונימי בלבד.
      </p>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px;">
        <button id="privacy-decline" style="padding:10px 20px;border:1px solid #ddd;border-radius:8px;background:white;cursor:pointer;font-size:14px;">
          לא מסכים/ה
        </button>
        <button id="privacy-accept" style="padding:10px 20px;background:#6C63FF;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;">
          מסכים/ה ומאשר/ת
        </button>
      </div>
    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById("privacy-accept").onclick = () => {
    localStorage.setItem("miled_privacy_consent", "true");
    modal.remove();
    loadConfig();
  };

  document.getElementById("privacy-decline").onclick = () => {
    window.location.href = "/index.html";
  };

  return false;
}

// ─────────────────────────────
// טעינת config
// ─────────────────────────────

async function loadConfig() {
  const res = await fetch('/config.json?ts=' + Date.now());
  CONFIG = await res.json();
  renderCourses();
}

// ── studentId per course (same pattern as waiting_lobby) ─────────────────────
function getStudentId(courseId) {
  const key = `miled_student_id_${courseId || "global"}`;
  let id = localStorage.getItem(key);
  if (!id) {
    id = `stu_${Math.random().toString(36).slice(2, 10)}`;
    localStorage.setItem(key, id);
  }
  return id;
}
function getStudentName(courseId) {
  const key = `miled_student_name_${courseId || "global"}`;
  return localStorage.getItem(key) || getStudentId(courseId).slice(0, 8);
}

function renderCourses() {
  const courses = CONFIG.my_courses || {};
  const container = document.getElementById("course-list");
  container.innerHTML = "";

  for (const [id, course] of Object.entries(courses)) {
    const studentId   = getStudentId(id);
    const studentName = getStudentName(id);
    const esc = s => encodeURIComponent(s);

    const lobbyUrl   = `/waiting_lobby.html?courseId=${esc(id)}`;
    const teamProj   = course.teamProject;
    const personalProj = course.personalProject;

    const teamBtn = teamProj ? `
      <a class="cc-btn cc-btn-team"
         href="/team_project.html?projectId=${esc(teamProj.projectId)}&studentId=${esc(studentId)}&studentName=${esc(studentName)}&courseId=${esc(id)}">
        👥 ${teamProj.title || "פרויקט צוות מתמשך"}
      </a>` : "";

    const personalBtn = personalProj ? `
      <a class="cc-btn cc-btn-personal"
         href="${personalProj.url || `/chat.html?botType=task_final_project&courseId=${esc(id)}&studentId=${esc(studentId)}`}">
        📝 ${personalProj.title || "פרויקט גמר אישי"}
      </a>` : "";

    const projectsSection = (teamBtn || personalBtn) ? `
      <div class="cc-divider">פרויקטים</div>
      ${teamBtn}${personalBtn}` : "";

    const card = document.createElement("div");
    card.className = "course-card";
    card.innerHTML = `
      <div class="course-card-name">${course.name || id}</div>
      <div class="course-card-meta">${course.semester || ""}</div>
      <div class="course-card-actions">
        <a class="cc-btn cc-btn-live" href="${lobbyUrl}">📡 שיעור חי</a>
        ${projectsSection}
      </div>`;
    container.appendChild(card);
  }
}

if (checkPrivacyConsent()) loadConfig();

</script>

</body>
</html>
