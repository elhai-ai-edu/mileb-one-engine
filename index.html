<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MilEd.One - Smart Entry</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f172a;
    --muted: #475569;
    --line: #dbeafe;
    --brand: #1d4ed8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Assistant", sans-serif;
    background: radial-gradient(circle at 8% 10%, rgba(29,78,216,0.14), transparent 35%),
                radial-gradient(circle at 84% 14%, rgba(20,184,166,0.12), transparent 28%),
                linear-gradient(160deg, #f8fbff 0%, #eef4ff 50%, #f7fafc 100%);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: min(540px, 94vw);
    border: 1px solid var(--line);
    border-radius: 18px;
    background: #fff;
    box-shadow: 0 18px 44px rgba(15, 23, 42, 0.12);
    padding: 26px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 1.65rem;
  }
  p {
    margin: 0;
    color: var(--muted);
    line-height: 1.65;
  }
  .row {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    border: 1px solid #bfdbfe;
    background: #eff6ff;
    color: #1e3a8a;
    border-radius: 10px;
    padding: 9px 14px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
  }
  .btn.primary {
    border-color: #1d4ed8;
    background: #1d4ed8;
    color: #fff;
  }
  .status {
    margin-top: 12px;
    min-height: 18px;
    font-size: 0.9rem;
    color: #1e40af;
  }
  .status.error { color: #b91c1c; }
</style>
</head>
<body>
  <div class="card">
    <h1>MilEd.One</h1>
    <p id="subtitle">בודק מסלול כניסה...</p>
    <div class="row" id="actions" style="display:none;">
      <button class="btn primary" id="googleBtn" type="button">כניסה עם Google</button>
    </div>
    <div class="status" id="statusLine"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="/firebase-init.js"></script>
  <script src="/firebase-auth.js"></script>
  <script>
    function normalizeRole(rawRole) {
      const role = String(rawRole || "").trim().toLowerCase();
      if (role === "student") return "student";
      if (["faculty", "lecturer"].includes(role)) return "lecturer";
      if (["institution", "institution_admin"].includes(role)) return "institution_admin";
      if (["superadmin", "system_admin"].includes(role)) return "system_admin";
      return "student";
    }

    function routeByRole(rawRole) {
      const role = normalizeRole(rawRole);
      if (role === "lecturer") {
        location.replace("/lecturer_hub.html");
        return;
      }
      if (role === "institution_admin") {
        location.replace("/institution_dashboard.html");
        return;
      }
      if (role === "system_admin") {
        location.replace("/admin_cockpit.html");
        return;
      }
      location.replace("/student_dashboard.html");
    }

    function fastTrackMoodleEntry(params) {
      const hasCourseId = params.has("courseId");
      const hasUnitId = params.has("unitId");
      if (!hasCourseId || !hasUnitId) return false;
      const query = params.toString();
      location.replace(`/waiting_lobby.html?${query}`);
      return true;
    }

    async function mainGateFlow() {
      const subtitle = document.getElementById("subtitle");
      const statusLine = document.getElementById("statusLine");
      const actions = document.getElementById("actions");
      const googleBtn = document.getElementById("googleBtn");

      subtitle.textContent = "שער ראשי: התחברו לפי תפקיד כדי להמשיך.";

      const existing = window.MiledAuth?.getUser?.();
      if (existing?.role) {
        statusLine.textContent = "זוהתה התחברות קיימת, מעביר למסך הבית...";
        routeByRole(existing.role);
        return;
      }

      actions.style.display = "flex";
      googleBtn.addEventListener("click", async () => {
        googleBtn.disabled = true;
        statusLine.classList.remove("error");
        statusLine.textContent = "מתחבר...";
        try {
          const user = await window.MiledAuth.signInWithGoogle();
          routeByRole(user?.role || "student");
        } catch (error) {
          statusLine.classList.add("error");
          statusLine.textContent = error?.message || "שגיאה בהתחברות";
          googleBtn.disabled = false;
        }
      });
    }

    (function initRouter() {
      const params = new URLSearchParams(location.search);
      if (fastTrackMoodleEntry(params)) return;
      mainGateFlow();
    }());
  </script>
</body>
</html>
