<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MilEd.One</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel" style="max-width:500px;text-align:center;">

  <span style="font-size:1.5rem;letter-spacing:2px;">MilEd.One</span>
  <h1 id="h-title">טוען...</h1>
  <p id="h-subtitle"></p>

  <div class="grid" style="grid-template-columns:1fr;gap:16px;margin-top:30px;">

    <a href="/students.html" class="btn" style="text-align:right;">
      <h3 style="margin:0 0 4px 0;">🎓 סטודנט</h3>
      <p style="margin:0;opacity:.7;font-size:14px;">קורסים ומיומנויות</p>
    </a>

    <div class="btn" onclick="enterAsFaculty()" style="cursor:pointer;text-align:right;">
      <h3 style="margin:0 0 4px 0;">🧑‍🏫 מרצה</h3>
      <p style="margin:0;opacity:.7;font-size:14px;">הוראה, קורסים וכלי מחקר</p>
    </div>

    <div class="btn" onclick="enterAsAdmin()" style="cursor:pointer;text-align:right;">
      <h3 style="margin:0 0 4px 0;">📊 הנהלה</h3>
      <p style="margin:0;opacity:.7;font-size:14px;">ניתוח נתונים ומבט מוסדי</p>
    </div>

  </div>

  <div id="error" style="color:red;margin-top:16px;font-size:14px;"></div>

</div>

<script>

let CONFIG = null;

async function loadConfig() {
  const res = await fetch('/config.json?ts=' + Date.now());
  CONFIG = await res.json();
  document.getElementById('h-title').innerText = CONFIG.home?.main_title || 'ברוכים הבאים';
  document.getElementById('h-subtitle').innerText = CONFIG.home?.main_subtitle || '';
}

function enterAsFaculty() {
  if (!CONFIG) { alert("המערכת עדיין נטענת"); return; }

  const users = CONFIG.faculty_users || {};
  const username = prompt("שם משתמש:");
  if (!username) return;
  const password = prompt("סיסמה:");
  if (!password) return;

  const user = users[username.trim()];

  if (user && user.password === password.trim()) {
    sessionStorage.setItem("facultyId",    user.id);
    sessionStorage.setItem("facultyName",  user.name);
    sessionStorage.setItem("faculty_auth", "true");
    sessionStorage.setItem("facultyRole",  user.role || "faculty");

    // superadmin — גישה לכל כולל הנהלה
    if (user.role === "superadmin") {
      sessionStorage.setItem("institutionRole", "admin");
    }

    window.location.href = "/faculty.html";
  } else {
    document.getElementById("error").innerText = "שם משתמש או סיסמה שגויים";
  }
}

function enterAsAdmin() {
  if (!CONFIG) { alert("המערכת עדיין נטענת"); return; }

  const adminPassword = CONFIG.admin_password || "miled2026";
  const input = prompt("סיסמת הנהלה:");
  if (!input) return;

  if (input.trim() === adminPassword) {
    sessionStorage.setItem("institutionRole", "admin");
    window.location.href = "/admin.html";
  } else {
    document.getElementById("error").innerText = "סיסמה שגויה";
  }
}

loadConfig();

</script>
</body>
</html>
