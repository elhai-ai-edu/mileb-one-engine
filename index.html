<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MilEd.One</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="panel">

<span style="font-size:1.5rem;">MilEd.One</span>

<h1 id="h-title">טוען...</h1>

<p id="h-subtitle"></p>

<br>

<div class="grid">

<a href="/students.html" class="btn btn-blue">
<h3 id="t-courses"></h3>
<p id="d-courses"></p>
</a>

<a href="/skills.html" class="btn btn-blue">
<h3 id="t-skills"></h3>
<p id="d-skills"></p>
</a>

<a href="/faculty.html" class="btn btn-blue">
<h3 id="t-faculty"></h3>
<p id="d-faculty"></p>
</a>

<a href="/admin.html" class="btn btn-blue">
<h3 id="t-admin"></h3>
<p id="d-admin"></p>
</a>

</div>

</div>

<script>

let CONFIG = null;


/* =======================================================
   טעינת config.json עם תמיכה ב-TTL ו-cache refresh
======================================================= */

async function loadConfig()
{
    try
    {
        const response = await fetch('/config.json?ts=' + Date.now());

        if (!response.ok)
            throw new Error("Config load failed");

        CONFIG = await response.json();

        initHome(CONFIG);
    }

    catch(err)
    {
        console.error("Config load error:", err);

        document.getElementById('h-title').innerText =
            "שגיאה בטעינת המערכת";

        document.getElementById('h-subtitle').innerText =
            "נא לרענן את הדף";
    }
}



/* =======================================================
   אתחול תוכן דף הבית
======================================================= */

function initHome(config)
{
    document.getElementById('h-title').innerText =
        config.home.main_title;

    document.getElementById('h-subtitle').innerText =
        config.home.main_subtitle;

    const cards = config.home.cards;

    for (let key in cards)
    {
        document.getElementById('t-' + key).innerText =
            cards[key].title;

        document.getElementById('d-' + key).innerText =
            cards[key].desc;
    }
}


/* =======================================================
   התחלה
======================================================= */

loadConfig();

</script>

</body>
</html>
