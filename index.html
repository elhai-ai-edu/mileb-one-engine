<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MilEd.One</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">

  <span style="font-size:1.5rem;">MilEd.One</span>
  <h1>ברוכים הבאים</h1>
  <p>בחר את סוג המשתמש שלך:</p>

  <div class="grid">

    <a href="/students.html" class="btn btn-blue" onclick="setRole('student')">
      <h3>🎓 סטודנט</h3>
      <p>קורסים ומיומנויות</p>
    </a>

    <div class="btn" onclick="loginFaculty()" style="cursor:pointer;">
      <h3>🧑‍🏫 מרצה</h3>
      <p>הוראה, קורסים וכלי מחקר</p>
    </div>

    <div class="btn" onclick="loginAdmin()" style="cursor:pointer;">
      <h3>📊 הנהלה</h3>
      <p>ניתוח נתונים ומבט מוסדי</p>
    </div>

  </div>

</div>

<script>

// ─────────────────────────────
// טבלת מרצים (זמני — יועבר ל-config בהמשך)
// ─────────────────────────────

const FACULTY_USERS = {
  "elhai":    { password: "teach1", id: "f_elhai",   name: "נחום" },
  "faculty2": { password: "teach2", id: "f_faculty2", name: "מרצה 2" }
};

const ADMIN_PASSWORD = "miled2026";

// ─────────────────────────────
// סטודנט
// ─────────────────────────────

function setRole(role) {
  sessionStorage.setItem("miled_role", role);
}

// ─────────────────────────────
// מרצה
// ─────────────────────────────

function loginFaculty() {
  const username = prompt("שם משתמש:");
  if (!username) return;

  const password = prompt("סיסמה:");
  if (!password) return;

  const user = FACULTY_USERS[username.trim()];

  if (user && user.password === password.trim()) {
    sessionStorage.setItem("miled_role",     "faculty");
    sessionStorage.setItem("faculty_auth",   "true");
    sessionStorage.setItem("facultyId",      user.id);
    sessionStorage.setItem("facultyName",    user.name);
    window.location.href = "/faculty.html";
  } else {
    alert("שם משתמש או סיסמה שגויים");
  }
}

// ─────────────────────────────
// הנהלה
// ─────────────────────────────

function loginAdmin() {
  const input = prompt("סיסמת הנהלה:");
  if (!input) return;

  if (input.trim() === ADMIN_PASSWORD) {
    sessionStorage.setItem("miled_role",       "admin");
    sessionStorage.setItem("institutionRole",  "admin");
    window.location.href = "/admin.html";
  } else {
    alert("סיסמה שגויה");
  }
}

// ─────────────────────────────
// אם כבר מחובר — הפנה ישירות
// ─────────────────────────────

const role = sessionStorage.getItem("miled_role");
if (role === "faculty") window.location.href = "/faculty.html";
if (role === "admin")   window.location.href = "/admin.html";

</script>

</body>
</html>
