```html
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<title>MilEd.One - למידה חכמה</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<header>

<div class="nav-links">
<a href="/students.html" class="nav-btn btn-courses">📚 הקורסים שלי</a>
<a href="/skills.html" class="nav-btn btn-skills">🔍 אבחון ומיומנויות</a>
</div>

<div id="course-title" class="current-course">טוען...</div>

<div>MilEd.One</div>

</header>

<div id="chat-window">
<div id="welcome-msg" class="message ai">
שלום! איך אוכל לעזור?
</div>
</div>

<div class="input-area">
<input id="user-input" placeholder="כתוב שאלה..." onkeypress="handleKey(event)">
<button id="voice-btn">🎤</button>
<button id="send-btn" onclick="sendMessage()">שלח</button>
<button onclick="exportPrompt()">ייצא prompt</button>
</div>

<script>

window.__LAST_EXPORT_PROMPT = null;

let studentId = sessionStorage.getItem('studentId');
if (!studentId){
  studentId = 's_' + Math.random().toString(36).slice(2,10);
  sessionStorage.setItem('studentId', studentId);
}

let sessionId = sessionStorage.getItem('sessionId');
if (!sessionId){
  sessionId = 'sess_' + Math.random().toString(36).slice(2,10);
  sessionStorage.setItem('sessionId', sessionId);
}

let facultyId = sessionStorage.getItem('facultyId') || null;

const params = new URLSearchParams(window.location.search);
const classId = params.get('classId');

const chatWindow = document.getElementById('chat-window');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const historyKey = `history_${classId}`;
let chatHistory = JSON.parse(sessionStorage.getItem(historyKey) || '[]');

function renderMessage(role, content){
  const div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user' : 'ai');
  div.innerHTML = role === 'user' ? content : marked.parse(content);
  return div;
}

if(chatHistory.length>0){
  document.getElementById('welcome-msg')?.remove();
  chatHistory.forEach(m => chatWindow.appendChild(renderMessage(m.role, m.content)));
}

let currentBotType = null;

fetch('/config.json')
.then(r=>r.json())
.then(config=>{
  // classroom mode: botType comes directly from URL
  const urlBotType = params.get('botType');
  if(urlBotType){
    currentBotType = urlBotType;
    document.getElementById('course-title').textContent = urlBotType;
    return;
  }
  // normal mode: find by classId
  for(let branch in config.branches){
    const item = config.branches[branch].items?.[classId];
    if(item){
      currentBotType = item.botType;
      document.getElementById('course-title').textContent = item.name;
      break;
    }
  }
});
async function sendMessage(){
  if(!currentBotType){ alert("המערכת עדיין נטענת"); return; }
  const text = input.value.trim();
  if(!text) return;

  chatWindow.appendChild(renderMessage('user',text));
  input.value="";
  sendBtn.disabled=true;

  const loading = document.createElement('div');
  loading.className='message ai loading-text';
  loading.innerText='חושב...';
  chatWindow.appendChild(loading);

  try{
    const response = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        message:text,
        botType:currentBotType,
        classId:classId,
        studentId:studentId,
        facultyId:facultyId,
        sessionId:sessionId,
        history:chatHistory
      })
    });

    if(response.status===403){
      loading.remove();
      chatWindow.appendChild(renderMessage('assistant',"אין לך הרשאה להשתמש בכלי זה"));
      return;
    }

    const data = await response.json();

    if(data.exportPrompt)
      window.__LAST_EXPORT_PROMPT = data.exportPrompt;

    loading.remove();
    const reply = data.reply || "שגיאה";
    chatWindow.appendChild(renderMessage('assistant',reply));

    chatHistory.push({role:'user',content:text});
    chatHistory.push({role:'assistant',content:reply});
    sessionStorage.setItem(historyKey, JSON.stringify(chatHistory));

  }catch(e){
    loading.remove();
    chatWindow.appendChild(renderMessage('assistant',"שגיאת חיבור לשרת"));
  }

  sendBtn.disabled=false;
}

function handleKey(e){
  if(e.key==="Enter") sendMessage();
}

function exportPrompt(){
  if(!window.__LAST_EXPORT_PROMPT){ alert("אין prompt לייצוא עדיין"); return; }
  const botName = document.getElementById("course-title")?.innerText || "MilEd Bot";
  const now = new Date().toISOString();
  const content = `MilEd.One — Prompt Export\n================================\n\nBot name: ${botName}\nExported at: ${now}\n\n--------------------------------\nSYSTEM PROMPT\n--------------------------------\n\n${window.__LAST_EXPORT_PROMPT}\n\n--------------------------------\nGenerated via MilEd.One\n--------------------------------\n`;
  const blob = new Blob([content], {type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url;
  a.download=botName.replace(/\s+/g,"_")+"_prompt.txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

</script>

<!-- Classroom sync — active only when sessionId exists in URL -->
<script src="/classroom-inject.js"></script>

</body>
</html>
```
