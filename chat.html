<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<title>MilEd.One - למידה חכמה</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/auth-guard.js"></script>

</head>

<body>
<script>
  // When embedded as iframe inside lesson_view, hide page chrome
  if (window.self !== window.top) {
    document.documentElement.classList.add('embedded');
  }
</script>
<style>
  html.embedded .sidebar,
  html.embedded .topbar { display: none !important; }
  html.embedded .main { margin: 0 !important; padding: 0 !important; }
  html.embedded .container { height: 100vh !important; border-radius: 0 !important; box-shadow: none !important; }
</style>

<div class="sidebar">

<h2>MilEd.One</h2>

<a href="/students.html">קורסים</a>
<a href="/skills.html">מיומנויות</a>
<a href="/lecturer_hub.html" onclick="window.MiledAccess?.clearPreviewRole?.()">הוראה</a>
<a href="/admin_cockpit.html">ניהול</a>
<a href="/index.html" onclick="window.MiledAccess?.signOutAndRedirect?.('/index.html'); return false;" style="margin-top:20px;color:#999;font-size:13px;">← יציאה</a>
</div>

<div class="main">

<div class="topbar">

<div class="nav-links">
<a href="/students.html" class="nav-btn btn-courses">📚 הקורסים שלי</a>
<a href="/skills.html" class="nav-btn btn-skills">🔍 אבחון ומיומנויות</a>
</div>

<div id="course-title" class="current-course">טוען...</div>

<div>MilEd.One</div>

</div>

<div class="container">

<div id="chat-window">
</div>

<div class="input-area">
<input id="user-input" placeholder="כתוב שאלה..." onkeypress="handleKey(event)">
<button id="voice-btn">🎤</button>
<button id="send-btn" onclick="sendMessage()">שלח</button>

</div>

</div>
</div>

<script>

window.__LAST_EXPORT_PROMPT = null;

// Prefer Firebase Auth uid (stable, cross-device) — fall back to random session id
const _authSession = window.MiledAccess?.getSessionUser?.();
let studentId = _authSession?.uid || sessionStorage.getItem('studentId');
if (!studentId) {
  studentId = 's_' + Math.random().toString(36).slice(2,10);
  sessionStorage.setItem('studentId', studentId);
}

// sessionId — גנרי לכל session
let sessionId = sessionStorage.getItem('sessionId');
if (!sessionId){
  sessionId = 'sess_' + Math.random().toString(36).slice(2,10);
  sessionStorage.setItem('sessionId', sessionId);
}

let facultyId = sessionStorage.getItem('facultyId') || null;

const params      = new URLSearchParams(window.location.search);
// Accept both classId and courseId — personalProject URLs use courseId
const classId     = params.get('classId') || params.get('courseId') || null;
const skillMode   = params.get('skillMode') === 'true';
// stationRoot — passed from lesson_view setChatFrame(); used by chat.js for bot mode override (Part 34 §34.6)
const stationRoot = params.get('stationRoot') || 'lesson';
const ppCurrentStage = params.get('ppCurrentStage');
const ppStageTitle = params.get('ppStageTitle') || '';
const ppStageInstructions = params.get('ppStageInstructions') || '';
const ppStageTaskPrompt = params.get('ppStageTaskPrompt') || '';
const ppStageBotHint = params.get('ppStageBotHint') || '';
const ppBotPolicy = params.get('ppBotPolicy') || '';
const ppCurrentStageNum = Number(ppCurrentStage);
const hasPpCurrentStage = Number.isFinite(ppCurrentStageNum);
const effectivePpCurrentStage = hasPpCurrentStage ? ppCurrentStageNum : null;

const chatWindow = document.getElementById('chat-window');
const input      = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');
const historyKey = `history_${classId}`;
let chatHistory  = JSON.parse(sessionStorage.getItem(historyKey) || '[]');

// ─── Wave detection for multi-wave assessment tracking ───
// First visit → wave_1_baseline; subsequent visits → wave_2_midterm
let waveId = "wave_1_baseline";
if (skillMode && classId) {
  const existingWave1 = localStorage.getItem(`miled_skill_ts_${classId}`);
  if (!existingWave1) {
    localStorage.setItem(`miled_skill_ts_${classId}`, Date.now().toString());
    waveId = "wave_1_baseline";
  } else {
    localStorage.setItem(`miled_skill_ts2_${classId}`, Date.now().toString());
    waveId = "wave_2_midterm";
  }
}

function renderMessage(role, content){
  const div = document.createElement('div');
  div.className = 'message ' + (role === 'user' ? 'user user-message' : 'ai bot-message');
  div.innerHTML = role === 'user' ? content : marked.parse(content);
  return div;
}

if (chatHistory.length > 0){
  chatHistory.forEach(m => chatWindow.appendChild(renderMessage(m.role, m.content)));
}

let currentBotType = null;

function buildChatRequestPayload(message, history, isNewBotSession = false) {
  return {
    message,
    botType:         currentBotType,
    classId:         classId,
    studentId:       studentId,
    facultyId:       facultyId,
    sessionId:       sessionId,
    skillMode:       skillMode,
    waveId:          waveId,
    stationRoot:     stationRoot,
    currentStep:     effectivePpCurrentStage,
    ppCurrentStage:  effectivePpCurrentStage,
    ppStageTitle:    ppStageTitle,
    ppStageInstructions: ppStageInstructions,
    ppStageTaskPrompt: ppStageTaskPrompt,
    ppStageBotHint:  ppStageBotHint,
    ppBotPolicy:     ppBotPolicy,
    history:         history,
    ...(isNewBotSession ? { isNewBotSession: true } : {})
  };
}

fetch('/config.json')
.then(r => r.json())
.then(config => {
  const urlBotType = params.get('botType');
  if (urlBotType){
    currentBotType = urlBotType;
    document.getElementById('course-title').textContent = urlBotType;
    if (chatHistory.length === 0) triggerBotOpening();
    return;
  }

  for (let branch in config.branches){
    const item = config.branches[branch].items?.[classId];
    if (item){
      currentBotType = item.botType;
      document.getElementById('course-title').textContent = item.name;
      break;
    }
  }

  if (currentBotType && chatHistory.length === 0) triggerBotOpening();
});

// ─────────────────────────────
// פתיחת שיחה אוטומטית — kernel v2.0
// ─────────────────────────────

async function triggerBotOpening() {
  const loading = document.createElement('div');
  loading.className = 'message ai bot-message';
  loading.innerText = '...';
  chatWindow.appendChild(loading);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildChatRequestPayload('__INIT__', [], true))
    });

    const data = await res.json();
    loading.remove();

    if (data.reply) {
      chatWindow.appendChild(renderMessage('assistant', data.reply));
      chatHistory.push({ role: 'assistant', content: data.reply });
      sessionStorage.setItem(historyKey, JSON.stringify(chatHistory));
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

  } catch(e) {
    loading.remove();
    chatWindow.appendChild(renderMessage('assistant', 'שגיאת חיבור לשרת'));
  }
}

// ─────────────────────────────
// שליחת הודעה
// ─────────────────────────────

async function sendMessage(){

  if (!currentBotType){
    alert("המערכת עדיין נטענת");
    return;
  }

  const text = input.value.trim();
  if (!text) return;

  chatWindow.appendChild(renderMessage('user', text));
  input.value = "";
  sendBtn.disabled = true;

  const loading = document.createElement('div');
  loading.className = 'message ai bot-message loading-text';
  loading.innerText = 'חושב...';
  chatWindow.appendChild(loading);
  chatWindow.scrollTop = chatWindow.scrollHeight;

  try {

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildChatRequestPayload(text, chatHistory))
    });

    if (response.status === 403){
      loading.remove();
      chatWindow.appendChild(renderMessage('assistant', "אין לך הרשאה להשתמש בכלי זה"));
      return;
    }

    const data = await response.json();

    if (data.exportPrompt)
      window.__LAST_EXPORT_PROMPT = data.exportPrompt;

    loading.remove();

    const reply = data.reply || "שגיאה";
    chatWindow.appendChild(renderMessage('assistant', reply));

    chatHistory.push({ role: 'user',      content: text  });
    chatHistory.push({ role: 'assistant', content: reply });
    sessionStorage.setItem(historyKey, JSON.stringify(chatHistory));
    chatWindow.scrollTop = chatWindow.scrollHeight;

  } catch(e) {
    loading.remove();
    chatWindow.appendChild(renderMessage('assistant', "שגיאת חיבור לשרת"));
  }

  sendBtn.disabled = false;
}

function handleKey(e){
  if (e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
}

function exportPrompt(){

  if (!window.__LAST_EXPORT_PROMPT){
    alert("אין prompt לייצוא עדיין");
    return;
  }

  const botName = document.getElementById("course-title")?.innerText || "MilEd Bot";
  const now     = new Date().toISOString();

  const content = `MilEd.One — Prompt Export
================================

Bot name: ${botName}
Exported at: ${now}

--------------------------------
SYSTEM PROMPT
--------------------------------

${window.__LAST_EXPORT_PROMPT}

--------------------------------
Generated via MilEd.One
--------------------------------
`;

  const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
  const url  = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href     = url;
  a.download = botName.replace(/\s+/g, "_") + "_prompt.txt";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

</script>

</body>
</html>
